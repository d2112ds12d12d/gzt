name: Auto Upload Scan

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Force scan outside Asia/Shanghai 07:00-12:59'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  schedule:
    # GitHub Actions uses UTC. These two ranges cover 07:00-12:59 Asia/Shanghai.
    - cron: '*/10 23 * * *'
    - cron: '*/10 0-4 * * *'

concurrency:
  group: auto-upload-scan
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check scan window
        id: window
        shell: bash
        run: |
          force="${{ github.event.inputs.force || 'false' }}"
          if [ "$force" = "true" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Force scan enabled, bypass scan window."
            exit 0
          fi
          hour="$(TZ=Asia/Shanghai date +%H)"
          if [ "$hour" -lt 7 ] || [ "$hour" -gt 12 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Outside Asia/Shanghai 07:00-12:59 scan window, skip."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Inside scan window, continue."
          fi

      - name: Trigger auto upload scan
        if: steps.window.outputs.skip != 'true'
        env:
          AUTO_UPLOAD_SCAN_SECRET: ${{ secrets.AUTO_UPLOAD_SCAN_SECRET }}
          AUTO_UPLOAD_SCAN_URL: https://1423465873-byj2v2m5v9.ap-guangzhou.tencentscf.com
        shell: bash
        run: |
          if [ -z "$AUTO_UPLOAD_SCAN_SECRET" ]; then
            echo "Missing GitHub secret: AUTO_UPLOAD_SCAN_SECRET" >&2
            exit 1
          fi
          base="${AUTO_UPLOAD_SCAN_URL%/}"
          response_file="$(mktemp)"
          http_code="$(curl -sS --retry 1 --retry-delay 5 --max-time 600 \
            -w '%{http_code}' \
            -o "$response_file" \
            "$base/auto-upload/scan?mode=scheduled&secret=$AUTO_UPLOAD_SCAN_SECRET"
          )"
          echo "Tencent SCF HTTP status: $http_code"
          echo "Tencent SCF response:"
          cat "$response_file"
          echo
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            exit 1
          fi
