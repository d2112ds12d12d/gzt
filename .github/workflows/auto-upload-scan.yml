function monthTargets(prefix, rows, mergeKey) {
  const buckets = new Map();
  rows.forEach((row) => {
    const ym = norm(row.date).slice(0, 7);
    if (!ym) return;
    if (!buckets.has(ym)) buckets.set(ym, []);
    buckets.get(ym).push(row);
  });
  return Array.from(buckets.keys()).sort().map((ym) => ({
    file: `${prefix}${ym}.json`,
    mergeKey,
    rows: buckets.get(ym),
  }));
}

function datasetInfo(label, rows) {
  return {
    label,
    rows: rows.length,
    dates: Array.from(new Set(rows.map((r) => r.date).filter(Boolean))).sort(),
  };
}

function buildDateOptions(datasets) {
  const dates = Array.from(new Set(Object.values(datasets).flatMap((item) => item.rows.map((r) => r.date).filter(Boolean)))).sort();
  return dates.map((date) => {
    const parts = {};
    let complete = true;
    Object.entries(datasets).forEach(([key, item]) => {
      const count = item.rows.filter((r) => r.date === date).length;
      parts[key] = { label: item.label, rows: count, ready: count > 0 };
      if (!count) complete = false;
    });
    return { date, complete, defaultSelected: complete && date === dates[dates.length - 1], parts };
  });
}

function partKeyForTarget(file) {
  if (file.startsWith('qa_diff_')) return 'phoneQa';
  if (file.startsWith('phone_diff_')) return 'phoneDiff';
  if (file === 'daily_summary.json') return 'fourSummary';
  if (file.startsWith('five_cat_')) return 'fourDiff';
  return '';
}

function countRowsByDate(rows, dates) {
  const wanted = new Set(dates);
  const counts = {};
  rows.forEach((row) => {
    const date = row && row.date;
    if (!wanted.has(date)) return;
    counts[date] = (counts[date] || 0) + 1;
  });
  return counts;
}

function applyDateOptionState(item) {
  const parts = item.parts || {};
  const values = Object.values(parts);
  const incomingAny = values.some((part) => part.rows > 0);
  const cloudAny = values.some((part) => part.cloudRows > 0);
  const cloudComplete = ['phoneQa', 'phoneDiff', 'fourSummary', 'fourDiff']
    .every((key) => (parts[key] && parts[key].cloudRows > 0));

  if (cloudComplete) {
    return { ...item, cloudComplete, cloudAny, status: 'uploaded', statusLabel: '已上传', actionable: false };
  }
  if (cloudAny && item.complete) {
    return { ...item, cloudComplete, cloudAny, status: 'repair', statusLabel: '云端不完整，可补齐', actionable: true, actionLabel: `补齐 ${item.date.slice(5)}` };
  }
  if (item.complete) {
    return { ...item, cloudComplete, cloudAny, status: 'ready', statusLabel: '可上传', actionable: true, actionLabel: `上传 ${item.date.slice(5)}` };
  }
  if (cloudAny && incomingAny) {
    return { ...item, cloudComplete, cloudAny, status: 'partial', statusLabel: '云端/邮件均不完整', actionable: true, actionLabel: `谨慎补传 ${item.date.slice(5)}` };
  }
  return { ...item, cloudComplete, cloudAny, status: 'incomplete', statusLabel: '邮件不完整', actionable: incomingAny, actionLabel: `谨慎上传 ${item.date.slice(5)}` };
}

async function enrichDateOptionsWithCloudState(bundle, token) {
  const dates = (bundle.dateOptions || []).map((item) => item.date);
  if (!dates.length) return bundle;

  const cloudCounts = {};
  await Promise.all((bundle.targets || []).map(async (target) => {
    const key = partKeyForTarget(target.file || '');
    if (!key) return;
    const cloud = await githubGetFile(target.file, token);
    const counts = countRowsByDate(cloud.rows || [], dates);
    cloudCounts[key] = cloudCounts[key] || {};
    Object.entries(counts).forEach(([date, count]) => {
      cloudCounts[key][date] = (cloudCounts[key][date] || 0) + count;
    });
  }));

  bundle.dateOptions = (bundle.dateOptions || []).map((item) => {
    const parts = {};
    Object.entries(item.parts || {}).forEach(([key, part]) => {
      parts[key] = { ...part, cloudRows: (cloudCounts[key] && cloudCounts[key][item.date]) || 0 };
    });
    return applyDateOptionState({ ...item, parts });
  });
  return bundle;
}

function buildBundle(parsed, meta) {
  const datasets = {
    phoneQa: { label: '手机差异率', rows: parsed.phoneQa },
    phoneDiff: { label: '手机差异明细', rows: parsed.phoneDiff },
    fourSummary: { label: '四品类汇总', rows: parsed.fourSummary },
    fourDiff: { label: '四品类差异明细', rows: parsed.fourDiff },
  };
  const targets = [
    ...monthTargets('qa_diff_', parsed.phoneQa, 'date|site|cat'),
    ...monthTargets('phone_diff_', parsed.phoneDiff, 'date|code|site'),
    { file: 'daily_summary.json', mergeKey: 'date|site|cat', rows: parsed.fourSummary },
    ...monthTargets('five_cat_', parsed.fourDiff, 'date|code|site'),
  ];
  return {
    source: 'feishu_mail_zip_cloud',
    generatedAt: new Date().toISOString(),
    batchId: meta.batchId,
    dates: Array.from(new Set(Object.values(datasets).flatMap((item) => item.rows.map((r) => r.date).filter(Boolean)))).sort(),
    dateOptions: buildDateOptions(datasets),
    datasets: Object.fromEntries(Object.entries(datasets).map(([key, item]) => [key, datasetInfo(item.label, item.rows)])),
    mailSources: meta.mailSources,
    targets,
  };
}

function rowKey(row, keySpec) {
  if (keySpec === 'date|site|cat') return `${row.date || ''}|${row.site || ''}|${row.cat || ''}`;
  if (keySpec === 'date|code|site') return `${row.date || ''}|${row.code || ''}|${row.site || ''}`;
  throw new Error(`未知 mergeKey: ${keySpec}`);
}

function mergeRows(cloudRows, incomingRows, keySpec) {
  const keys = new Set(incomingRows.map((r) => rowKey(r, keySpec)));
  const kept = cloudRows.filter((r) => !keys.has(rowKey(r, keySpec)));
  return {
    rows: kept.concat(incomingRows),
    stats: {
      cloudRows: cloudRows.length,
      incomingRows: incomingRows.length,
      replacedRows: cloudRows.length - kept.length,
      mergedRows: kept.length + incomingRows.length,
    },
  };
}

function githubHeaders(token) {
  return {
    Authorization: `token ${token}`,
    Accept: 'application/vnd.github+json',
    'Content-Type': 'application/json; charset=utf-8',
  };
}

async function githubGetFile(file, token) {
  const url = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_FOLDER}/${file}?t=${Date.now()}`;
  const res = await fetch(url, { headers: githubHeaders(token) });
  if (res.status === 404) return { rows: [], sha: '' };
  if (!res.ok) throw new Error(`读取 GitHub 文件失败 ${file}: ${res.status}`);
  const meta = await res.json();
  let content = meta.content || '';
  if (!content || meta.encoding === 'none') {
    if (!meta.sha) return { rows: [], sha: '' };
    const blobRes = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/git/blobs/${meta.sha}`, { headers: githubHeaders(token) });
    if (!blobRes.ok) throw new Error(`读取 GitHub blob 失败 ${file}: ${blobRes.status}`);
    const blob = await blobRes.json();
    content = blob.content || '';
  }
  const json = JSON.parse(Buffer.from(content.replace(/\n/g, ''), 'base64').toString('utf8') || '{}');
  return { rows: Array.isArray(json.rows) ? json.rows : [], sha: meta.sha || '' };
}

async function githubPutFile(file, content, token, message) {
  const meta = await githubGetFile(file, token);
  const body = {
    message,
    content: Buffer.from(JSON.stringify(content, null, 0), 'utf8').toString('base64'),
  };
  if (meta.sha) body.sha = meta.sha;
  const res = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_FOLDER}/${file}`, {
    method: 'PUT',
    headers: githubHeaders(token),
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    const text = await res.text();
    throw new Error(`写 GitHub 文件失败 ${file}: ${res.status} ${text.slice(0, 160)}`);
  }
  return res.json();
}

async function githubGetJsonFile(file, token) {
  const url = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_FOLDER}/${file}?t=${Date.now()}`;
  const res = await fetch(url, { headers: githubHeaders(token) });
  if (res.status === 404) return { json: null, sha: '' };
  if (!res.ok) throw new Error(`读取 GitHub JSON 失败 ${file}: ${res.status}`);
  const meta = await res.json();
  let content = meta.content || '';
  if (!content || meta.encoding === 'none') {
    if (!meta.sha) return { json: null, sha: '' };
    const blobRes = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/git/blobs/${meta.sha}`, { headers: githubHeaders(token) });
    if (!blobRes.ok) throw new Error(`读取 GitHub JSON blob 失败 ${file}: ${blobRes.status}`);
    const blob = await blobRes.json();
    content = blob.content || '';
  }
  const raw = Buffer.from(content.replace(/\n/g, ''), 'base64').toString('utf8');
  return { json: raw ? JSON.parse(raw) : null, sha: meta.sha || '' };
}

function cnDateKey(date = new Date()) {
  return new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Shanghai' }).format(date);
}

function cnHour(date = new Date()) {
  return Number(new Intl.DateTimeFormat('en-US', {
    timeZone: 'Asia/Shanghai',
    hour: '2-digit',
    hour12: false,
  }).format(date));
}

function isScheduledScanWindow(date = new Date()) {
  const hour = cnHour(date);
  return hour >= SCHEDULE_START_HOUR && hour < SCHEDULE_END_HOUR;
}

function buildScanSignature(bundle) {
  const payload = {
    dates: (bundle.dateOptions || []).map((item) => ({
      date: item.date,
      status: item.status,
      phoneQa: partRows(item.parts, 'phoneQa'),
      phoneDiff: partRows(item.parts, 'phoneDiff'),
      fourSummary: partRows(item.parts, 'fourSummary'),
      fourDiff: partRows(item.parts, 'fourDiff'),
      cloudPhoneQa: partCloudRows(item.parts, 'phoneQa'),
      cloudPhoneDiff: partCloudRows(item.parts, 'phoneDiff'),
      cloudFourSummary: partCloudRows(item.parts, 'fourSummary'),
      cloudFourDiff: partCloudRows(item.parts, 'fourDiff'),
    })),
    sources: bundle.mailSources || {},
  };
  return crypto.createHash('sha1').update(JSON.stringify(payload)).digest('hex');
}

function hasScheduledActionableDate(bundle) {
  return (bundle.dateOptions || []).some((item) => item.status === 'ready' || item.status === 'repair');
}

async function readScanState(token) {
  const meta = await githubGetJsonFile(SCAN_STATE_FILE, token);
  const state = meta.json && typeof meta.json === 'object' ? meta.json : {};
  if (!state.daily || typeof state.daily !== 'object') state.daily = {};
  return state;
}

async function writeScanState(state, token) {
  const keys = Object.keys(state.daily || {}).sort();
  while (keys.length > 14) {
    const key = keys.shift();
    delete state.daily[key];
  }
  state.updatedAt = new Date().toISOString();
  await githubPutFile(SCAN_STATE_FILE, state, token, 'Update auto upload scan state');
}

async function shouldSendScheduledCard(bundle, token, options = {}) {
  if (!options.force && !isScheduledScanWindow()) {
    return { send: false, reason: 'outside_scan_window', day: cnDateKey() };
  }
  if (!hasScheduledActionableDate(bundle)) {
    return { send: false, reason: 'no_ready_or_repair_dates', day: cnDateKey() };
  }
  const state = await readScanState(token);
  const day = cnDateKey();
  const current = state.daily[day] || {};
  if (current.cardSent) {
    return {
      send: false,
      reason: current.signature === buildScanSignature(bundle) ? 'duplicate_daily_card' : 'daily_card_already_sent',
      day,
      batchId: current.batchId || '',
      messageId: current.messageId || '',
    };
  }
  return { send: true, day, signature: buildScanSignature(bundle), state };
}

async function markScheduledCardSent(decision, bundle, sent, token) {
  const state = decision.state || await readScanState(token);
  state.daily[decision.day] = {
    cardSent: true,
    sentAt: new Date().toISOString(),
    batchId: bundle.batchId,
    messageId: sent.message_id || '',
    dates: bundle.dates || [],
    signature: decision.signature || buildScanSignature(bundle),
  };
  await writeScanState(state, token);
}

async function readBatch(batchId, token) {
  const file = `${GH_STAGING_FOLDER}/${batchId}.json`;
  const url = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_FOLDER}/${file}?t=${Date.now()}`;
  const res = await fetch(url, { headers: githubHeaders(token) });
  if (!res.ok) throw new Error(`读取自动上传批次失败 ${batchId}: ${res.status}`);
  const meta = await res.json();
  let content = meta.content || '';
  if (!content || meta.encoding === 'none') {
    if (!meta.sha) throw new Error(`自动上传批次内容为空: ${batchId}`);
    const blobRes = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/git/blobs/${meta.sha}`, { headers: githubHeaders(token) });
    if (!blobRes.ok) throw new Error(`读取自动上传批次 blob 失败 ${batchId}: ${blobRes.status}`);
    const blob = await blobRes.json();
    content = blob.content || '';
  }
  const raw = Buffer.from(content.replace(/\n/g, ''), 'base64').toString('utf8');
  if (!raw) throw new Error(`自动上传批次内容为空: ${batchId}`);
  return JSON.parse(raw);
}

async function writeBatch(bundle, token) {
  const file = `${GH_STAGING_FOLDER}/${bundle.batchId}.json`;
  await githubPutFile(file, bundle, token, `Stage auto upload batch ${bundle.batchId}`);
  return file;
}

function filterRowsByDates(rows, dates) {
  if (!dates || !dates.length) return rows;
  const wanted = new Set(dates);
  return rows.filter((row) => wanted.has(row.date));
}

async function applyBundle(bundle, dates, token) {
  const results = [];
  for (const target of bundle.targets || []) {
    const incoming = filterRowsByDates(target.rows || [], dates);
    if (!incoming.length) continue;
    const cloud = await githubGetFile(target.file, token);
    const merged = mergeRows(cloud.rows, incoming, target.mergeKey);
    await githubPutFile(target.file, { rows: merged.rows, updated: new Date().toISOString() }, token, `Auto upload ${target.file} from Feishu mail`);
    results.push({ file: target.file, mergeKey: target.mergeKey, ...merged.stats, uploaded: true });
  }
  return results;
}

function partRows(parts, key) {
  const part = parts && parts[key];
  return part ? Number(part.rows || 0) : 0;
}

function partCloudRows(parts, key) {
  const part = parts && parts[key];
  return part ? Number(part.cloudRows || 0) : 0;
}

function compactPartRows(parts, key) {
  const rows = partRows(parts, key);
  const cloudRows = partCloudRows(parts, key);
  return cloudRows > 0 ? `${rows}行 / 云端${cloudRows}行` : `${rows}行`;
}

function lineForDateOption(item) {
  const parts = item.parts || {};
  return [
    `**${item.date}**｜**${item.statusLabel || (item.complete ? '可上传' : '不完整')}**`,
    `手机：差异率 ${compactPartRows(parts, 'phoneQa')}，明细 ${compactPartRows(parts, 'phoneDiff')}`,
    `四品类：汇总 ${compactPartRows(parts, 'fourSummary')}，明细 ${compactPartRows(parts, 'fourDiff')}`,
  ].join('\n');
}

function buildPrecheckCard(bundle) {
  const sourceLines = Object.entries(bundle.mailSources || {}).map(([kind, src]) => {
    const label = kind === 'phone' ? '手机邮件' : '四品类邮件';
    const warn = src.senderMatchesSystemRule ? '' : ' ⚠️ 非系统原始发件人';
    return `- **${label}**：${src.from || '未知'}｜${src.time || ''}${warn}`;
  });
  const dateOptions = bundle.dateOptions || [];
  const actionOptions = dateOptions.filter((item) => item.actionable);
  const uploadedCount = dateOptions.filter((item) => item.status === 'uploaded').length;
  const readyCount = dateOptions.filter((item) => item.status === 'ready').length;
  const repairCount = dateOptions.filter((item) => item.status === 'repair' || item.status === 'partial').length;
  const incompleteCount = dateOptions.filter((item) => item.status === 'incomplete').length;
  const dateElements = dateOptions.flatMap((item, index) => {
    const elements = [
      { tag: 'div', text: { tag: 'lark_md', content: lineForDateOption(item) } },
    ];
    if (index < dateOptions.length - 1) elements.push({ tag: 'hr' });
    return elements;
  });
  const dateButtonRows = [];
  for (let i = 0; i < actionOptions.length; i += 3) {
    dateButtonRows.push({
      tag: 'action',
      actions: actionOptions.slice(i, i + 3).map((item) => ({
        tag: 'button',
        text: { tag: 'plain_text', content: item.actionLabel || `上传 ${item.date.slice(5)}` },
        type: item.status === 'ready' ? 'primary' : 'default',
        value: { action: 'confirm_auto_upload', batch_id: bundle.batchId, dates: [item.date], sync_broadcast: true },
      })),
    });
  }
  return {
    config: { wide_screen_mode: true },
    header: {
      template: 'blue',
      title: { tag: 'plain_text', content: '每日数据上传确认' },
      subtitle: { tag: 'plain_text', content: '最近 7 天邮件扫描结果' },
    },
    elements: [
      { tag: 'div', text: { tag: 'lark_md', content: `**请选择要上传的数据日期**\n已上传 ${uploadedCount} 天｜可上传 ${readyCount} 天｜可补齐 ${repairCount} 天｜邮件不完整 ${incompleteCount} 天` } },
      { tag: 'hr' },
      ...(dateElements.length ? dateElements : [{ tag: 'div', text: { tag: 'lark_md', content: '暂无可选日期' } }]),
      { tag: 'hr' },
      { tag: 'div', text: { tag: 'lark_md', content: `### 邮件来源\n${sourceLines.join('\n') || '暂无邮件来源'}` } },
      { tag: 'note', elements: [{ tag: 'plain_text', content: '日期不一致不禁止上传；同日期重复数据需管理员确认后覆盖上传。' }] },
      ...dateButtonRows,
      {
        tag: 'action',
        actions: [
          {
            tag: 'button',
            text: { tag: 'plain_text', content: '拒绝上传' },
            type: 'danger',
            value: { action: 'reject_auto_upload', batch_id: bundle.batchId },
          },
        ],
      },
    ],
  };
}

async function sendAdminPrecheckCard(bundle, tenantToken) {
  if (!ADMIN_CHAT_ID) throw new Error('缺少 FEISHU_ADMIN_CHAT_ID');
  const res = await fetch(`${FEISHU_API_BASE}/open-apis/im/v1/messages?receive_id_type=chat_id`, {
    method: 'POST',
    headers: { Authorization: `Bearer ${tenantToken}`, 'Content-Type': 'application/json; charset=utf-8' },
    body: JSON.stringify({
      receive_id: ADMIN_CHAT_ID,
      msg_type: 'interactive',
      content: JSON.stringify(buildPrecheckCard(bundle)),
    }),
  });
  const json = await res.json();
  if (!res.ok || json.code !== 0) throw new Error(`发送预检卡片失败 ${res.status} code=${json.code}: ${json.msg || ''}`);
  return json.data || {};
}

async function scanMailAndBuildBundle(tenantToken, options = {}) {
  const ids = await listMessages(tenantToken);
  const cutoff = Date.now() - MAIL_LOOKBACK_DAYS * 86400 * 1000;
  const messages = [];
  let missingMessageId = 0;
  for (const item of ids) {
    const messageId = typeof item === 'string' ? item : (item.id || item.message_id || item.messageId);
    if (!messageId) {
      missingMessageId += 1;
      continue;
    }
    const message = await getMessage(tenantToken, messageId);
    const summary = summarizeMessage(message);
    if (summary.ts && summary.ts < cutoff) continue;
    messages.push({ id: messageId, message, summary });
  }

  const matched = {};
  SUBJECTS.forEach((spec) => { matched[spec.kind] = []; });
  messages.forEach((item) => {
    SUBJECTS.forEach((spec) => {
      if (item.summary.subject.includes(spec.keyword)) matched[spec.kind].push(item);
    });
  });
  if (!matched.phone.length || !matched.four.length) {
    const result = { ok: false, reason: '最近 7 天内手机和四品类邮件未同时找到', matched: { phone: matched.phone.length, four: matched.four.length } };
    if (options.debug) {
      result.debug = {
        targetMail: TARGET_MAIL,
        listed: ids.length,
        missingMessageId,
        listSample: ids.slice(0, 5).map((item) => ({
          type: typeof item,
          value: typeof item === 'string' ? item : '',
          keys: typeof item === 'object' && item ? Object.keys(item) : [],
          id: item && item.id ? item.id : '',
          message_id: item && item.message_id ? item.message_id : '',
          messageId: item && item.messageId ? item.messageId : '',
        })),
        scanned: messages.length,
        sample: messages.slice(0, 12).map((item) => ({
          subject: item.summary.subject,
          from: item.summary.from,
          time: item.summary.time,
          attachments: item.summary.attachments.map((a) => a.filename).filter(Boolean),
        })),
      };
    }
    return result;
  }

  const parsed = { phoneQa: [], phoneDiff: [], fourSummary: [], fourDiff: [] };
  const mailSources = {};
  for (const spec of SUBJECTS) {
    for (const item of matched[spec.kind]) {
      const zips = item.summary.attachments.filter((a) => !a.inline && /\.zip$/i.test(a.filename || ''));
      if (!zips.length) continue;
      const urls = await getAttachmentUrls(tenantToken, item.id, zips.map((a) => a.id));
      for (const urlInfo of urls) {
        const buf = await downloadBuffer(urlInfo.download_url);
        const files = await unzipTargetFiles(buf);
        if (spec.kind === 'phone' && files[REQUIRED.phoneQa.file] && files[REQUIRED.phoneDiff.file]) {
          parsed.phoneQa.push(...parsePhoneQa(sheetRows(files[REQUIRED.phoneQa.file])));
          parsed.phoneDiff.push(...parsePhoneDiff(sheetRows(files[REQUIRED.phoneDiff.file])));
          mailSources.phone = { subject: item.summary.subject, from: item.summary.from, time: item.summary.time, senderMatchesSystemRule: SENDER_RE.test(item.summary.from) };
        }
        if (spec.kind === 'four' && files[REQUIRED.fourSummary.file] && files[REQUIRED.fourDiff.file]) {
          parsed.fourSummary.push(...parseFourSummary(sheetRows(files[REQUIRED.fourSummary.file])));
          parsed.fourDiff.push(...parseFourDiff(sheetRows(files[REQUIRED.fourDiff.file])));
          mailSources.four = { subject: item.summary.subject, from: item.summary.from, time: item.summary.time, senderMatchesSystemRule: SENDER_RE.test(item.summary.from) };
        }
      }
    }
  }
  const batchSeed = `${Date.now()}-${JSON.stringify(Object.values(parsed).map((rows) => rows.length))}`;
  const batchId = crypto.createHash('sha1').update(batchSeed).digest('hex').slice(0, 12);
  const bundle = buildBundle(parsed, { batchId, mailSources });
  return { ok: true, bundle };
}

async function runAutoUploadScan(options) {
  const tenantToken = options.tenantToken;
  const githubToken = process.env.GITHUB_TOKEN || '';
  if (!githubToken) throw new Error('缺少 GITHUB_TOKEN');
  const scheduled = !!options.scheduled;
  const force = !!options.force;
  const result = await scanMailAndBuildBundle(tenantToken, { debug: !!options.debug });
  if (!result.ok) return result;
  await enrichDateOptionsWithCloudState(result.bundle, githubToken);
  if (scheduled) {
    const decision = await shouldSendScheduledCard(result.bundle, githubToken, { force });
    if (!decision.send) {
      return {
        ok: true,
        skipped: true,
        reason: decision.reason,
        day: decision.day,
        batchId: decision.batchId || result.bundle.batchId,
        dates: result.bundle.dates,
      };
    }
    await writeBatch(result.bundle, githubToken);
    const sent = await sendAdminPrecheckCard(result.bundle, tenantToken);
    await markScheduledCardSent(decision, result.bundle, sent, githubToken);
    return { ok: true, scheduled: true, batchId: result.bundle.batchId, dates: result.bundle.dates, messageId: sent.message_id || '' };
  }
  await writeBatch(result.bundle, githubToken);
  const sent = await sendAdminPrecheckCard(result.bundle, tenantToken);
  return { ok: true, batchId: result.bundle.batchId, dates: result.bundle.dates, messageId: sent.message_id || '' };
}

async function confirmAutoUpload(actionValue) {
  const githubToken = process.env.GITHUB_TOKEN || '';
  if (!githubToken) throw new Error('缺少 GITHUB_TOKEN');
  const batchId = actionValue.batch_id || actionValue.batchId || '';
  const dates = Array.isArray(actionValue.dates) ? actionValue.dates : [];
  if (!batchId) throw new Error('缺少 batch_id');
  if (!dates.length) throw new Error('缺少要上传的数据日期');
  const bundle = await readBatch(batchId, githubToken);
  const results = await applyBundle(bundle, dates, githubToken);
  return { ok: true, batchId, dates, results };
}

module.exports = {
  runAutoUploadScan,
  confirmAutoUpload,
  buildPrecheckCard,
};
