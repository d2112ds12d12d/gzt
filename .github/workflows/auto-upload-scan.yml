function norm(v) {
  return String(v == null ? '' : v).trim();
}

function normDate(v) {
  if (v == null || v === '') return '';
  if (v instanceof Date && !Number.isNaN(v.getTime())) return v.toISOString().slice(0, 10);
  const s = norm(v);
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0, 10);
  const slash = /^(\d{4})\/(\d{1,2})\/(\d{1,2})/.exec(s);
  if (slash) return `${slash[1]}-${slash[2].padStart(2, '0')}-${slash[3].padStart(2, '0')}`;
  const n = Number(s);
  if (Number.isFinite(n) && n > 40000) {
    const d = new Date((n - 25569) * 86400 * 1000);
    return d.toISOString().slice(0, 10);
  }
  return s.slice(0, 10);
}

function extractCN(v) {
  const s = norm(v);
  if (!s) return '';
  const hits = s.match(/[\u4e00-\u9fa5]+/g);
  if (hits) return hits.join('');
  const m = s.match(/[（(]([^）)]+)[）)]/);
  return m ? m[1] : s;
}

async function requestJson(url, options = {}) {
  const { stage = 'unknown', ...fetchOptions } = options;
  const res = await fetch(url, fetchOptions);
  const text = await res.text();
  let data;
  try {
    data = text ? JSON.parse(text) : {};
  } catch (error) {
    throw new Error(`非 JSON 响应 ${stage} ${res.status}: ${text.slice(0, 200)}`);
  }
  if (!res.ok || data.code !== 0) {
    throw new Error(`API 失败 ${stage} ${res.status} code=${data.code}: ${data.msg || data.message || res.statusText}`);
  }
  return data.data || {};
}

function authHeaders(token) {
  return { Authorization: `Bearer ${token}` };
}

async function listMessages(token) {
  if (!TARGET_MAIL) throw new Error('缺少 FEISHU_TARGET_MAIL');
  const ids = [];
  let pageToken = '';
  for (let page = 0; page < MAIL_SCAN_PAGES; page += 1) {
    const url = new URL(`${FEISHU_API_BASE}/open-apis/mail/v1/user_mailboxes/${encodeURIComponent(TARGET_MAIL)}/messages`);
    url.searchParams.set('page_size', '20');
    url.searchParams.set('folder_id', 'INBOX');
    if (pageToken) url.searchParams.set('page_token', pageToken);
    const data = await requestJson(url, { headers: authHeaders(token), stage: 'list_messages' });
    ids.push(...(data.items || []));
    if (!data.has_more || !data.page_token) break;
    pageToken = data.page_token;
  }
  return ids;
}

async function getMessage(token, messageId) {
  const url = new URL(`${FEISHU_API_BASE}/open-apis/mail/v1/user_mailboxes/${encodeURIComponent(TARGET_MAIL)}/messages/${encodeURIComponent(messageId)}`);
  url.searchParams.set('format', 'metadata');
  const data = await requestJson(url, { headers: authHeaders(token), stage: 'get_message' });
  return data.message || {};
}

function summarizeMessage(message) {
  let ts = Number(message.internal_date || 0);
  if (ts > 0 && ts < 1e12) ts *= 1000;
  return {
    subject: message.subject || '',
    from: (message.head_from && message.head_from.mail_address) || '',
    ts,
    time: ts ? new Date(ts).toLocaleString('zh-CN', { hour12: false }) : '',
    attachments: (message.attachments || []).map((a) => ({ id: a.id, filename: a.filename, inline: !!a.is_inline })),
  };
}

async function getAttachmentUrls(token, messageId, attachmentIds) {
  const url = new URL(`${FEISHU_API_BASE}/open-apis/mail/v1/user_mailboxes/${encodeURIComponent(TARGET_MAIL)}/messages/${encodeURIComponent(messageId)}/attachments/download_url`);
  attachmentIds.forEach((id) => url.searchParams.append('attachment_ids', id));
  const data = await requestJson(url, { headers: authHeaders(token), stage: 'attachment_download_url' });
  return data.download_urls || [];
}

async function downloadBuffer(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`附件下载失败 ${res.status}`);
  return Buffer.from(await res.arrayBuffer());
}

async function unzipTargetFiles(buffer) {
  const zip = await JSZip.loadAsync(buffer);
  const files = {};
  await Promise.all(Object.keys(zip.files).map(async (name) => {
    const item = zip.files[name];
    if (item.dir) return;
    const base = name.split('/').pop();
    if (Object.values(REQUIRED).some((spec) => spec.file === base)) {
      files[base] = await item.async('nodebuffer');
    }
  }));
  return files;
}

function sheetRows(buffer) {
  const wb = XLSX.read(buffer, { type: 'buffer', cellDates: true });
  const ws = wb.Sheets[wb.SheetNames[0]];
  return XLSX.utils.sheet_to_json(ws, { raw: false, defval: '' });
}

