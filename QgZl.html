<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>随机点名</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f0f13;
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* 背景光晕 */
  body::before {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(240,192,64,.12) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  /* ── 设置面板 ───────────────────────────── */
  #setupPanel {
    width: 480px;
    background: #16161c;
    border: 1px solid #2a2a35;
    border-radius: 20px;
    padding: 36px 36px 32px;
    position: relative;
    z-index: 10;
  }

  .panel-title {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: #eeeef2;
    margin-bottom: 6px;
  }

  .panel-sub {
    font-size: 12px;
    color: #5a5a6a;
    margin-bottom: 24px;
  }

  label {
    display: block;
    font-size: 12px;
    color: #7a7a8a;
    margin-bottom: 6px;
    letter-spacing: .04em;
  }

  textarea {
    width: 100%;
    background: #0f0f13;
    border: 1px solid #2a2a35;
    border-radius: 10px;
    color: #eeeef2;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 14px;
    line-height: 1.9;
    padding: 12px 14px;
    resize: vertical;
    min-height: 140px;
    outline: none;
    transition: border-color .2s;
    margin-bottom: 20px;
  }
  textarea:focus { border-color: #f0c040; }

  .row { display: flex; gap: 12px; margin-bottom: 24px; }

  select {
    flex: 1;
    background: #0f0f13;
    border: 1px solid #2a2a35;
    border-radius: 10px;
    color: #eeeef2;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    cursor: pointer;
  }

  .btn-start {
    width: 100%;
    padding: 16px;
    background: #f0c040;
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #0f0f13;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    letter-spacing: .04em;
  }
  .btn-start:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(240,192,64,.4);
  }

  /* ── 抽人舞台 ───────────────────────────── */
  #stage {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100vw;
    height: 100vh;
    position: fixed;
    inset: 0;
    z-index: 20;
  }

  .stage-bg {
    position: absolute;
    inset: 0;
    background: #0f0f13;
  }

  /* 滚动槽 */
  .slot-wrap {
    position: relative;
    z-index: 2;
    width: 560px;
    text-align: center;
  }

  .slot-label {
    font-size: 13px;
    color: #5a5a6a;
    letter-spacing: .12em;
    text-transform: uppercase;
    font-family: 'Syne', sans-serif;
    margin-bottom: 28px;
  }

  /* 三行滚动窗口 */
  .slot-window {
    position: relative;
    height: 210px;
    overflow: hidden;
    border-radius: 16px;
    border: 1px solid #2a2a35;
    background: #13131a;
  }

  /* 顶底渐变遮罩 */
  .slot-window::before,
  .slot-window::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 60px;
    z-index: 3;
    pointer-events: none;
  }
  .slot-window::before {
    top: 0;
    background: linear-gradient(to bottom, #13131a, transparent);
  }
  .slot-window::after {
    bottom: 0;
    background: linear-gradient(to top, #13131a, transparent);
  }

  /* 中间高亮条 */
  .slot-highlight {
    position: absolute;
    top: 50%; left: 0; right: 0;
    height: 70px;
    transform: translateY(-50%);
    background: rgba(240,192,64,.07);
    border-top: 1px solid rgba(240,192,64,.25);
    border-bottom: 1px solid rgba(240,192,64,.25);
    z-index: 2;
    pointer-events: none;
  }

  #slotTrack {
    position: absolute;
    width: 100%;
    transition: transform 0s;
  }

  .slot-item {
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 700;
    color: #4a4a5a;
    transition: color .1s;
    letter-spacing: .02em;
  }

  .slot-item.active {
    color: #f0c040;
    text-shadow: 0 0 40px rgba(240,192,64,.6);
  }

  /* 结果展示 */
  #resultWrap {
    position: relative;
    z-index: 2;
    margin-top: 40px;
    text-align: center;
    min-height: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  #resultName {
    font-family: 'Syne', sans-serif;
    font-size: 52px;
    font-weight: 800;
    color: #f0c040;
    letter-spacing: -.01em;
    opacity: 0;
    transform: scale(.8);
    transition: opacity .4s, transform .4s;
    text-shadow: 0 0 60px rgba(240,192,64,.5);
  }

  #resultName.show {
    opacity: 1;
    transform: scale(1);
  }

  #resultSub {
    font-size: 14px;
    color: #5a5a6a;
    opacity: 0;
    transition: opacity .4s .2s;
    letter-spacing: .06em;
  }

  #resultSub.show { opacity: 1; }

  /* 控制按钮 */
  .stage-btns {
    position: relative;
    z-index: 2;
    display: flex;
    gap: 12px;
    margin-top: 40px;
  }

  .btn-again, .btn-back {
    padding: 12px 28px;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: transform .15s;
    border: none;
    letter-spacing: .04em;
  }

  .btn-again {
    background: #f0c040;
    color: #0f0f13;
  }

  .btn-back {
    background: transparent;
    color: #5a5a6a;
    border: 1px solid #2a2a35;
  }

  .btn-again:hover, .btn-back:hover { transform: translateY(-2px); }

  /* 粒子爆炸 */
  .particle {
    position: fixed;
    width: 8px; height: 8px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 100;
    animation: burst 1s ease-out forwards;
  }

  @keyframes burst {
    0%   { opacity: 1; transform: translate(0, 0) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
  }

  /* 闪光边框动画 */
  @keyframes borderPulse {
    0%, 100% { border-color: rgba(240,192,64,.25); }
    50%       { border-color: rgba(240,192,64,.7); }
  }

  .slot-window.spinning {
    animation: borderPulse .4s infinite;
  }

  /* 响应式 */
  @media (max-width: 600px) {
    #setupPanel { width: 92vw; padding: 24px 20px; }
    .slot-wrap { width: 92vw; }
    #resultName { font-size: 36px; }
  }
</style>
</head>
<body>

<!-- 设置面板 -->
<div id="setupPanel">
  <div class="panel-title">🎯 随机点名</div>
  <div class="panel-sub">输入名单，开始抽人</div>

  <label>名单（每行一个名字）</label>
  <textarea id="nameInput" placeholder="张三&#10;李四&#10;王五&#10;赵六&#10;陈七"></textarea>

  <div class="row">
    <div style="flex:1">
      <label>滚动速度</label>
      <select id="speed">
        <option value="fast">快速</option>
        <option value="medium" selected>中速</option>
        <option value="slow">慢速</option>
      </select>
    </div>
    <div style="flex:1">
      <label>动画时长</label>
      <select id="duration">
        <option value="2500">2.5 秒</option>
        <option value="3500" selected>3.5 秒</option>
        <option value="5000">5 秒</option>
      </select>
    </div>
  </div>

  <button class="btn-start" onclick="startDraw()">开始抽人 ✨</button>
</div>

<!-- 抽人舞台 -->
<div id="stage">
  <div class="stage-bg"></div>

  <div class="slot-wrap">
    <div class="slot-label">— 随机点名 —</div>
    <div class="slot-window" id="slotWindow">
      <div class="slot-highlight"></div>
      <div id="slotTrack"></div>
    </div>
  </div>

  <div id="resultWrap">
    <div id="resultName"></div>
    <div id="resultSub">本次点到的同学</div>
  </div>

  <div class="stage-btns">
    <button class="btn-again" onclick="drawAgain()">再抽一次</button>
    <button class="btn-back" onclick="goBack()">修改名单</button>
  </div>
</div>

<script>
let names = [];
let animFrame = null;
let isSpinning = false;

function getNames() {
  return document.getElementById('nameInput').value
    .split('\n').map(s => s.trim()).filter(Boolean);
}

function startDraw() {
  names = getNames();
  if (names.length < 2) { alert('请至少输入 2 个名字'); return; }

  document.getElementById('setupPanel').style.display = 'none';
  document.getElementById('stage').style.display = 'flex';

  buildTrack();
  spin();
}

function drawAgain() {
  if (isSpinning) return;
  // reset result
  document.getElementById('resultName').classList.remove('show');
  document.getElementById('resultSub').classList.remove('show');
  document.getElementById('resultName').textContent = '';
  document.getElementById('slotWindow').classList.remove('spinning');

  setTimeout(() => spin(), 300);
}

function goBack() {
  document.getElementById('stage').style.display = 'none';
  document.getElementById('setupPanel').style.display = 'block';
  document.getElementById('resultName').classList.remove('show');
  document.getElementById('resultSub').classList.remove('show');
}

// ── 构建轨道 ────────────────────────────────────────────

function buildTrack() {
  const track = document.getElementById('slotTrack');
  // 重复名单若干圈用于滚动
  const repeat = Math.max(6, Math.ceil(30 / names.length));
  let html = '';
  for (let r = 0; r < repeat; r++) {
    for (const name of names) {
      html += `<div class="slot-item">${name}</div>`;
    }
  }
  track.innerHTML = html;
}

// ── 核心滚动逻辑 ────────────────────────────────────────

function spin() {
  isSpinning = true;
  const track = document.getElementById('slotTrack');
  const slotWindow = document.getElementById('slotWindow');
  const ITEM_H = 70;
  const totalItems = track.children.length;

  // 随机确定中奖人
  const winnerLocalIdx = Math.floor(Math.random() * names.length);
  const winner = names[winnerLocalIdx];

  // 起始位置（从第 1 圈开始）
  const startOffset = names.length; // 跳过第一圈作为起始
  // 目标：停在倒数第2圈的中奖者
  const targetRepeat = Math.floor(totalItems / names.length) - 2;
  const targetItemIdx = targetRepeat * names.length + winnerLocalIdx;

  // 计算最终 translateY（让中奖者居中，窗口高 210px，item 高 70px，中间是 70-140px）
  const centerOffset = Math.floor(210 / 2) - ITEM_H / 2; // 70px
  const finalY = -(targetItemIdx * ITEM_H - centerOffset);

  // 起始 Y
  const startY = -(startOffset * ITEM_H - centerOffset);

  // 动画参数
  const duration = parseInt(document.getElementById('duration').value);
  const speedMode = document.getElementById('speed').value;

  slotWindow.classList.add('spinning');

  let startTime = null;

  function easeOutCubic(t) {
    return 1 - Math.pow(1 - t, 3);
  }

  function easeInOutQuart(t) {
    return t < 0.5 ? 8 * t * t * t * t : 1 - Math.pow(-2 * t + 2, 4) / 2;
  }

  // 中途快速滚动 + 末尾减速
  function animate(ts) {
    if (!startTime) startTime = ts;
    const elapsed = ts - startTime;
    const progress = Math.min(elapsed / duration, 1);

    // 前60%加速，后40%减速
    let eased;
    if (progress < 0.6) {
      eased = progress * (1/0.6) * 0.7; // 快速阶段到70%距离
      eased = eased;
    } else {
      const p2 = (progress - 0.6) / 0.4;
      eased = 0.7 + easeOutCubic(p2) * 0.3;
    }

    const currentY = startY + (finalY - startY) * eased;
    track.style.transform = `translateY(${currentY}px)`;

    // 高亮中间项
    updateHighlight(currentY, ITEM_H);

    if (progress < 1) {
      animFrame = requestAnimationFrame(animate);
    } else {
      // 动画结束
      track.style.transform = `translateY(${finalY}px)`;
      updateHighlight(finalY, ITEM_H);
      slotWindow.classList.remove('spinning');
      isSpinning = false;
      showResult(winner);
    }
  }

  animFrame = requestAnimationFrame(animate);
}

function updateHighlight(currentY, ITEM_H) {
  const track = document.getElementById('slotTrack');
  const items = track.querySelectorAll('.slot-item');
  // 中间可见的 item index
  const centerY = -currentY + 105 - 35; // 105 = 210/2, 35 = ITEM_H/2
  const centerIdx = Math.round(centerY / ITEM_H);

  items.forEach((el, i) => {
    el.classList.toggle('active', i === centerIdx);
  });
}

function showResult(name) {
  const el = document.getElementById('resultName');
  el.textContent = name;
  setTimeout(() => {
    el.classList.add('show');
    document.getElementById('resultSub').classList.add('show');
    burst();
  }, 100);
}

// ── 粒子爆炸 ────────────────────────────────────────────

function burst() {
  const colors = ['#f0c040', '#e05a2b', '#60d8a8', '#a78bfa', '#f472b6', '#fff'];
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2 - 40;

  for (let i = 0; i < 36; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (i / 36) * Math.PI * 2;
    const dist = 80 + Math.random() * 160;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist;
    p.style.cssText = `
      left: ${cx}px; top: ${cy}px;
      background: ${colors[i % colors.length]};
      --tx: ${tx}px; --ty: ${ty}px;
      width: ${4 + Math.random() * 8}px;
      height: ${4 + Math.random() * 8}px;
      animation-duration: ${0.8 + Math.random() * 0.6}s;
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1500);
  }
}
</script>
</body>
</html>
