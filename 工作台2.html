<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工作台 v2.1</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue','PingFang SC',sans-serif;
  height:100vh;display:flex;overflow:hidden;font-size:13px;
  background:linear-gradient(135deg,#dce8ff 0%,#e8d5f5 35%,#d5e8f5 65%,#ddf0e8 100%);
  position:relative;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse at 15% 15%,rgba(147,197,253,0.5) 0%,transparent 50%),
    radial-gradient(ellipse at 85% 80%,rgba(196,181,253,0.4) 0%,transparent 50%),
    radial-gradient(ellipse at 55% 5%,rgba(167,243,208,0.3) 0%,transparent 40%);
}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.15);border-radius:2px}
@keyframes cardIn{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes checkPop{0%{transform:scale(1)}35%{transform:scale(1.28)}70%{transform:scale(.91)}100%{transform:scale(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ── SIDEBAR ── */
.sidebar{
  width:200px;min-width:200px;height:100vh;display:flex;flex-direction:column;z-index:10;position:relative;
  background:rgba(255,255,255,0.52);
  backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);
  border-right:0.5px solid rgba(255,255,255,0.8);
}
.sb-head{padding:18px 14px 12px;border-bottom:0.5px solid rgba(0,0,0,0.06);}
.sb-brand{display:flex;align-items:baseline;gap:6px;}
.sb-title{font-size:15px;font-weight:700;color:#1a1a2e;letter-spacing:-0.4px;}
.sb-ver{font-size:10px;color:rgba(0,0,0,0.28);font-family:monospace;}
.sb-stats{display:flex;margin-top:11px;background:rgba(255,255,255,0.65);border-radius:10px;overflow:hidden;border:0.5px solid rgba(0,0,0,0.07);}
.sb-stat{flex:1;text-align:center;padding:7px 3px;border-right:0.5px solid rgba(0,0,0,0.06);}
.sb-stat:last-child{border-right:none;}
.sb-num{display:block;font-size:16px;font-weight:700;color:#1a1a2e;}
.sb-lbl{display:block;font-size:9px;color:rgba(0,0,0,0.35);margin-top:1px;}
.hm-wrap{padding:11px 14px 10px;}
.hm-lbl{font-size:9px;color:rgba(0,0,0,0.3);margin-bottom:5px;letter-spacing:.05em;text-transform:uppercase;}
.hm{display:grid;grid-template-columns:repeat(13,1fr);gap:2.5px;}
.hm-c{aspect-ratio:1;border-radius:2px;background:rgba(0,0,0,0.07);}
.hm-c.l1{background:rgba(99,102,241,0.22);}
.hm-c.l2{background:rgba(99,102,241,0.5);}
.hm-c.l3{background:rgba(99,102,241,0.82);}
.sb-div{height:0.5px;background:rgba(0,0,0,0.07);margin:0 14px;}
.sb-nav{padding:7px;}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;cursor:pointer;font-size:12.5px;color:rgba(0,0,0,0.45);transition:all .16s;user-select:none;}
.nav-item:hover{background:rgba(255,255,255,0.6);color:rgba(0,0,0,0.75);}
.nav-item.active{background:rgba(255,255,255,0.78);color:#4338ca;font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,0.08);}
.nav-item i{font-size:15px;color:rgba(0,0,0,0.3);}
.nav-item.active i{color:#6366f1;}
.sb-sec-lbl{padding:11px 14px 4px;font-size:9px;color:rgba(0,0,0,0.28);letter-spacing:.08em;text-transform:uppercase;}
.tag-row{display:flex;align-items:center;gap:7px;padding:5px 10px;border-radius:7px;cursor:pointer;font-size:11.5px;color:rgba(0,0,0,0.45);transition:all .14s;}
.tag-row:hover{background:rgba(255,255,255,0.55);color:rgba(0,0,0,0.75);}
.tag-row.active-tag{background:rgba(255,255,255,0.68);color:#4338ca;}
.tag-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.tag-count{margin-left:auto;font-size:9px;color:rgba(0,0,0,0.22);}
.sb-footer{margin-top:auto;border-top:0.5px solid rgba(0,0,0,0.06);padding:9px 12px;}
.sync-row{display:flex;align-items:center;gap:6px;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:rgba(0,0,0,0.2);flex-shrink:0;}
.sync-dot.ok{background:#22c55e;box-shadow:0 0 5px rgba(34,197,94,0.5);}
.sync-dot.err{background:#ef4444;}
.sync-dot.ing{background:#f59e0b;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.sync-text{font-size:10px;color:rgba(0,0,0,0.35);flex:1;}
.sync-cfg{font-size:10px;color:rgba(0,0,0,0.38);background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:4px;font-family:inherit;}
.sync-cfg:hover{background:rgba(0,0,0,0.05);}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;z-index:1;position:relative;}
.topbar{
  padding:0 22px;height:50px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,255,255,0.4);backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);
  border-bottom:0.5px solid rgba(255,255,255,0.75);
}
.topbar-title{font-size:15px;font-weight:700;color:#1a1a2e;letter-spacing:-0.3px;}
.topbar-right{display:flex;align-items:center;gap:7px;}
.batch-btn{font-size:11.5px;color:rgba(0,0,0,0.45);background:rgba(255,255,255,0.55);border:0.5px solid rgba(0,0,0,0.1);border-radius:8px;padding:5px 11px;cursor:pointer;font-family:inherit;transition:all .12s;}
.batch-btn:hover{background:rgba(255,255,255,0.8);color:#4338ca;}
.search-wrap{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.55);border:0.5px solid rgba(0,0,0,0.1);border-radius:8px;padding:5px 11px;min-width:140px;}
.search-wrap input{border:none;outline:none;background:none;font-size:12px;color:#1a1a2e;width:100%;font-family:inherit;}
.search-wrap input::placeholder{color:rgba(0,0,0,0.28);}

/* ── CAPTURE ── */
.capture{padding:14px 22px 8px;flex-shrink:0;}
.cap-card{
  background:rgba(255,255,255,0.65);backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%);
  border:0.5px solid rgba(255,255,255,0.9);border-radius:13px;padding:3px;
  box-shadow:0 2px 12px rgba(0,0,0,0.07),0 1px 3px rgba(0,0,0,0.04);
  transition:box-shadow .2s,border-color .2s;
}
.cap-card:focus-within{border-color:rgba(99,102,241,0.45);box-shadow:0 0 0 3px rgba(99,102,241,0.1),0 2px 12px rgba(0,0,0,0.08);}
.cap-input{width:100%;border:none;outline:none;background:transparent;font-family:inherit;font-size:13.5px;color:#1a1a2e;padding:10px 13px 7px;resize:none;line-height:1.55;min-height:44px;}
.cap-input::placeholder{color:rgba(0,0,0,0.25);}
.cap-bar{display:flex;align-items:center;gap:5px;padding:5px 9px;border-top:0.5px solid rgba(0,0,0,0.06);}
.cap-tag-btn{height:22px;padding:0 10px;border-radius:11px;border:0.5px solid rgba(0,0,0,0.1);background:rgba(0,0,0,0.04);font-size:11px;color:rgba(0,0,0,0.45);cursor:pointer;font-family:inherit;transition:all .12s;}
.cap-tag-btn:hover{background:rgba(99,102,241,0.08);border-color:rgba(99,102,241,0.25);color:#4f46e5;}
.cap-hint{font-size:10px;color:rgba(0,0,0,0.22);margin-left:3px;}
.cap-submit{margin-left:auto;height:27px;padding:0 15px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:13px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity .12s,transform .1s;box-shadow:0 2px 8px rgba(99,102,241,0.3);}
.cap-submit:hover{opacity:.88;}
.cap-submit:active{transform:scale(.97);}

/* ── STREAM ── */
.stream{flex:1;overflow-y:auto;padding:4px 22px 16px;}
.date-sep{font-size:10px;color:rgba(0,0,0,0.28);margin:10px 0 10px;display:flex;align-items:center;gap:8px;letter-spacing:.04em;text-transform:uppercase;}
.date-sep::after{content:'';flex:1;height:.5px;background:rgba(0,0,0,0.08);}

/* ── NOTE CARDS ── */
.card{
  background:rgba(255,255,255,0.62);backdrop-filter:blur(20px) saturate(150%);-webkit-backdrop-filter:blur(20px) saturate(150%);
  border:0.5px solid rgba(255,255,255,0.9);border-radius:12px;padding:11px 13px;margin-bottom:7px;
  box-shadow:0 1px 4px rgba(0,0,0,0.05),0 4px 12px rgba(0,0,0,0.04);
  transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .18s,border-color .15s;
  animation:cardIn .28s cubic-bezier(.34,1.56,.64,1) both;
}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.1),0 2px 6px rgba(0,0,0,0.06);border-color:rgba(255,255,255,1);}
.card-meta{display:flex;justify-content:space-between;margin-bottom:7px;}
.card-time{font-size:10px;color:rgba(0,0,0,0.3);font-family:monospace;}
.card-actions{display:flex;gap:3px;opacity:0;transition:opacity .15s;}
.card:hover .card-actions{opacity:1;}
.card-btn{background:none;border:0.5px solid rgba(0,0,0,0.12);border-radius:20px;padding:2px 8px;font-size:10px;cursor:pointer;color:rgba(0,0,0,0.4);transition:all .1s;font-family:inherit;}
.card-btn:hover{background:rgba(0,0,0,0.05);color:rgba(0,0,0,0.75);}
.card-btn.to-todo{color:#0369a1;border-color:rgba(14,165,233,0.3);}
.card-btn.to-todo:hover{background:rgba(14,165,233,0.08);}
.card-btn.to-exp{color:#047857;border-color:rgba(16,185,129,0.3);}
.card-btn.to-exp:hover{background:rgba(16,185,129,0.08);}
.card-body{font-size:13px;color:rgba(0,0,0,0.78);line-height:1.65;white-space:pre-wrap;word-break:break-word;cursor:default;}
.card-body[contenteditable="true"]{outline:none;border-bottom:1.5px solid #6366f1;cursor:text;}
.card-tags{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap;}
.note-imgs{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px;}
.note-img-wrap{position:relative;}
.note-img{width:70px;height:70px;object-fit:cover;border-radius:6px;border:0.5px solid rgba(0,0,0,0.08);cursor:pointer;transition:opacity .1s;}
.note-img:hover{opacity:.82;}
.note-img-del{position:absolute;top:-5px;right:-5px;width:16px;height:16px;border-radius:50%;background:#ef4444;color:white;border:none;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;}
.pill{font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(0,0,0,0.05);color:rgba(0,0,0,0.45);border:0.5px solid rgba(0,0,0,0.08);}

/* ── TODOS ── */
.todo-wrap{
  background:rgba(255,255,255,0.55);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:0.5px solid rgba(255,255,255,0.88);border-radius:12px;overflow:hidden;margin-bottom:8px;
  box-shadow:0 1px 4px rgba(0,0,0,0.05),0 4px 12px rgba(0,0,0,0.04);
}
.todo-row{display:flex;align-items:flex-start;gap:10px;padding:10px 13px;border-bottom:0.5px solid rgba(0,0,0,0.05);transition:background .12s;animation:cardIn .25s cubic-bezier(.34,1.56,.64,1) both;position:relative;}
.todo-row:last-child{border-bottom:none;}
.todo-row:hover{background:rgba(255,255,255,0.45);}
.todo-row.pinned{background:rgba(251,191,36,0.07);border-left:2.5px solid rgba(245,158,11,0.5);}
.todo-row.active-next{background:rgba(99,102,241,0.04);}
.todo-circle{width:17px;height:17px;border-radius:50%;border:1.5px solid rgba(0,0,0,0.2);flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.todo-circle:hover{border-color:#6366f1;background:rgba(99,102,241,0.06);}
.todo-circle.done{background:#22c55e;border-color:#22c55e;animation:checkPop .28s cubic-bezier(.34,1.56,.64,1);}
.todo-circle.done::after{content:'';width:5px;height:3px;border-left:1.5px solid white;border-bottom:1.5px solid white;transform:rotate(-45deg) translateY(-1px);display:block;}
.todo-circle.locked{border-color:rgba(0,0,0,0.1);cursor:not-allowed;}
.todo-body{flex:1;min-width:0;}
.todo-title{font-size:13px;color:rgba(0,0,0,0.8);line-height:1.45;cursor:pointer;}
.todo-title:not(.done):not(.locked-t):hover{color:#4338ca;}
.todo-title.done{color:rgba(0,0,0,0.28);text-decoration:line-through;cursor:default;}
.todo-title.locked-t{color:rgba(0,0,0,0.28);cursor:default;}
.todo-title[contenteditable="true"]{outline:none;border-bottom:1.5px solid #6366f1;cursor:text;}
.todo-sub{display:flex;gap:5px;margin-top:3px;align-items:center;flex-wrap:wrap;}
.todo-date{font-size:10px;color:rgba(0,0,0,0.3);}
.todo-tag-pill{font-size:10px;padding:1px 6px;border-radius:20px;background:rgba(0,0,0,0.05);color:rgba(0,0,0,0.38);border:0.5px solid rgba(0,0,0,0.07);}
.badge-chain{font-size:10px;padding:1px 7px;border-radius:20px;background:rgba(16,185,129,0.1);color:#047857;border:0.5px solid rgba(16,185,129,0.25);}
.badge-next{font-size:10px;padding:1px 7px;border-radius:20px;background:rgba(99,102,241,0.1);color:#4338ca;border:0.5px solid rgba(99,102,241,0.25);}
.badge-lock{font-size:10px;padding:1px 7px;border-radius:20px;background:rgba(0,0,0,0.04);color:rgba(0,0,0,0.3);border:0.5px solid rgba(0,0,0,0.07);}
.todo-actions{display:flex;gap:3px;margin-left:auto;opacity:0;transition:opacity .15s;flex-shrink:0;align-items:center;}
.todo-row:hover .todo-actions{opacity:1;}
.t-btn{background:none;border:0.5px solid rgba(0,0,0,0.1);border-radius:20px;padding:2px 8px;font-size:10px;cursor:pointer;color:rgba(0,0,0,0.38);font-family:inherit;white-space:nowrap;transition:all .1s;}
.t-btn:hover{background:rgba(0,0,0,0.05);color:rgba(0,0,0,0.7);}
.t-btn.chain-btn{color:#4338ca;border-color:rgba(99,102,241,0.3);}
.t-btn.chain-btn:hover{background:rgba(99,102,241,0.07);}
.t-btn.pin-active{color:#b45309;border-color:rgba(245,158,11,0.35);}
.chain-connector{display:flex;align-items:center;padding:0 21px;height:18px;}
.chain-line{width:1.5px;height:100%;background:rgba(0,0,0,0.1);margin-left:6.5px;}
.chain-line.unlocked{background:rgba(34,197,94,0.45);}
.chain-label{margin-left:11px;font-size:9px;color:rgba(0,0,0,0.28);}
.chain-add-area{padding:8px 13px 8px 38px;border-top:0.5px solid rgba(0,0,0,0.05);background:rgba(99,102,241,0.03);}
.chain-add-label{font-size:10px;color:#4338ca;margin-bottom:6px;}
.chain-add-row{display:flex;gap:6px;}
.chain-add-input{flex:1;border:0.5px solid rgba(99,102,241,0.35);border-radius:7px;padding:6px 10px;font-size:12.5px;color:#1a1a2e;background:rgba(99,102,241,0.05);font-family:inherit;outline:none;}
.chain-add-input:focus{box-shadow:0 0 0 2px rgba(99,102,241,0.15);}
.chain-add-ok{background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:7px;padding:6px 13px;font-size:11.5px;color:white;cursor:pointer;font-family:inherit;font-weight:600;box-shadow:0 2px 6px rgba(99,102,241,0.3);}
.chain-add-cancel{background:rgba(0,0,0,0.04);border:0.5px solid rgba(0,0,0,0.1);border-radius:7px;padding:6px 10px;font-size:11.5px;color:rgba(0,0,0,0.45);cursor:pointer;font-family:inherit;}
.add-todo-row{display:flex;align-items:center;gap:8px;padding:9px 13px;color:rgba(0,0,0,0.3);font-size:12px;cursor:pointer;transition:all .12s;}
.add-todo-row:hover{color:#4338ca;background:rgba(99,102,241,0.04);}
.sec-done{font-size:10px;color:rgba(0,0,0,0.25);padding:10px 0 8px;display:flex;align-items:center;gap:8px;letter-spacing:.04em;text-transform:uppercase;}
.sec-done::after{content:'';flex:1;height:.5px;background:rgba(0,0,0,0.07);}

/* ── EXPERIENCE ── */
.exp-filter{display:flex;gap:5px;margin-bottom:11px;flex-wrap:wrap;}
.ef-btn{padding:4px 12px;border-radius:20px;font-size:11px;cursor:pointer;border:0.5px solid rgba(0,0,0,0.1);background:rgba(255,255,255,0.52);color:rgba(0,0,0,0.45);transition:all .14s;font-family:inherit;}
.ef-btn:hover{background:rgba(255,255,255,0.75);color:rgba(0,0,0,0.7);}
.ef-btn.active-f{font-weight:600;background:rgba(255,255,255,0.78);color:#1a1a2e;border-color:rgba(0,0,0,0.15);box-shadow:0 1px 4px rgba(0,0,0,0.08);}
.exp-card{
  background:rgba(255,255,255,0.62);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:0.5px solid rgba(255,255,255,0.9);border-radius:12px;padding:11px 13px;margin-bottom:7px;
  box-shadow:0 1px 4px rgba(0,0,0,0.05);
  transition:transform .18s cubic-bezier(.34,1.56,.64,1),box-shadow .16s;
  animation:cardIn .28s cubic-bezier(.34,1.56,.64,1) both;
}
.exp-card:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(0,0,0,0.09);}
.exp-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px;}
.exp-title{font-size:13.5px;font-weight:600;color:rgba(0,0,0,0.82);line-height:1.4;}
.exp-badge{font-size:9.5px;padding:2px 8px;border-radius:20px;font-weight:600;flex-shrink:0;}
.exp-badge.lesson{background:rgba(16,185,129,0.12);color:#047857;}
.exp-badge.pitfall{background:rgba(239,68,68,0.1);color:#b91c1c;}
.exp-badge.pattern{background:rgba(139,92,246,0.12);color:#6d28d9;}
.exp-body{font-size:12px;color:rgba(0,0,0,0.5);line-height:1.65;}
.exp-footer{display:flex;gap:4px;margin-top:8px;align-items:center;flex-wrap:wrap;}
.exp-date{margin-left:auto;font-size:10px;color:rgba(0,0,0,0.25);font-family:monospace;}

/* ── MODALS ── */
.modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.2);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);align-items:center;justify-content:center;animation:fadeIn .15s ease;}
.modal-overlay.open{display:flex;}
.modal{background:rgba(255,255,255,0.88);backdrop-filter:blur(30px) saturate(180%);-webkit-backdrop-filter:blur(30px) saturate(180%);border-radius:16px;border:0.5px solid rgba(255,255,255,0.95);padding:22px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,0.15),0 4px 12px rgba(0,0,0,0.08);animation:slideUp .22s cubic-bezier(.34,1.56,.64,1);}
.modal h3{font-size:14px;font-weight:700;margin-bottom:14px;color:#1a1a2e;}
.modal-sub{font-size:11px;color:rgba(0,0,0,0.45);margin-bottom:16px;line-height:1.6;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:11px;color:rgba(0,0,0,0.5);margin-bottom:5px;font-weight:500;}
.field input{width:100%;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:8px 11px;font-size:13px;color:#1a1a2e;background:rgba(255,255,255,0.7);font-family:inherit;outline:none;transition:border-color .15s,box-shadow .15s;}
.field input:focus{border-color:rgba(99,102,241,0.5);box-shadow:0 0 0 3px rgba(99,102,241,0.1);background:rgba(255,255,255,0.9);}
.field .hint{font-size:10px;color:rgba(0,0,0,0.3);margin-top:3px;}
.field .hint a{color:#4f46e5;text-decoration:none;}
.token-row{display:flex;gap:6px;}
.token-row input{flex:1;}
.toggle-vis{padding:8px 10px;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;background:rgba(255,255,255,0.6);font-size:11px;color:rgba(0,0,0,0.5);cursor:pointer;white-space:nowrap;font-family:inherit;}
.modal-btns{display:flex;gap:8px;margin-top:18px;}
.btn-cancel{flex:1;padding:9px;border:0.5px solid rgba(0,0,0,0.15);border-radius:9px;background:rgba(255,255,255,0.6);font-size:13px;color:rgba(0,0,0,0.5);cursor:pointer;font-family:inherit;transition:all .12s;}
.btn-cancel:hover{background:rgba(255,255,255,0.85);}
.btn-primary{flex:1;padding:9px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:9px;font-size:13px;color:white;cursor:pointer;font-weight:600;font-family:inherit;transition:opacity .1s;box-shadow:0 2px 8px rgba(99,102,241,0.3);}

.tag-grid{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;}

.exp-type-row{display:flex;gap:6px;margin-bottom:14px;}
.exp-type-opt{flex:1;padding:7px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.12);background:rgba(255,255,255,0.6);font-size:12px;cursor:pointer;font-family:inherit;color:rgba(0,0,0,0.5);transition:all .1s;text-align:center;}
.exp-type-opt.al{background:rgba(16,185,129,0.1);color:#047857;border-color:rgba(16,185,129,0.3);}
.exp-type-opt.ap{background:rgba(239,68,68,0.08);color:#b91c1c;border-color:rgba(239,68,68,0.25);}
.exp-type-opt.am{background:rgba(139,92,246,0.1);color:#6d28d9;border-color:rgba(139,92,246,0.3);}
.batch-list{max-height:240px;overflow-y:auto;margin-bottom:12px;}
.batch-row{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:7px;cursor:pointer;margin-bottom:3px;transition:background .1s;}
.batch-row:hover{background:rgba(0,0,0,0.04);}
.batch-row.sel{background:rgba(99,102,241,0.08);}
.batch-check{width:16px;height:16px;border-radius:50%;border:1.5px solid rgba(0,0,0,0.2);display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;transition:all .1s;}
.batch-row.sel .batch-check{background:#6366f1;border-color:#6366f1;color:white;}
.batch-txt{flex:1;font-size:12.5px;color:#1a1a2e;}
.batch-dt{font-size:10px;color:rgba(0,0,0,0.3);}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:rgba(26,26,46,0.88);backdrop-filter:blur(20px);color:rgba(255,255,255,0.92);padding:8px 18px;border-radius:20px;font-size:12px;z-index:500;opacity:0;pointer-events:none;transition:all .22s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;border:0.5px solid rgba(255,255,255,0.15);box-shadow:0 4px 16px rgba(0,0,0,0.18);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* IMG PREVIEW */
.img-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.72);backdrop-filter:blur(10px);align-items:center;justify-content:center;animation:fadeIn .15s ease;}
.img-overlay.open{display:flex;}

<body>

<div class="sidebar">
  <div class="sb-head">
    <div class="sb-brand"><span class="sb-title">工作台</span><span class="sb-ver">v2.1</span></div>
    <div class="sb-stats">

  <div class="sb-nav">
    <div class="nav-item active" data-mode="todos" onclick="switchMode('todos')"><i class="ti ti-checkbox" aria-hidden="true"></i>待办任务</div>

        <input id="search-input" placeholder="搜索  ⌘K" oninput="handleSearch()" />

<!-- TAG MODAL -->

    <div class="field">
      <label>改到哪天</label>

      <button class="btn-cancel" onclick="closeModal('batch')">取消</button>
      <button class="btn-primary" onclick="confirmBatch()">确定</button>
    </div>

</div>

<!-- SYNC MODAL -->
<div class="modal-overlay" id="modal-sync" onclick="if(event.target===this)closeModal('sync')">
  <div class="modal">
    <h3>GitHub 同步配置</h3>
    <div class="modal-sub">数据保存到 GitHub 私有仓库，Token 仅存在本地浏览器。</div>
    <div class="field"><label>GitHub 用户名</label><input id="gh-owner" placeholder="your-username" /></div>
    <div class="field"><label>仓库名</label><input id="gh-repo" placeholder="my-workbench-data" /><div class="hint">建议设为私有仓库</div></div>

      <div class="token-row">
        <input type="password" id="gh-token" placeholder="ghp_ 或 github_pat_ 开头" />
        <button class="toggle-vis" onclick="toggleTokenVis()">显示</button>
      </div>
      <div class="hint">需要 repo / Contents 权限 · <a href="https://github.com/settings/tokens/new" target="_blank">如何获取 →</a></div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('sync')">跳过</button>
      <button class="btn-primary" onclick="saveSyncCfg()">保存并同步</button>
    </div>
  </div>
</div>

<!-- IMG PREVIEW -->
<div class="img-overlay" id="img-overlay" onclick="closeImgPreview()">
  <img id="img-preview" style="max-width:90vw;max-height:90vh;border-radius:10px;" />
</div>

<div class="toast" id="toast"></div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">

<script>
const TAGS=[
  {id:'auth',label:'#认证',color:'#0ea5e9'},
  {id:'arch',label:'#架构',color:'#8b5cf6'},
  {id:'db',label:'#数据库',color:'#f59e0b'},
  {id:'design',label:'#设计',color:'#10b981'},
  {id:'ops',label:'#运维',color:'#ef4444'},
  {id:'mgmt',label:'#管理',color:'#6366f1'},
];
const GH_FILE='workbench-data.json';
let _ghSha=null,_syncTimer=null;

let notes=[
  {id:1,time:'14:32',date:'今天',text:'重构认证模块，拆分三层：TokenService 签发 JWT，SessionStore 管 Redis 会话，AuthMiddleware 拦截请求。迁移期间双写，两周后切断旧链路。',tags:['auth','arch'],images:[]},
  {id:2,time:'11:05',date:'今天',text:'adapter 模式包旧接口，迁移期间无需停服，可逐步切换，出问题方便回滚。（双击可编辑）',tags:['arch'],images:[]},
  {id:3,time:'16:44',date:'昨天',text:'Redis 滑动窗口比固定过期更适合长时间在线用户，每次请求后重置计时。',tags:['auth','db'],images:[]},
];
let todos=[
  {id:1,done:false,text:'和张三开会，确认方案方向',date:'今天',tags:['mgmt'],pinned:false,nextId:2,locked:false},
  {id:2,done:false,text:'根据会议共识，起草方案初稿',date:'后天',tags:['design'],pinned:false,nextId:null,locked:true},
  {id:3,done:false,text:'评审 API 设计文档（双击编辑）',date:'今天',tags:['design'],pinned:true,nextId:null,locked:false},
  {id:4,done:true,text:'整理接口文档',date:'已完成',tags:['design'],pinned:false,nextId:null,locked:false},
];
let experiences=[
  {id:1,type:'lesson',title:'JWT 续签要加滑动窗口',body:'固定过期导致频繁被踢出，改用活跃续签后投诉降 80%。',tags:['auth'],date:'3天前'},
  {id:2,type:'pitfall',title:'数据库迁移脚本必须幂等',body:'重复执行导致数据双写，加 IF NOT EXISTS 保护。',tags:['db'],date:'1周前'},
  {id:3,type:'pattern',title:'Adapter 模式做新旧兼容',body:'包旧接口，迁移期间无需停服，可逐步切换。',tags:['arch'],date:'2周前'},
];

let mode='todos',activeTag=null,expFilter='all',searchText='';
let pendingTagTarget=null,pendingSelTags=[];
let pendingExpNoteId=null,pendingExpType='lesson';
let addingChainFor=null,batchSel={};
let composePendingImgs=[];

function uid(){return Date.now()+Math.random().toString(36).slice(2,6);}
function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function getTag(id){return TAGS.find(t=>t.id===id);}
function tagLabel(id){const t=getTag(id);return t?t.label:'#'+id;}
function tagColor(id){const t=getTag(id);return t?t.color:'#888';}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2200);
}

/* DATA */
function loadData(){
  try{const r=localStorage.getItem('wb_v21');if(r){const d=JSON.parse(r);if(d.notes)notes=d.notes;if(d.todos)todos=d.todos;if(d.experiences)experiences=d.experiences;}}catch(e){}
}
function saveLocal(){localStorage.setItem('wb_v21',JSON.stringify({notes,todos,experiences}));}
function save(){saveLocal();schedulePush();}

/* GITHUB */
function ghCfg(){try{return JSON.parse(localStorage.getItem('wb_gh')||'null');}catch(e){return null;}}
function ghConfigured(){const c=ghCfg();return !!(c&&c.token&&c.owner&&c.repo);}
function ghHeaders(){
  const c=ghCfg();
  const auth=c.token.startsWith('github_pat_')?'Bearer '+c.token:'token '+c.token;
  return{'Authorization':auth,'Content-Type':'application/json','Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'};
}
function ghUrl(){const c=ghCfg();return'https://api.github.com/repos/'+c.owner.trim()+'/'+c.repo.trim()+'/contents/'+GH_FILE;}
function setSyncStatus(state,msg){
  const dot=document.getElementById('sync-dot'),txt=document.getElementById('sync-text');
  if(dot)dot.className='sync-dot'+(state?' '+state:'');
  if(txt)txt.textContent=msg||'未配置同步';
}
async function ghPush(){
  if(!ghConfigured())return;
  setSyncStatus('ing','同步中…');
  try{
    const content=btoa(unescape(encodeURIComponent(JSON.stringify({notes,todos,experiences},null,2))));
    const body={message:'sync '+new Date().toISOString(),content};
    if(_ghSha)body.sha=_ghSha;
    const r=await fetch(ghUrl(),{method:'PUT',headers:ghHeaders(),body:JSON.stringify(body)});
    if(!r.ok){const e=await r.json();throw new Error(e.message||'HTTP '+r.status);}
    const j=await r.json();_ghSha=j.content.sha;
    const t=new Date();setSyncStatus('ok','已同步 '+t.getHours()+':'+String(t.getMinutes()).padStart(2,'0'));
  }catch(e){setSyncStatus('err','同步失败: '+e.message);}
}
async function ghPull(){
  if(!ghConfigured())return;
  setSyncStatus('ing','加载中…');
  try{
    const r=await fetch(ghUrl(),{headers:ghHeaders()});
    if(r.status===404){await ghPush();return;}
    if(!r.ok)throw new Error('HTTP '+r.status);
    const j=await r.json();_ghSha=j.sha;
    const remote=JSON.parse(decodeURIComponent(escape(atob(j.content.replace(/\n/g,'')))));
    if(remote.notes)notes=remote.notes;if(remote.todos)todos=remote.todos;if(remote.experiences)experiences=remote.experiences;
    saveLocal();renderAll();setSyncStatus('ok','已从云端加载');
  }catch(e){setSyncStatus('err','读取失败: '+e.message);}
}
function schedulePush(){if(_syncTimer)clearTimeout(_syncTimer);_syncTimer=setTimeout(ghPush,1500);}
function openSyncForm(){
  const c=ghCfg()||{};
  document.getElementById('gh-owner').value=c.owner||'';
  document.getElementById('gh-repo').value=c.repo||'';
  document.getElementById('gh-token').value=c.token||'';
}
function toggleTokenVis(){
  const inp=document.getElementById('gh-token'),btn=inp.nextElementSibling;
  inp.type=inp.type==='password'?'text':'password';btn.textContent=inp.type==='password'?'显示':'隐藏';
}
function saveSyncCfg(){
  const o=document.getElementById('gh-owner').value.trim();
  const r=document.getElementById('gh-repo').value.trim();
  const t=document.getElementById('gh-token').value.trim();
  if(!o||!r||!t){toast('请填写完整配置');return;}
  localStorage.setItem('wb_gh',JSON.stringify({owner:o,repo:r,token:t}));
  closeModal('sync');toast('配置已保存，开始同步…');ghPull();
}

/* MODE */
function switchMode(m){
  mode=m;activeTag=null;addingChainFor=null;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.mode===m));
  document.getElementById('main-title').textContent=m==='todos'?'待办任务':m==='notes'?'全部笔记':'经验库';
  document.getElementById('batch-btn').style.display=m==='todos'?'':'none';
  renderSidebarTags();render();
}
function filterByTag(tagId){
  activeTag=(activeTag===tagId)?null:tagId;
  renderSidebarTags();render();
}
function handleSearch(){searchText=document.getElementById('search-input').value.trim().toLowerCase();render();}
function matchSearch(text,tags){
  if(!searchText)return true;
  if(text.toLowerCase().includes(searchText))return true;
  return tags.some(t=>tagLabel(t).includes(searchText));
}
function render(){
  const s=document.getElementById('stream'),cap=document.getElementById('capture-area');
  if(mode==='todos'){renderCaptureTodo(cap);renderTodos(s);}
  else if(mode==='notes'){renderCaptureNote(cap);renderNotes(s);}
  else{cap.innerHTML='';renderExp(s);}
  updateCounts();
}
function renderAll(){render();renderSidebarTags();}

/* CAPTURE */
function renderCaptureTodo(cap){
  cap.innerHTML=`<div class="capture"><div class="cap-card">
    <input class="cap-input" id="cap-todo-inp" placeholder="记一件事... 回车添加" />
    <div class="cap-bar">
      <button class="cap-tag-btn" onclick="openTagModal('compose')"># 标签</button>
      <span id="cap-tags-display" style="display:flex;gap:4px;flex-wrap:wrap"></span>
      <span class="cap-hint">回车发送</span>
      <button class="cap-submit" onclick="addTodo()">添加</button>
    </div></div></div>`;
  const inp=document.getElementById('cap-todo-inp');
  if(inp)inp.onkeydown=e=>{if(e.key==='Enter')addTodo();};
  pendingSelTags=[];
}
function renderCaptureNote(cap){
  cap.innerHTML=`<div class="capture"><div class="cap-card">
    <textarea class="cap-input" id="cap-note-ta" placeholder="现在的想法是...  Ctrl+V 粘贴截图" rows="2" style="display:block;"></textarea>
    <div class="cap-bar">
      <button class="cap-tag-btn" onclick="openTagModal('compose')"># 标签</button>
      <button class="cap-tag-btn" style="font-weight:700">B</button>
      <button class="cap-tag-btn" style="font-style:italic">I</button>
      <span id="cap-tags-display" style="display:flex;gap:4px;flex-wrap:wrap"></span>
      <span class="cap-hint">⌘↩ 发送</span>
      <button class="cap-submit" onclick="addNote()">发送</button>
    </div></div></div>`;
  const ta=document.getElementById('cap-note-ta');
  if(ta){
    ta.onkeydown=e=>{if(e.key==='Enter'&&(e.metaKey||e.ctrlKey))addNote();};
    ta.onpaste=e=>handleImgPasteCompose(e);
  }
  pendingSelTags=[];composePendingImgs=[];
}

/* NOTES */
function renderNotes(s){
  let list=notes.filter(n=>(!activeTag||n.tags.includes(activeTag))&&matchSearch(n.text,n.tags));
  if(!list.length){s.innerHTML='<div style="text-align:center;padding:60px 0;color:rgba(0,0,0,0.28);font-size:13px">暂无笔记</div>';return;}
  let byDate={};
  list.forEach(n=>{(byDate[n.date]=byDate[n.date]||[]).push(n);});
  s.innerHTML=Object.entries(byDate).map(([date,ns])=>
    `<div class="date-sep">${date}</div>`+
    ns.map(n=>`<div class="card" id="note-${n.id}">
      <div class="card-meta">
        <span class="card-time">${n.time}</span>
        <div class="card-actions">
          <button class="card-btn to-todo" onclick="noteToTodo(${n.id})">→ 转为待办</button>
          <button class="card-btn to-exp" onclick="openExpModal(${n.id})">→ 转为经验</button>
          <button class="card-btn" onclick="openTagModal('note',${n.id})">标签</button>
          <button class="card-btn" onclick="deleteNote(${n.id})" style="color:#ef4444">删除</button>
        </div>
      </div>
      <div class="card-body" id="nb-${n.id}" ondblclick="editNote(${n.id})" title="双击编辑">${esc(n.text)}</div>
      ${(n.images&&n.images.length)?`<div class="note-imgs">${n.images.map((img,i)=>`<div class="note-img-wrap"><img src="${img}" class="note-img" onclick="previewImg('${img}')" /><button class="note-img-del" onclick="deleteNoteImg(${n.id},${i})">×</button></div>`).join('')}</div>`:''}
      ${n.tags.length?`<div class="card-tags">${n.tags.map(t=>`<span class="pill" style="color:${tagColor(t)}">${tagLabel(t)}</span>`).join('')}</div>`:''}
    </div>`).join('')
  ).join('');
  list.forEach(n=>{const el=document.getElementById('note-'+n.id);if(el)el.onpaste=e=>handleImgPaste(e,n.id);});
}
function editNote(id){
  const el=document.getElementById('nb-'+id);if(!el)return;
  el.contentEditable='true';el.focus();
  const range=document.createRange();range.selectNodeContents(el);range.collapse(false);
  window.getSelection().removeAllRanges();window.getSelection().addRange(range);
  const save=()=>{el.contentEditable='false';const n=notes.find(x=>x.id===id);if(n){n.text=el.textContent.trim();save();}};
  const saveAndStop=()=>{el.contentEditable='false';const n=notes.find(x=>x.id===id);if(n){n.text=el.textContent.trim();saveLocal();schedulePush();}};
  el.onblur=saveAndStop;
  el.onkeydown=e=>{if(e.key==='Enter'&&(e.metaKey||e.ctrlKey)){e.preventDefault();saveAndStop();}};
}
function deleteNote(id){
  if(!confirm('确认删除这条笔记？'))return;
  notes=notes.filter(n=>n.id!==id);save();render();toast('笔记已删除');
}
function noteToTodo(id){
  const n=notes.find(x=>x.id===id);if(!n)return;
  const text=n.text.slice(0,30)+(n.text.length>30?'…':'');
  todos.unshift({id:uid(),done:false,text,date:'今天',tags:[...n.tags],pinned:false,nextId:null,locked:false});
  save();render();toast('已转为待办');
}
function openExpModal(id){
  pendingExpNoteId=id;pendingExpType='lesson';
  ['lesson','pitfall','pattern'].forEach(t=>{
    const b=document.getElementById('eto-'+t);
    if(b)b.className='exp-type-opt'+(t==='lesson'?' al':'');

}
function selExpType(t){

  ['lesson','pitfall','pattern'].forEach(x=>{const b=document.getElementById('eto-'+x);if(b)b.className='exp-type-opt'+(x===t?' '+map[x]:'');});

function confirmExp(){
  const n=notes.find(x=>x.id===pendingExpNoteId);if(!n)return;

  save();closeModal('exp');render();toast('已转为经验');
}

/* TODOS */
function renderTodos(s){
  let pending=todos.filter(t=>!t.done&&(!activeTag||t.tags.includes(activeTag))&&matchSearch(t.text,t.tags));
  let done=todos.filter(t=>t.done&&(!activeTag||t.tags.includes(activeTag))&&matchSearch(t.text,t.tags));
  pending.sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0));
  let html='<div class="todo-wrap">';
  if(!pending.length)html+='<div style="padding:14px 13px;font-size:12px;color:rgba(0,0,0,0.3)">今天的任务都完成了 🎉</div>';
  else html+=renderChainedTodos(pending);
  html+=`<div class="add-todo-row" onclick="focusTodoCap()"><i class="ti ti-plus" style="font-size:13px" aria-hidden="true"></i> 新增待办</div></div>`;
  if(done.length){html+='<div class="sec-done">已完成</div><div class="todo-wrap">'+done.map(todoRowHTML).join('')+'</div>';}
  s.innerHTML=html;
}
function renderChainedTodos(list){
  let html='';
  list.forEach(t=>{
    html+=todoRowHTML(t);
    if(t.nextId&&list.find(x=>x.id===t.nextId)){
      html+=`<div class="chain-connector"><div class="chain-line${t.done?' unlocked':''}"></div><span class="chain-label">${t.done?'↓ 已解锁':'↓ 完成后解锁'}</span></div>`;
    }
    if(addingChainFor===t.id){
      html+=`<div class="chain-add-area">
        <div class="chain-add-label">完成后自动触发下一步：</div>
        <div class="chain-add-row">
          <input class="chain-add-input" id="chain-inp" placeholder="下一步做什么..." />
          <button class="chain-add-ok" onclick="confirmChainAdd(${t.id})">确定</button>
          <button class="chain-add-cancel" onclick="cancelChainAdd()">取消</button>
        </div></div>`;
    }
  });
  return html;
}
function todoRowHTML(t){
  const isNext=!t.done&&!t.locked&&todos.some(x=>x.nextId===t.id&&x.done);
  let badge='';
  if(t.done&&t.nextId)badge='<span class="badge-chain">已触发</span>';
  else if(isNext)badge='<span class="badge-next">轮到你了</span>';
  else if(t.locked)badge='<span class="badge-lock">等待前置</span>';
  return`<div class="todo-row${t.pinned&&!t.done?' pinned':''}${isNext?' active-next':''}" id="tr-${t.id}">
    <div class="todo-circle${t.done?' done':t.locked?' locked':''}" onclick="${t.locked?`toast('需先完成前置任务')`:`toggleTodo(${t.id})`}"></div>
    <div class="todo-body">
      <div class="todo-title${t.done?' done':t.locked?' locked-t':''}" ondblclick="${t.done||t.locked?'':(`editTodo(${t.id})`)}" id="tt-${t.id}" title="${t.done||t.locked?'':'双击编辑'}">${esc(t.text)}${t.pinned&&!t.done?' <span style="font-size:10px;opacity:0.5">📌</span>':''}</div>
      <div class="todo-sub">
        <span class="todo-date">${t.date}</span>
        ${t.tags.map(tg=>`<span class="todo-tag-pill" style="color:${tagColor(tg)}">${tagLabel(tg)}</span>`).join('')}
        ${badge}
      </div>
    </div>
    <div class="todo-actions">
      ${!t.done&&!t.locked?`<button class="t-btn chain-btn" onclick="startChainAdd(${t.id})">+ 接下一步</button>`:''}
      ${!t.done?`<button class="t-btn${t.pinned?' pin-active':''}" onclick="togglePin(${t.id})">${t.pinned?'取消置顶':'📌 置顶'}</button>`:''}
      <button class="t-btn" onclick="openTagModal('todo',${t.id})">标签</button>
      <button class="t-btn" onclick="deleteTodo(${t.id})" style="color:#ef4444">删除</button>
    </div>
  </div>`;
}
function editTodo(id){
  const el=document.getElementById('tt-'+id);if(!el)return;
  const t=todos.find(x=>x.id===id);if(!t||t.locked||t.done)return;
  el.contentEditable='true';el.focus();
  const range=document.createRange();range.selectNodeContents(el);range.collapse(false);
  window.getSelection().removeAllRanges();window.getSelection().addRange(range);
  const saveIt=()=>{el.contentEditable='false';t.text=el.textContent.trim();saveLocal();schedulePush();};
  el.onblur=saveIt;el.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();saveIt();}};
}
function toggleTodo(id){
  const t=todos.find(x=>x.id===id);if(!t||t.locked)return;
  t.done=!t.done;t.date=t.done?'已完成':'今天';
  if(t.done&&t.nextId){const n=todos.find(x=>x.id===t.nextId);if(n){n.locked=false;toast('完成！下一步已解锁 →');}}
  else if(t.done)toast('任务完成 ✓');
  else{if(t.nextId){const n=todos.find(x=>x.id===t.nextId);if(n)n.locked=true;}}
  save();render();
}
function togglePin(id){const t=todos.find(x=>x.id===id);if(!t)return;t.pinned=!t.pinned;save();render();toast(t.pinned?'已置顶 📌':'已取消置顶');}
function deleteTodo(id){todos.forEach(t=>{if(t.nextId===id)t.nextId=null;});todos=todos.filter(t=>t.id!==id);save();render();toast('待办已删除');}
function startChainAdd(id){addingChainFor=id;render();setTimeout(()=>{const el=document.getElementById('chain-inp');if(el){el.focus();el.onkeydown=e=>{if(e.key==='Enter')confirmChainAdd(id);if(e.key==='Escape')cancelChainAdd();};}},50);}
function cancelChainAdd(){addingChainFor=null;render();}
function confirmChainAdd(id){
  const inp=document.getElementById('chain-inp');if(!inp)return;
  const text=inp.value.trim();if(!text){toast('请输入任务内容');return;}
  const t=todos.find(x=>x.id===id);if(!t)return;
  const nid=uid();
  todos.splice(todos.findIndex(x=>x.id===id)+1,0,{id:nid,done:false,text,date:'待定',tags:[],pinned:false,nextId:t.nextId,locked:!t.done});
  t.nextId=nid;addingChainFor=null;save();render();toast('已加入任务链');
}
function focusTodoCap(){const inp=document.getElementById('cap-todo-inp');if(inp)inp.focus();}
function addTodo(){
  const inp=document.getElementById('cap-todo-inp');if(!inp)return;
  const text=inp.value.trim();if(!text)return;
  todos.unshift({id:uid(),done:false,text,date:'今天',tags:[...pendingSelTags],pinned:false,nextId:null,locked:false});
  inp.value='';pendingSelTags=[];
  const disp=document.getElementById('cap-tags-display');if(disp)disp.innerHTML='';
  save();render();
}

/* EXPERIENCE */
function renderExp(s){
  let list=experiences.filter(e=>{
    const tm=expFilter==='all'||e.type===expFilter;
    const tg=!activeTag||e.tags.includes(activeTag);
    return tm&&tg&&matchSearch(e.title+e.body,e.tags);
  });
  const c={all:experiences.length,lesson:experiences.filter(e=>e.type==='lesson').length,pitfall:experiences.filter(e=>e.type==='pitfall').length,pattern:experiences.filter(e=>e.type==='pattern').length};
  let html=`<div class="exp-filter">
    <button class="ef-btn${expFilter==='all'?' active-f':''}" onclick="setExpFilter('all')">全部 ${c.all}</button>
    <button class="ef-btn${expFilter==='lesson'?' active-f':''}" onclick="setExpFilter('lesson')">教训 ${c.lesson}</button>
    <button class="ef-btn${expFilter==='pitfall'?' active-f':''}" onclick="setExpFilter('pitfall')">踩坑 ${c.pitfall}</button>
    <button class="ef-btn${expFilter==='pattern'?' active-f':''}" onclick="setExpFilter('pattern')">模式 ${c.pattern}</button>
  </div>`;
  if(!list.length){html+='<div style="text-align:center;padding:60px 0;color:rgba(0,0,0,0.28);font-size:13px">暂无经验</div>';s.innerHTML=html;return;}
  html+=list.map(e=>`<div class="exp-card">
    <div class="exp-head"><div class="exp-title">${esc(e.title)}</div><span class="exp-badge ${e.type}">${e.type==='lesson'?'教训':e.type==='pitfall'?'踩坑':'模式'}</span></div>
    <div class="exp-body">${esc(e.body)}</div>
    <div class="exp-footer">${e.tags.map(t=>`<span class="pill" style="color:${tagColor(t)}">${tagLabel(t)}</span>`).join('')}<span class="exp-date">${e.date}</span></div>
  </div>`).join('');
  s.innerHTML=html;
}
function setExpFilter(f){expFilter=f;render();}

/* NOTES COMPOSE */
function addNote(){
  const ta=document.getElementById('cap-note-ta');if(!ta)return;
  const text=ta.value.trim();if(!text&&!composePendingImgs.length)return;
  const now=new Date();
  const time=now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');
  notes.unshift({id:uid(),time,date:'今天',text:text||'（图片）',tags:[...pendingSelTags],images:[...composePendingImgs]});
  ta.value='';pendingSelTags=[];composePendingImgs=[];
  const disp=document.getElementById('cap-tags-display');if(disp)disp.innerHTML='';
  save();render();
}

/* IMAGE */
function handleImgPasteCompose(e){
  const items=e.clipboardData&&e.clipboardData.items;if(!items)return;
  for(let i=0;i<items.length;i++){if(items[i].type.indexOf('image')!==-1){e.preventDefault();compressImg(items[i].getAsFile(),d=>{composePendingImgs.push(d);toast('图片已附加，发送时提交');});return;}}
}
function handleImgPaste(e,noteId){
  const items=e.clipboardData&&e.clipboardData.items;if(!items)return;
  for(let i=0;i<items.length;i++){if(items[i].type.indexOf('image')!==-1){e.preventDefault();compressImg(items[i].getAsFile(),d=>{const n=notes.find(x=>x.id===noteId);if(!n)return;if(!n.images)n.images=[];n.images.push(d);save();renderNotes(document.getElementById('stream'));toast('图片已添加');});return;}}
}
function compressImg(file,cb){
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');let w=img.width,h=img.height,MAX=1200;
      if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
      canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h);
      const d=canvas.toDataURL('image/jpeg',0.75);
      if(d.length*0.75/1024>800){toast('图片太大，请截取更小区域');return;}cb(d);
    };img.src=e.target.result;
  };reader.readAsDataURL(file);
}
function deleteNoteImg(noteId,idx){const n=notes.find(x=>x.id===noteId);if(!n||!n.images)return;n.images.splice(idx,1);save();renderNotes(document.getElementById('stream'));}
function previewImg(src){document.getElementById('img-preview').src=src;document.getElementById('img-overlay').classList.add('open');}
function closeImgPreview(){document.getElementById('img-overlay').classList.remove('open');}

/* TAG MODAL */
function openTagModal(type,id){
  pendingTagTarget={type,id};
  let current=[];
  if(type==='compose')current=[...pendingSelTags];
  else if(type==='note')current=(notes.find(n=>n.id===id)||{tags:[]}).tags;
  else if(type==='todo')current=(todos.find(t=>t.id===id)||{tags:[]}).tags;
  document.getElementById('tag-modal-grid').innerHTML=TAGS.map(t=>`<div class="tag-opt${current.includes(t.id)?' sel':''}" onclick="this.classList.toggle('sel')" data-id="${t.id}">${t.label}</div>`).join('');
  openModal('tag');
}
function confirmTags(){
  const sel=[...document.querySelectorAll('.tag-opt.sel')].map(el=>el.dataset.id);
  if(pendingTagTarget.type==='compose'){
    pendingSelTags=sel;
    const disp=document.getElementById('cap-tags-display');
    if(disp)disp.innerHTML=sel.map(t=>`<span class="pill" style="color:${tagColor(t)}">${tagLabel(t)}</span>`).join('');
  }else if(pendingTagTarget.type==='note'){const n=notes.find(x=>x.id===pendingTagTarget.id);if(n){n.tags=sel;save();}render();}
  else if(pendingTagTarget.type==='todo'){const t=todos.find(x=>x.id===pendingTagTarget.id);if(t){t.tags=sel;save();}render();}
  closeModal('tag');
}

/* BATCH */
function openBatchForm(){
  batchSel={};
  const list=todos.filter(t=>!t.done);
  document.getElementById('batch-list').innerHTML=list.length?list.map(t=>`
    <div class="batch-row" id="brow-${t.id}" onclick="toggleBatchSel('${t.id}')">
      <div class="batch-check" id="bchk-${t.id}"></div>
      <div class="batch-txt">${esc(t.text)}</div>
      <div class="batch-dt">${t.date}</div>
    </div>`).join(''):'<div style="padding:12px;font-size:12px;color:rgba(0,0,0,0.3)">没有未完成的任务</div>';
  document.getElementById('batch-target').value='';
}
function toggleBatchSel(id){
  batchSel[id]=!batchSel[id];
  const row=document.getElementById('brow-'+id),chk=document.getElementById('bchk-'+id);
  if(row)row.classList.toggle('sel',!!batchSel[id]);
  if(chk)chk.textContent=batchSel[id]?'✓':'';
}
function confirmBatch(){
  const date=document.getElementById('batch-target').value.trim();if(!date){toast('请填写目标日期');return;}
  const ids=Object.keys(batchSel).filter(id=>batchSel[id]);
  if(!ids.length){toast('请至少选择一条');return;}
  ids.forEach(id=>{const t=todos.find(x=>String(x.id)===id);if(t&&!t.done)t.date=date;});
  save();closeModal('batch');render();toast(`已将 ${ids.length} 条改到 ${date}`);
}

/* MODAL HELPERS */
function openModal(name){
  if(name==='sync')openSyncForm();
  if(name==='batch')openBatchForm();
  document.getElementById('modal-'+name).classList.add('open');
}
function closeModal(name){document.getElementById('modal-'+name).classList.remove('open');}

/* SIDEBAR */
function renderSidebarTags(){
  const el=document.getElementById('tag-list');
  const counts={};TAGS.forEach(t=>{counts[t.id]=0;});
  const pool=mode==='notes'?notes:mode==='todos'?todos:experiences;
  pool.forEach(item=>item.tags.forEach(tid=>{if(counts[tid]!==undefined)counts[tid]++;}));
  el.innerHTML=TAGS.map(t=>`<div class="tag-row${activeTag===t.id?' active-tag':''}" onclick="filterByTag('${t.id}')">
    <div class="tag-dot" style="background:${t.color}"></div>
    <span>${t.label}</span>
    <span class="tag-count">${counts[t.id]||0}</span>
  </div>`).join('');
}
function updateCounts(){
  document.getElementById('cnt-n').textContent=notes.length;
  document.getElementById('cnt-t').textContent=todos.filter(t=>!t.done).length;
  document.getElementById('cnt-e').textContent=experiences.length;
}
