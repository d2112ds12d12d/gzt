<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>质检管理看板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://imgcache.qq.com/qcloud/tcbjs/1.10.8/tcb.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Microsoft YaHei',sans-serif;background:#0f1117;color:#e2e8f0;display:flex;height:100vh;overflow:hidden;}
  #sidebar{width:220px;min-width:220px;background:#161b27;border-right:1px solid #2a3145;display:flex;flex-direction:column;overflow:hidden;}
  .sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid #2a3145;}
  .sidebar-logo .brand{font-size:16px;font-weight:700;color:#4fc3f7;letter-spacing:1px;}
  .sidebar-logo .sub{font-size:11px;color:#64748b;margin-top:3px;}
  .nav-section{padding:16px 12px 8px;font-size:11px;color:#475569;letter-spacing:1px;text-transform:uppercase;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:11px 18px;cursor:pointer;font-size:13px;color:#94a3b8;border-left:3px solid transparent;transition:all .2s;}
  .nav-item:hover{background:#1e2537;color:#e2e8f0;}
  .nav-item.active{background:#1e2a3a;color:#4fc3f7;border-left-color:#4fc3f7;}
  .nav-icon{width:18px;height:18px;flex-shrink:0;}
  .sidebar-footer{margin-top:auto;padding:16px 18px;border-top:1px solid #2a3145;font-size:11px;color:#475569;}
  #main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .topbar{background:#161b27;border-bottom:1px solid #2a3145;padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .topbar-title{font-size:15px;font-weight:600;color:#e2e8f0;}
  .topbar-right{display:flex;align-items:center;gap:14px;}
  .topbar-date{font-size:12px;color:#64748b;background:#1e2537;padding:5px 12px;border-radius:6px;border:1px solid #2a3145;}
  .sync-btn{font-size:12px;padding:5px 14px;border-radius:6px;border:1px solid #4fc3f7;background:transparent;color:#4fc3f7;cursor:pointer;transition:all .2s;}
  .sync-btn:hover{background:#4fc3f7;color:#0f1117;}
  .content{flex:1;overflow-y:auto;padding:24px;}
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:24px;}
  .kpi-card{background:#161b27;border:1px solid #2a3145;border-radius:10px;padding:16px 18px;}
  .kpi-label{font-size:11px;color:#64748b;margin-bottom:6px;}
  .kpi-value{font-size:26px;font-weight:700;color:#4fc3f7;}
  .kpi-change{font-size:11px;margin-top:4px;}
  .kpi-change.up{color:#34d399;}
  .kpi-change.down{color:#f87171;}
  .section-title{font-size:13px;font-weight:600;color:#94a3b8;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
  .section-title::before{content:'';width:3px;height:14px;background:#4fc3f7;border-radius:2px;}
  .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;}
  .chart-card{background:#161b27;border:1px solid #2a3145;border-radius:10px;padding:18px;}
  .chart-title{font-size:12px;color:#64748b;margin-bottom:14px;}
  .chart-wrap{position:relative;height:200px;}
  .table-card{background:#161b27;border:1px solid #2a3145;border-radius:10px;padding:18px;margin-bottom:24px;}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  th{color:#64748b;font-weight:500;padding:8px 12px;border-bottom:1px solid #2a3145;text-align:left;}
  td{padding:9px 12px;border-bottom:1px solid #1e2537;color:#94a3b8;}
  .badge{display:inline-block;padding:2px 9px;border-radius:4px;font-size:11px;font-weight:600;}
  .badge-green{background:#064e3b;color:#34d399;}
  .badge-yellow{background:#451a03;color:#fbbf24;}
  .badge-red{background:#450a0a;color:#f87171;}
  .badge-blue{background:#0c2a4a;color:#60a5fa;}
  .rank-item{display:flex;align-items:center;gap:10px;}
  .rank-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
  .rank-gold{background:#78350f;color:#fbbf24;}
  .rank-silver{background:#1e293b;color:#94a3b8;}
  .rank-bar-wrap{flex:1;background:#1e2537;border-radius:4px;height:8px;overflow:hidden;}
  .rank-bar{height:100%;border-radius:4px;background:#4fc3f7;transition:width .6s;}
  .rank-label{font-size:12px;color:#94a3b8;width:70px;}
  .rank-val{font-size:12px;color:#e2e8f0;width:40px;text-align:right;}
  .upload-btn{display:inline-flex;align-items:center;gap:8px;padding:9px 18px;background:#1e3a52;border:1px dashed #4fc3f7;border-radius:8px;color:#4fc3f7;font-size:13px;cursor:pointer;transition:all .2s;}
  .upload-btn:hover{background:#4fc3f7;color:#0f1117;}
  .upload-area{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
  input[type=file]{display:none;}
  .progress-wrap{background:#1e2537;border-radius:6px;height:10px;overflow:hidden;margin-top:4px;}
  .progress-bar{height:100%;border-radius:6px;background:linear-gradient(90deg,#4fc3f7,#38bdf8);}
  .page{display:none;}
  .page.active{display:block;}
  .cloud-badge{font-size:11px;padding:3px 10px;border-radius:20px;background:#0c2a1a;color:#34d399;border:1px solid #064e3b;}
  #toast{position:fixed;bottom:24px;right:24px;background:#1e3a52;border:1px solid #4fc3f7;color:#4fc3f7;padding:10px 18px;border-radius:8px;font-size:13px;display:none;z-index:999;}
</style>
</head>
<body>

<nav id="sidebar">
  <div class="sidebar-logo">
    <div class="brand">✦ 质检管理中心</div>
    <div class="sub">ZEYE · 内部数据看板</div>
  </div>
  <div class="nav-section">数据模块</div>
  <div class="nav-item active" onclick="switchPage('quality')">质量数据</div>
  <div class="nav-item" onclick="switchPage('training')">培训答疑数据</div>
  <div class="sidebar-footer">
    <div style="margin-bottom:6px;color:#475569;">云端状态</div>
    <span class="cloud-badge" id="cloudStatus">● 等待连接</span>
  </div>
</nav>

<div id="main">
  <div class="topbar">
    <div class="topbar-title" id="pageTitle">质量数据看板</div>
    <div class="topbar-right">
      <div class="topbar-date" id="currentDate"></div>
      <button class="sync-btn" onclick="syncCloud()">↻ 云端同步</button>
    </div>
  </div>

  <div class="content">
    <div class="page active" id="page-quality">
      <div class="upload-area">
        <label class="upload-btn" for="qualityExcel">点击上传 Excel（质量数据）</label>
        <input type="file" id="qualityExcel" accept=".xlsx,.xls,.csv" onchange="handleUpload(this,'quality')">
        <span id="qualityFileName" style="font-size:12px;color:#4fc3f7;align-self:center;"></span>
      </div>
      <div class="kpi-grid">
        <div class="kpi-card"><div class="kpi-label">总质检量</div><div class="kpi-value" id="kq1">16,901</div></div>
        <div class="kpi-card"><div class="kpi-label">整体合格率</div><div class="kpi-value" id="kq2">94.13%</div></div>
      </div>
      <div class="charts-row">
        <div class="chart-card"><div class="chart-title">趋势图</div><div class="chart-wrap"><canvas id="chartForecast"></canvas></div></div>
        <div class="chart-card"><div class="chart-title">各机型统计</div><div class="chart-wrap"><canvas id="chartRepair"></canvas></div></div>
      </div>
    </div>
    <div class="page" id="page-training">
       <div class="upload-area">
         <label class="upload-btn" for="trainingExcel">上传培训数据</label>
         <input type="file" id="trainingExcel" accept=".xlsx,.xls,.csv" onchange="handleUpload(this,'training')">
         <span id="trainingFileName"></span>
       </div>
       <div id="regionRanking"></div>
    </div>
  </div>
</div>

<div id="toast">✓ 操作成功</div>

<script>
// 初始化腾讯云
const cloudApp = tcb.init({
  env: 'linran-d0gdmoj6a6c0cd666',
  region: 'ap-shanghai'
});

/* ===== 核心上传逻辑 ===== */
function handleUpload(input, type) {
  const file = input.files[0];
  if (!file) return;

  const nameEl = document.getElementById(type === 'quality' ? 'qualityFileName' : 'trainingFileName');
  nameEl.textContent = '✓ 已选择：' + file.name;

  // 执行匿名登录
  cloudApp.auth().anonymousAuthProvider().signIn().then(() => {
    document.getElementById('cloudStatus').textContent = '● 云端已连接';
    document.getElementById('cloudStatus').style.color = '#34d399';

    // 上传文件
    cloudApp.storage().uploadFile({
      cloudPath: `data/${type}/${Date.now()}_${file.name}`,
      filePath: file,
    }).then(res => {
      showToast('云端同步成功！');
    }).catch(err => showToast('上传失败：' + err.message));
  }).catch(err => showToast('云端连接失败，请检查白名单配置'));
}

/* ===== 基础功能 ===== */
document.getElementById('currentDate').textContent = new Date().toLocaleDateString();
function switchPage(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.getElementById('pageTitle').textContent = page==='quality'?'质量数据看板':'培训答疑数据看板';
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  setTimeout(()=>t.style.display='none',3000);
}
function syncCloud(){ showToast('正在从云端拉取最新数据...'); }

/* ===== 图表初始化 (保持静态展示) ===== */
Chart.defaults.color='#64748b';
new Chart(document.getElementById('chartForecast'),{type:'line',data:{labels:['04-07','04-08','04-09','04-10','04-11','04-12','04-13'],datasets:[{label:'到货量',data:[182,210,198,164,132,178,166],borderColor:'#4fc3f7'}]}});
new Chart(document.getElementById('chartRepair'),{type:'bar',data:{labels:['15PM','15','14P','M60P'],datasets:[{data:[92,110,97,148],backgroundColor:'#4fc3f7'}]}});
</script>
</body>
</html>
