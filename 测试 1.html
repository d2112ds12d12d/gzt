<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>培训部数据看板</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#e8edf5 0%,#dce4f0 50%,#e4e8f4 100%);color:#1e293b;display:flex;height:100vh;overflow:hidden;}

/* SIDEBAR */
#sidebar{width:210px;min-width:210px;background:rgba(255,255,255,0.55);backdrop-filter:blur(24px) saturate(200%);-webkit-backdrop-filter:blur(24px) saturate(200%);border-right:1px solid rgba(255,255,255,0.75);display:flex;flex-direction:column;overflow:hidden;box-shadow:2px 0 16px rgba(100,120,180,0.08);}
.sidebar-logo{padding:20px 16px 14px;border-bottom:1px solid rgba(200,210,230,0.5);}
.sidebar-logo .brand{font-size:19px;font-weight:900;color:#2563eb;letter-spacing:.5px;line-height:1.2;position:relative;overflow:hidden;cursor:default;}
.sidebar-logo .sub{font-size:10px;color:#94a3b8;margin-top:3px;}
.nav-section{padding:14px 12px 5px;font-size:10px;color:#94a3b8;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;font-size:13px;color:#64748b;border-left:3px solid transparent;transition:all .18s;}
.nav-item:hover{background:rgba(37,99,235,0.07);color:#1e40af;}
.nav-item.active{background:rgba(37,99,235,0.10);color:#2563eb;border-left-color:#2563eb;font-weight:600;}
.nav-icon{width:16px;height:16px;flex-shrink:0;}
.sidebar-footer{margin-top:auto;padding:12px 14px 14px;border-top:1px solid rgba(200,210,230,0.5);font-size:11px;}
.role-btn{flex:1;text-align:center;padding:5px 0;border-radius:7px;font-size:12px;cursor:pointer;transition:all .18s;border:1px solid rgba(200,210,230,0.7);background:transparent;color:#94a3b8;}
.role-btn.active-user{border-color:#2563eb;background:rgba(37,99,235,0.1);color:#2563eb;font-weight:600;}
.role-btn.active-creator{border-color:#7c3aed;background:rgba(124,58,237,0.1);color:#7c3aed;font-weight:600;}
.status-dot{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(241,245,249,0.8);border:1px solid rgba(200,210,230,0.6);color:#64748b;}
.dot{width:6px;height:6px;border-radius:50%;background:#94a3b8;flex-shrink:0;}
.dot.green{background:#10b981;}.dot.amber{background:#f59e0b;}.dot.red{background:#ef4444;}
.ver-row{display:flex;align-items:center;gap:7px;margin-top:7px;padding-top:7px;border-top:1px solid rgba(200,210,230,0.4);}
.ver{font-size:10px;color:#94a3b8;}
.gear-btn{width:18px;height:18px;cursor:pointer;color:#94a3b8;display:none;flex-shrink:0;transition:color .18s;}
.gear-btn:hover{color:#2563eb;}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:rgba(255,255,255,0.70);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(200,210,230,0.6);padding:0 20px;height:50px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px;}
.topbar-title{font-size:14px;font-weight:700;color:#1e293b;white-space:nowrap;}
/* 滚动公告 */
.marquee-wrap{flex:1;overflow:hidden;margin:0 12px;}
.marquee-inner{display:inline-block;white-space:nowrap;animation:marquee 28s linear infinite;font-size:12px;color:#2563eb;font-weight:600;letter-spacing:.3px;}
.marquee-inner:hover{animation-play-state:paused;}
@keyframes marquee{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.update-time{font-size:11px;color:#64748b;background:rgba(241,245,249,0.8);padding:4px 11px;border-radius:20px;border:1px solid rgba(200,210,230,0.7);white-space:nowrap;}
.update-label{color:#94a3b8;margin-right:3px;}
.upload-topbtn{font-size:12px;padding:4px 12px;border-radius:20px;border:1.5px dashed rgba(37,99,235,0.5);background:rgba(37,99,235,0.06);color:#2563eb;cursor:pointer;transition:all .18s;display:none;white-space:nowrap;}
.upload-topbtn:hover{background:#2563eb;color:#fff;border-style:solid;}
.sync-btn{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid #2563eb;background:rgba(37,99,235,0.08);color:#2563eb;cursor:pointer;transition:all .18s;white-space:nowrap;}
.sync-btn:hover{background:#2563eb;color:#fff;}
input[type=file]{display:none;}

.content{flex:1;overflow-y:auto;padding:16px 20px;}
.content::-webkit-scrollbar{width:4px;}
.content::-webkit-scrollbar-thumb{background:rgba(148,163,184,0.4);border-radius:2px;}

/* GLASS */
.glass{background:rgba(255,255,255,0.62);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border:1px solid rgba(255,255,255,0.85);box-shadow:0 4px 24px rgba(100,120,180,0.10);}
.card{padding:14px 16px;border-radius:12px;background:rgba(255,255,255,0.65);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.9);box-shadow:0 2px 10px rgba(100,120,180,0.08);}

/* FILTER BAR */
.filter-bar{display:flex;align-items:center;flex-wrap:wrap;gap:7px;padding:10px 14px;border-radius:12px;margin-bottom:14px;}
.filter-label{font-size:11px;color:#64748b;font-weight:500;white-space:nowrap;}
.filter-select,.filter-input{font-size:12px;padding:4px 9px;border-radius:7px;border:1px solid rgba(200,210,230,0.8);background:rgba(255,255,255,0.7);color:#1e293b;outline:none;font-family:inherit;}
.filter-chip{font-size:12px;padding:3px 11px;border-radius:20px;cursor:pointer;border:1px solid rgba(200,210,230,0.8);background:rgba(255,255,255,0.6);color:#64748b;transition:all .15s;white-space:nowrap;user-select:none;}
.filter-chip.active{background:#2563eb;color:#fff;border-color:#2563eb;}
.filter-chip:hover:not(.active){background:rgba(37,99,235,0.08);color:#2563eb;border-color:#2563eb;}
.filter-div{width:1px;height:14px;background:rgba(200,210,230,0.6);margin:0 2px;}

/* OVERVIEW CARDS */
.overview-cards{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px;}
.ov-card{border-radius:14px;padding:16px 14px;position:relative;overflow:hidden;cursor:default;transition:transform .15s,box-shadow .15s;}
.ov-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(100,120,180,0.15);}
.ov-card-bg{position:absolute;inset:0;border-radius:14px;}
.ov-card-content{position:relative;z-index:1;}
.ov-cat{font-size:11px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:5px;}
.ov-icon{font-size:16px;}
.ov-big{font-size:22px;font-weight:800;line-height:1;margin-bottom:6px;}
.ov-row{display:flex;justify-content:space-between;align-items:flex-end;}
.ov-label{font-size:10px;opacity:.7;}
.ov-rate{font-size:16px;font-weight:700;}
.ov-sub{font-size:10px;opacity:.6;margin-top:4px;}
/* 各品类配色 */
.ov-phone{background:linear-gradient(135deg,rgba(37,99,235,0.12),rgba(96,165,250,0.08));border:1px solid rgba(37,99,235,0.2);}
.ov-phone .ov-cat{color:#1d4ed8;}.ov-phone .ov-big{color:#1e40af;}.ov-phone .ov-rate{color:#1d4ed8;}
.ov-laptop{background:linear-gradient(135deg,rgba(124,58,237,0.12),rgba(167,139,250,0.08));border:1px solid rgba(124,58,237,0.2);}
.ov-laptop .ov-cat{color:#6d28d9;}.ov-laptop .ov-big{color:#5b21b6;}.ov-laptop .ov-rate{color:#6d28d9;}
.ov-pad{background:linear-gradient(135deg,rgba(5,150,105,0.12),rgba(52,211,153,0.08));border:1px solid rgba(5,150,105,0.2);}
.ov-pad .ov-cat{color:#047857;}.ov-pad .ov-big{color:#065f46;}.ov-pad .ov-rate{color:#047857;}
.ov-earphone{background:linear-gradient(135deg,rgba(217,119,6,0.12),rgba(251,191,36,0.08));border:1px solid rgba(217,119,6,0.2);}
.ov-earphone .ov-cat{color:#b45309;}.ov-earphone .ov-big{color:#92400e;}.ov-earphone .ov-rate{color:#b45309;}
.ov-camera{background:linear-gradient(135deg,rgba(100,116,139,0.10),rgba(148,163,184,0.06));border:1px solid rgba(100,116,139,0.15);}
.ov-camera .ov-cat{color:#475569;}.ov-camera .ov-big{color:#334155;}.ov-camera .ov-rate{color:#475569;}
.rate-bad-txt{color:#dc2626!important;}.rate-warn-txt{color:#d97706!important;}.rate-ok-txt{color:#059669!important;}

/* SECTION */
.section-hd{font-size:13px;font-weight:700;color:#334155;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.section-hd-left{display:flex;align-items:center;gap:8px;}
.section-hd-left::before{content:'';width:3px;height:14px;background:#2563eb;border-radius:2px;display:block;}
.section-hd-btns{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}

/* RANK */
.rank-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.rank-item{display:flex;align-items:center;gap:7px;margin-bottom:8px;}
.rank-num{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.rank-gold{background:#fef3c7;color:#d97706;}.rank-silver{background:#f1f5f9;color:#64748b;}
.rank-bar-wrap{flex:1;background:rgba(200,210,230,0.35);border-radius:3px;height:6px;overflow:hidden;}
.rank-bar{height:100%;border-radius:3px;transition:width .6s;}
.rank-name{font-size:11px;color:#475569;width:72px;flex-shrink:0;}
.rank-val{font-size:11px;font-weight:600;color:#1e293b;width:42px;text-align:right;}

/* CHARTS */
.charts-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.chart-title{font-size:12px;color:#64748b;margin-bottom:10px;font-weight:500;display:flex;align-items:center;justify-content:space-between;}
.chart-wrap{position:relative;height:190px;}

/* TABLE */
.table-wrap{border-radius:12px;overflow:hidden;background:rgba(255,255,255,0.65);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.9);box-shadow:0 2px 10px rgba(100,120,180,0.08);margin-bottom:16px;}
.table-toolbar{display:flex;align-items:center;justify-content:space-between;padding:9px 14px 7px;flex-wrap:wrap;gap:7px;}
.table-filters{display:flex;gap:5px;flex-wrap:wrap;}
.col-filter{font-size:11px;padding:3px 8px;border-radius:6px;border:1px solid rgba(200,210,230,0.8);background:rgba(255,255,255,0.7);color:#475569;outline:none;font-family:inherit;max-width:120px;}
.table-scroll{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{background:rgba(241,245,249,0.85);color:#475569;font-weight:600;padding:9px 12px;border-bottom:1px solid rgba(200,210,230,0.5);text-align:left;white-space:nowrap;}
thead th.num{text-align:right;}
tbody td{padding:8px 12px;border-bottom:1px solid rgba(200,210,230,0.3);color:#334155;white-space:nowrap;}
tbody td.num{text-align:right;font-variant-numeric:tabular-nums;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:rgba(37,99,235,0.04);}
.rate-bad{color:#dc2626;font-weight:600;}.rate-warn{color:#d97706;font-weight:600;}.rate-ok{color:#059669;font-weight:600;}
.pagination{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;border-top:1px solid rgba(200,210,230,0.4);flex-wrap:wrap;gap:7px;}
.page-info{font-size:11px;color:#64748b;}
.page-btns{display:flex;align-items:center;gap:5px;}
.page-btn{font-size:11px;padding:3px 8px;border-radius:5px;border:1px solid rgba(200,210,230,0.8);background:rgba(255,255,255,0.7);color:#475569;cursor:pointer;transition:all .15s;}
.page-btn:hover:not(:disabled){background:#2563eb;color:#fff;border-color:#2563eb;}
.page-btn:disabled{opacity:.4;cursor:default;}
.page-btn.active{background:#2563eb;color:#fff;border-color:#2563eb;}
.per-page-select{font-size:11px;padding:3px 7px;border-radius:6px;border:1px solid rgba(200,210,230,0.8);background:rgba(255,255,255,0.7);color:#475569;outline:none;cursor:pointer;}

/* BADGE */
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600;}
.badge-green{background:#d1fae5;color:#065f46;}.badge-yellow{background:#fef3c7;color:#92400e;}.badge-red{background:#fee2e2;color:#991b1b;}.badge-blue{background:#dbeafe;color:#1e40af;}

/* TRAINING SECTION BOX */
.train-section-box{border-radius:14px;border:1px solid rgba(255,255,255,0.9);background:rgba(255,255,255,0.45);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:16px;margin-bottom:14px;box-shadow:0 2px 10px rgba(100,120,180,0.07);}
.train-section-title{font-size:12px;font-weight:700;color:#2563eb;margin-bottom:12px;display:flex;align-items:center;gap:6px;padding-bottom:8px;border-bottom:1px solid rgba(200,210,230,0.4);}
.train-section-title .tsub{font-size:10px;color:#94a3b8;font-weight:400;margin-left:4px;}

/* PAGE */
.page{display:none;}.page.active{display:block;}

/* TOAST */
#toast{position:fixed;bottom:20px;right:20px;background:rgba(255,255,255,0.92);backdrop-filter:blur(16px);border:1px solid rgba(200,210,230,0.8);color:#1e293b;padding:9px 16px;border-radius:10px;font-size:13px;display:none;z-index:999;box-shadow:0 4px 20px rgba(100,120,180,0.15);}

/* SETTINGS MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,0.4);backdrop-filter:blur(6px);z-index:200;display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.settings-modal{width:72vw;max-width:960px;min-width:640px;height:78vh;background:rgba(248,250,255,0.97);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.9);border-radius:20px;box-shadow:0 16px 56px rgba(100,120,180,0.22);overflow:hidden;display:flex;flex-direction:column;}
.modal-header{padding:16px 22px 12px;border-bottom:1px solid rgba(200,210,230,0.4);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.modal-title{font-size:15px;font-weight:700;color:#1e293b;}
.modal-close{width:28px;height:28px;border-radius:50%;border:none;background:rgba(200,210,230,0.4);color:#64748b;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.modal-close:hover{background:#ef4444;color:#fff;}
/* Modal tabs */
.modal-tabs{display:flex;gap:3px;padding:8px 22px 0;border-bottom:1px solid rgba(200,210,230,0.4);flex-shrink:0;background:rgba(255,255,255,0.5);}
.modal-tab{padding:7px 18px;font-size:13px;color:#64748b;cursor:pointer;border-bottom:2px solid transparent;font-weight:500;transition:all .15s;white-space:nowrap;}
.modal-tab.active{color:#2563eb;border-bottom-color:#2563eb;font-weight:600;}
.modal-tab:hover:not(.active){color:#2563eb;}
.modal-pane{display:none;flex:1;overflow-y:auto;padding:18px 22px 22px;}
.modal-pane.active{display:block;}
.modal-pane::-webkit-scrollbar{width:4px;}
.modal-pane::-webkit-scrollbar-thumb{background:rgba(148,163,184,0.4);border-radius:2px;}
/* Slogan section */
.modal-section{margin-bottom:18px;}
.modal-section-title{font-size:11px;font-weight:600;color:#94a3b8;margin-bottom:8px;letter-spacing:1px;text-transform:uppercase;}
.slogan-item{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
.slogan-input{flex:1;font-size:12px;padding:6px 10px;border-radius:8px;border:1px solid rgba(200,210,230,0.8);background:rgba(255,255,255,0.8);color:#1e293b;outline:none;font-family:inherit;}
.slogan-del{width:24px;height:24px;border-radius:6px;border:none;background:rgba(239,68,68,0.1);color:#ef4444;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.slogan-del:hover{background:#ef4444;color:#fff;}
.add-btn{font-size:12px;padding:5px 12px;border-radius:8px;border:1.5px dashed rgba(37,99,235,0.4);background:transparent;color:#2563eb;cursor:pointer;transition:all .15s;font-family:inherit;}
.add-btn:hover{background:rgba(37,99,235,0.08);}
.rule-select{font-size:12px;padding:6px 10px;border-radius:8px;border:1px solid rgba(200,210,230,0.8);background:rgba(255,255,255,0.8);color:#1e293b;outline:none;font-family:inherit;width:100%;}
.save-btn{padding:9px 24px;border-radius:10px;border:none;background:#2563eb;color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;}
.save-btn:hover{background:#1d4ed8;}

/* DS Config inside modal */
.ds-card-m{background:rgba(255,255,255,0.75);border:1px solid rgba(200,210,230,0.6);border-radius:12px;overflow:hidden;margin-bottom:10px;}
.ds-head-m{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;cursor:pointer;user-select:none;border-bottom:1px solid transparent;}
.ds-head-m:hover{background:rgba(37,99,235,0.04);}
.ds-head-m.open{border-bottom-color:rgba(200,210,230,0.4);}
.ds-body-m{padding:14px 16px;display:none;}
.ds-body-m.open{display:block;}
.ds-name-m{font-size:13px;font-weight:700;color:#1e293b;}
.ds-desc-m{font-size:11px;color:#94a3b8;margin-top:1px;}
.ds-badge-m{font-size:11px;padding:2px 8px;border-radius:8px;}
.badge-a{background:rgba(5,150,105,0.1);color:#059669;border:1px solid rgba(5,150,105,0.2);}
.badge-o{background:rgba(100,116,139,0.1);color:#475569;border:1px solid rgba(100,116,139,0.2);}
.chev-m{font-size:11px;color:#94a3b8;transition:transform .18s;}
.chev-m.op{transform:rotate(180deg);}
.flabel{font-size:11px;font-weight:600;color:#475569;margin-bottom:5px;display:block;}
.fhint{font-size:10px;color:#94a3b8;font-weight:400;}
.finput{font-size:12px;padding:6px 10px;border-radius:8px;border:1px solid rgba(200,210,230,0.8);background:rgba(255,255,255,0.8);color:#1e293b;outline:none;font-family:inherit;width:100%;}
.finput:focus{border-color:#2563eb;}
.fsel{font-size:12px;padding:6px 10px;border-radius:8px;border:1px solid rgba(200,210,230,0.8);background:rgba(255,255,255,0.8);color:#1e293b;outline:none;font-family:inherit;width:100%;}
.fzone{border:1.5px dashed rgba(37,99,235,0.3);border-radius:10px;padding:12px;text-align:center;cursor:pointer;transition:all .15s;background:rgba(37,99,235,0.02);}
.fzone:hover{border-color:#2563eb;background:rgba(37,99,235,0.05);}
.fzone.has{border-color:rgba(5,150,105,0.4);background:rgba(5,150,105,0.03);}
.fzone-txt{font-size:12px;color:#94a3b8;}
.fzone-name{font-size:12px;color:#059669;font-weight:600;margin-top:3px;}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:4px;max-height:180px;overflow-y:auto;padding:2px;}
.citem{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:7px;border:1px solid rgba(200,210,230,0.5);background:rgba(255,255,255,0.6);cursor:pointer;transition:all .1s;font-size:11px;}
.citem:hover{border-color:#2563eb;background:rgba(37,99,235,0.04);}
.citem.con{border-color:#2563eb;background:rgba(37,99,235,0.07);}
.citem input[type=checkbox]{accent-color:#2563eb;cursor:pointer;flex-shrink:0;width:12px;height:12px;}
.cletter{font-size:10px;font-weight:700;color:#94a3b8;width:18px;flex-shrink:0;}
.cname{color:#334155;flex:1;}
.frule{display:grid;grid-template-columns:1fr 80px 1fr auto;gap:6px;align-items:center;margin-bottom:6px;}
.frule input,.frule select{font-size:11px;padding:5px 8px;border-radius:7px;border:1px solid rgba(200,210,230,0.8);background:rgba(255,255,255,0.8);color:#1e293b;outline:none;font-family:inherit;}
.delbtn{width:24px;height:24px;border-radius:6px;border:none;background:rgba(239,68,68,0.1);color:#dc2626;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;}
.delbtn:hover{background:#dc2626;color:#fff;}
.mtoggle{display:flex;border-radius:8px;overflow:hidden;border:1px solid rgba(200,210,230,0.8);width:fit-content;}
.mbtn{padding:6px 16px;font-size:11px;cursor:pointer;border:none;font-family:inherit;font-weight:500;background:transparent;color:#64748b;transition:all .15s;}
.mbtn.aon{background:#059669;color:#fff;}
.mbtn.oon{background:#475569;color:#fff;}
.warnbox{display:none;margin-top:8px;padding:8px 12px;border-radius:8px;background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);font-size:11px;color:#dc2626;align-items:center;justify-content:space-between;gap:8px;}
.warnbox.show{display:flex;}
.scchip{font-size:11px;padding:3px 9px;border-radius:16px;background:rgba(255,255,255,0.7);border:1px solid rgba(200,210,230,0.6);color:#64748b;}
.scchip strong{color:#2563eb;}
.prevwrap{border-radius:10px;overflow:hidden;border:1px solid rgba(200,210,230,0.5);margin-top:10px;}
.prevhead{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:rgba(241,245,249,0.85);border-bottom:1px solid rgba(200,210,230,0.4);font-size:11px;font-weight:600;color:#475569;}
.prevscroll{overflow-x:auto;max-height:200px;overflow-y:auto;}
.prevtable{border-collapse:collapse;font-size:11px;white-space:nowrap;width:100%;}
.prevtable th{background:rgba(241,245,249,0.9);color:#475569;font-weight:600;padding:6px 10px;border-bottom:1px solid rgba(200,210,230,0.4);text-align:left;position:sticky;top:0;}
.prevtable td{padding:5px 10px;border-bottom:1px solid rgba(200,210,230,0.25);color:#334155;}
.prevtable tr:last-child td{border-bottom:none;}
.prevtable tr:hover td{background:rgba(37,99,235,0.04);}
.histitem{display:flex;align-items:center;gap:10px;padding:7px 12px;border-bottom:1px solid rgba(200,210,230,0.3);font-size:11px;}
.histitem:last-child{border-bottom:none;}
