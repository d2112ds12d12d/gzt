<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>工作台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f2f2f7;--surface:#ffffff;--surface2:#f2f2f7;--surface3:#e5e5ea;--surface4:#d1d1d6;
  --border:rgba(60,60,67,.12);--border2:rgba(60,60,67,.18);
  --text1:#1c1c1e;--text2:#48484a;--text3:#8e8e93;--text4:#aeaeb2;
  --accent:#007aff;--accent-light:rgba(0,122,255,.08);--accent-border:rgba(0,122,255,.25);
  --done:#34c759;--done-light:rgba(52,199,89,.1);--del:#ff3b30;--warn:#ff9500;
  --tag-bg:rgba(0,122,255,.08);
  --shadow-xs:0 1px 2px rgba(0,0,0,.04);
  --shadow-sm:0 1px 4px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.04);
  --shadow:0 2px 12px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.05);
  --shadow-lg:0 8px 30px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.06);
  --r:12px;--rs:10px;--rxs:8px;--tab-h:60px;
  --ease:cubic-bezier(.25,.46,.45,.94);--spring:cubic-bezier(.34,1.56,.64,1);
  --sidebar-w:68px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:var(--bg);color:var(--text1);height:100dvh;display:flex;flex-direction:column;overflow:hidden;font-size:14px;-webkit-font-smoothing:antialiased;letter-spacing:-.01em}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes strikeThrough{from{width:0}to{width:100%}}
@keyframes checkPop{0%{transform:scale(1)}35%{transform:scale(1.22)}70%{transform:scale(.9)}100%{transform:scale(1)}}
@keyframes tabSwitch{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--surface4);border-radius:4px}
.header{background:rgba(242,242,247,.88);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border-bottom:1px solid var(--border);padding:10px 16px;flex-shrink:0;z-index:50}
.header-row{display:flex;align-items:center;gap:8px}
.wordmark{font-size:17px;font-weight:700;color:var(--text1);letter-spacing:-.02em;flex-shrink:0;display:flex;align-items:baseline;gap:4px}
.wordmark em{font-style:normal;color:var(--accent)}
.wordmark-ver{font-size:9px;font-weight:400;color:var(--text4);letter-spacing:0}
.search-trigger{flex:1;height:32px;background:rgba(118,118,128,.12);border:none;border-radius:10px;display:flex;align-items:center;gap:7px;padding:0 10px;cursor:pointer;transition:background .15s;max-width:280px}
.search-trigger:hover{background:rgba(118,118,128,.18)}
.search-trigger-text{font-size:12px;color:var(--text3)}
.header-date{font-size:11px;color:var(--text3);flex-shrink:0}
.icon-btn{width:30px;height:30px;border-radius:50%;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;transition:background .12s}
.icon-btn:hover{background:rgba(118,118,128,.12)}
.tabbar{display:flex;background:rgba(242,242,247,.92);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border-top:1px solid var(--border);height:var(--tab-h);flex-shrink:0;padding:0 4px;padding-bottom:env(safe-area-inset-bottom,0px)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:none;cursor:pointer;padding:6px 2px;border-radius:var(--rs);color:var(--text3);font-family:inherit;position:relative;transition:color .15s}
.tab-btn.active{color:var(--accent)}
.tab-icon{font-size:21px;line-height:1;transition:transform .18s var(--spring)}
.tab-btn.active .tab-icon{transform:scale(1.08)}
.tab-label{font-size:9.5px;font-weight:500;letter-spacing:.01em}
.tab-badge{position:absolute;top:5px;right:calc(50% - 18px);background:var(--del);color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;opacity:0;transform:scale(0);transition:opacity .18s,transform .18s var(--spring)}
.tab-badge.visible{opacity:1;transform:scale(1)}
.main{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;opacity:0;pointer-events:none;transition:opacity .15s var(--ease)}
.page.active{opacity:1;pointer-events:all;animation:tabSwitch .18s var(--ease)}
.wrap{padding:16px 16px 100px;max-width:800px;margin:0 auto}
.section-label{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;padding:0 4px}
.empty-state{text-align:center;padding:48px 20px;color:var(--text3);font-size:13px}
.empty-icon{font-size:36px;margin-bottom:12px}
.empty-state p{line-height:1.7}
.btn-add{height:30px;padding:0 14px;background:var(--accent);color:#fff;border:none;border-radius:15px;font-size:12.5px;font-weight:500;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:4px;transition:opacity .12s,transform .1s;white-space:nowrap}
.btn-add:hover{opacity:.88}
.btn-add:active{transform:scale(.97)}
.capture-box{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:4px;margin-bottom:20px;transition:box-shadow .2s;border:1px solid var(--border)}
.capture-box:focus-within{box-shadow:var(--shadow),0 0 0 3px var(--accent-light);border-color:var(--accent-border)}
.capture-input{width:100%;border:none;outline:none;background:transparent;font-family:inherit;font-size:15px;color:var(--text1);padding:10px 12px 8px;resize:none;line-height:1.5;min-height:44px;max-height:120px;display:block}
.capture-input::placeholder{color:var(--text4)}
.capture-footer{display:flex;align-items:center;justify-content:space-between;padding:4px 10px 6px;gap:8px}
.capture-tags{display:flex;gap:5px;flex-wrap:wrap;flex:1}
.capture-tag-btn{height:22px;padding:0 10px;border-radius:11px;border:1px solid var(--border2);background:rgba(118,118,128,.08);font-size:11px;color:var(--text2);cursor:pointer;font-family:inherit;transition:background .12s,color .12s;white-space:nowrap}
.capture-tag-btn:hover,.capture-tag-btn.selected{background:var(--accent-light);border-color:var(--accent-border);color:var(--accent);font-weight:500}
.capture-submit{height:30px;padding:0 16px;background:var(--accent);color:#fff;border:none;border-radius:15px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;flex-shrink:0;transition:opacity .12s,transform .1s}
.capture-submit:hover{opacity:.88}
.capture-submit:active{transform:scale(.97)}
.date-chip{display:inline-flex;align-items:center;gap:4px;background:var(--accent-light);border:1px solid var(--accent-border);color:var(--accent);font-size:11px;padding:2px 8px;border-radius:10px;margin:0 2px 4px;font-weight:500}
.tasks-group{margin-bottom:10px}
.tasks-group-label{font-size:12px;font-weight:600;color:var(--text3);margin-bottom:6px;padding:0 4px;display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;letter-spacing:.01em}
.tasks-group-label::after{content:'';flex:1;height:1px;background:var(--border)}
.tasks-group-label-pin{color:var(--warn)}
.tasks-group-label-pin::after{background:rgba(255,149,0,.2)}
.task-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;display:flex;align-items:flex-start;gap:12px;transition:background .1s;animation:fadeUp .18s var(--ease) both;margin-bottom:6px}
.task-item:hover{background:#fafafa}
.task-item.done{opacity:.5}
.task-item.pinned{background:#fffbf0;border-color:rgba(255,149,0,.2)}
.task-check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--surface4);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .18s;background:transparent;cursor:pointer}
.task-item.done .task-check{background:var(--done);border-color:var(--done);animation:checkPop .28s var(--spring)}
.task-check svg{display:none}
.task-item.done .task-check svg{display:block}
.task-body{flex:1;min-width:0;cursor:pointer}
.task-title{font-size:14.5px;color:var(--text1);line-height:1.4;word-break:break-all;position:relative;display:inline-block}
.task-item.done .task-title{color:var(--text4)}
.task-item.done .task-title::after{content:'';position:absolute;left:0;top:50%;height:1px;background:var(--text4);animation:strikeThrough .2s var(--ease) forwards}
.task-note-preview{font-size:12px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-meta{display:flex;align-items:center;gap:5px;margin-top:4px;flex-wrap:wrap}
.task-tag{font-size:11px;color:var(--accent);font-weight:500}
.task-date{font-size:11px;color:var(--text3)}
.task-date.overdue{color:var(--del);font-weight:500}
.task-chain-badge,.task-img-badge{font-size:11px;color:var(--text3)}
.task-actions{display:flex;gap:3px;opacity:0;transition:opacity .15s;flex-shrink:0}
.task-item:hover .task-actions,.task-item:focus-within .task-actions{opacity:1}
.task-act-btn{width:26px;height:26px;border-radius:var(--rxs);border:none;background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:background .12s,color .12s}
.task-act-btn:hover{background:rgba(118,118,128,.12)}
.task-act-btn.pin-btn{font-size:13px}
.task-act-btn.pin-btn.active{color:var(--warn)}
.task-act-btn.del:hover{color:var(--del)}
.pin-indicator{font-size:12px;margin-right:3px;vertical-align:middle}
.task-links{display:flex;flex-wrap:wrap;gap:4px;margin:4px 0 2px}
.task-link-chip{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;color:var(--accent);background:var(--accent-light);border-radius:6px;padding:2px 8px;text-decoration:none;white-space:nowrap;max-width:220px;overflow:hidden;text-overflow:ellipsis;font-weight:500;transition:opacity .12s}
.task-link-chip:hover{opacity:.78}
.task-img-row{display:flex;flex-direction:row;gap:3px;align-items:center;flex-shrink:0;padding:0 2px;cursor:pointer}
.task-img-icon{width:30px;height:30px;object-fit:cover;border-radius:5px;border:1px solid var(--border);flex-shrink:0;transition:opacity .12s}
.task-img-icon:hover{opacity:.8}
.task-img-more{font-size:10px;color:var(--text3);font-weight:600}
.filter-pills{display:flex;gap:5px}
.filter-pill{height:26px;padding:0 12px;border-radius:13px;border:1px solid var(--border2);background:transparent;font-size:12px;color:var(--text2);cursor:pointer;font-family:inherit;transition:background .12s,color .12s;white-space:nowrap}
.filter-pill.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}
.notes-toolbar{display:flex;gap:5px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.notes-filter-btn{height:26px;padding:0 12px;border-radius:13px;border:1px solid var(--border2);background:transparent;font-size:12px;color:var(--text2);cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;transition:background .12s,color .12s}
.notes-filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}
.note-card-free{background:var(--surface);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:opacity .12s;box-shadow:var(--shadow-xs);border:1px solid var(--border);animation:fadeUp .16s var(--ease) both}
.note-card-free:hover{opacity:.82}
.note-card-free.cat-experience{border-left:3px solid #5856d6}
.note-card-free.cat-method{border-left:3px solid #32ade6}
.note-card-free.cat-idea{border-left:3px solid var(--warn)}
.note-card-free.cat-review{border-left:3px solid var(--accent)}
.note-card-free.cat-followup{border-left:3px solid var(--done)}
.note-card-free.cat-other{border-left:3px solid var(--surface4)}
.note-card-title{font-size:14.5px;font-weight:500;color:var(--text1);margin-bottom:4px;line-height:1.35}
.note-card-body{font-size:13px;color:var(--text2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.note-card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.note-card-cat{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.02em}
.note-card-free.cat-experience .note-card-cat{color:#5856d6}
.note-card-free.cat-method .note-card-cat{color:#32ade6}
.note-card-free.cat-idea .note-card-cat{color:var(--warn)}
.note-card-free.cat-review .note-card-cat{color:var(--accent)}
.note-card-free.cat-followup .note-card-cat{color:var(--done)}
.note-card-date{font-size:11px;color:var(--text4)}
.note-del-btn{background:none;border:none;cursor:pointer;color:var(--text4);font-size:12px;padding:2px 6px;border-radius:4px;transition:color .12s;opacity:0;font-family:inherit}
.note-card-free:hover .note-del-btn{opacity:1}
.note-del-btn:hover{color:var(--del)}
.sub-panel{position:absolute;inset:0;background:var(--bg);z-index:10;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:slideInRight .2s var(--ease)}
.sub-panel-header{background:rgba(242,242,247,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:5}
.back-btn{display:flex;align-items:center;gap:2px;background:none;border:none;cursor:pointer;color:var(--accent);font-size:15px;font-family:inherit;font-weight:400;padding:2px 4px;border-radius:6px;transition:opacity .12s;flex-shrink:0}
.back-btn:hover{opacity:.7}
.sub-panel-body{padding:20px 20px 100px;max-width:720px;margin:0 auto}
.note-detail-title-input{width:100%;border:none;outline:none;background:transparent;font-family:inherit;font-size:22px;font-weight:600;color:var(--text1);padding:0 0 14px;border-bottom:1px solid var(--border);margin-bottom:16px;letter-spacing:-.02em}
.note-detail-body-input{width:100%;border:none;outline:none;background:transparent;font-family:inherit;font-size:14.5px;color:var(--text1);line-height:1.75;resize:none;min-height:40vh}
.note-cat-select{height:26px;padding:0 10px;border-radius:13px;border:1px solid var(--border2);background:rgba(118,118,128,.08);font-family:inherit;font-size:12px;color:var(--text2);outline:none;cursor:pointer}
.note-img-hint{font-size:11px;color:var(--text4);padding:8px 0 0;text-align:center}
.note-images-wrap{display:flex;flex-wrap:wrap;gap:8px;padding:12px 0 4px}
.note-img-item{position:relative;display:inline-block}
.note-img{width:100px;height:76px;object-fit:cover;border-radius:var(--rxs);border:1px solid var(--border);cursor:zoom-in;transition:opacity .12s}
.note-img:hover{opacity:.8}
.note-img-del{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:var(--del);color:#fff;border:none;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.note-img-item:hover .note-img-del{opacity:1}
.note-body-wrap{position:relative}
.review-q-block{margin-bottom:16px}
.review-q-label{font-size:11.5px;font-weight:600;color:var(--text3);margin-bottom:6px;display:flex;align-items:center;gap:5px;letter-spacing:.01em;text-transform:uppercase}
.review-q-input{width:100%;border:none;outline:none;background:rgba(118,118,128,.08);border-radius:var(--rs);font-family:inherit;font-size:14.5px;color:var(--text1);padding:11px 13px;resize:none;line-height:1.65;min-height:76px;transition:background .15s,box-shadow .15s}
.review-q-input:focus{background:var(--surface);box-shadow:0 0 0 2.5px var(--accent-border)}
.book-list{display:flex;flex-direction:column;gap:8px}
.book-card{background:var(--surface);border-radius:var(--r);overflow:hidden;cursor:pointer;border:1px solid var(--border);box-shadow:var(--shadow-xs);transition:opacity .12s,transform .15s;animation:fadeUp .18s var(--ease) both}
.book-card:hover{opacity:.88;transform:translateY(-1px)}
.book-card-head{padding:14px 16px;display:flex;align-items:center;gap:12px}
.book-spine{width:34px;height:46px;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:17px}
.book-info{flex:1;min-width:0}
.book-title{font-size:14.5px;font-weight:500;color:var(--text1);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.book-author{font-size:12px;color:var(--text3)}
.book-count{font-size:12px;color:var(--text3);flex-shrink:0}
.book-notes-preview{border-top:1px solid var(--border);padding:9px 16px;background:rgba(118,118,128,.04)}
.book-note-preview-item{font-size:12px;color:var(--text2);line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:1px 0}
.book-note-preview-item::before{content:'❝ ';color:var(--text4);font-size:10px}
.note-add-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:4px;margin-bottom:16px;transition:box-shadow .2s,border-color .2s}
.note-add-box:focus-within{border-color:var(--accent-border);box-shadow:0 0 0 3px var(--accent-light)}
.note-textarea{width:100%;border:none;outline:none;background:transparent;font-family:inherit;font-size:14px;color:var(--text1);padding:10px 12px;resize:none;line-height:1.65;min-height:76px}
.note-textarea::placeholder{color:var(--text4);font-style:italic}
.note-add-footer{display:flex;justify-content:space-between;align-items:center;padding:4px 10px 6px}
.note-type-select{height:24px;padding:0 8px;border-radius:12px;border:1px solid var(--border2);background:rgba(118,118,128,.08);font-family:inherit;font-size:11.5px;color:var(--text2);outline:none;cursor:pointer}
.book-note-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;margin-bottom:7px;animation:fadeUp .16s var(--ease) both}
.book-note-card.type-quote{border-left:3px solid var(--accent)}
.book-note-card.type-thought{border-left:3px solid var(--warn)}
.book-note-type{font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
.book-note-card.type-quote .book-note-type{color:var(--accent)}
.book-note-card.type-thought .book-note-type{color:var(--warn)}
.book-note-text{font-size:14px;line-height:1.6;color:var(--text1)}
.book-note-card.type-quote .book-note-text{font-style:italic;color:var(--text2)}
.book-note-footer{display:flex;align-items:center;justify-content:space-between;margin-top:7px}
.book-note-date{font-size:11px;color:var(--text4)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:200;display:flex;align-items:flex-end;animation:fadeIn .16s ease}
@media(min-width:600px){.modal-overlay{align-items:center;justify-content:center}}
.modal{background:rgba(242,242,247,.98);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:16px 16px 0 0;width:100%;max-height:92dvh;overflow-y:auto;animation:slideUp .22s var(--spring);box-shadow:var(--shadow-lg)}
@media(min-width:600px){.modal{border-radius:16px;max-width:480px}}
.modal-header{padding:14px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(242,242,247,.95);backdrop-filter:blur(16px);z-index:1}
.modal-title{font-size:16px;font-weight:600;color:var(--text1);letter-spacing:-.01em}
.modal-close{width:26px;height:26px;border-radius:50%;border:none;background:rgba(118,118,128,.16);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text2);transition:background .12s}
.modal-close:hover{background:rgba(118,118,128,.24)}
.modal-body{padding:14px 20px 8px}
.modal-field{margin-bottom:13px}
.modal-label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px;display:block;letter-spacing:.01em}
.modal-input{width:100%;height:40px;padding:0 13px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--surface);font-family:inherit;font-size:14px;color:var(--text1);outline:none;transition:border-color .12s,box-shadow .12s}

function isConfigured(){var c=getCfg();return !!(c.owner&&c.repo&&c.token);}

/* ── MERGE LOGIC ── */
function mergeData(remote){
  // 合并 deletedIds（两端取并集）
  var allDeleted=S.deletedIds.slice();
  (remote.deletedIds||[]).forEach(function(id){if(allDeleted.indexOf(id)===-1)allDeleted.push(id);});
  S.deletedIds=allDeleted;

  // 合并 tasks：按 id 去重，以 created 时间戳较新的为准，删除墓碑中的
  var taskMap={};
  S.tasks.forEach(function(t){taskMap[t.id]=t;});
  (remote.tasks||[]).forEach(function(rt){
    if(allDeleted.indexOf(rt.id)!==-1)return; // 墓碑跳过
    if(!taskMap[rt.id]||rt.created>taskMap[rt.id].created)taskMap[rt.id]=rt;
  });
  S.tasks=Object.values(taskMap).filter(function(t){return allDeleted.indexOf(t.id)===-1;});

  // 合并 notes
  var noteMap={};
  S.notes.forEach(function(n){noteMap[n.id]=n;});
  (remote.notes||[]).forEach(function(rn){
    if(allDeleted.indexOf(rn.id)!==-1)return;
    if(!noteMap[rn.id]||rn.created>noteMap[rn.id].created)noteMap[rn.id]=rn;
  });
  S.notes=Object.values(noteMap).filter(function(n){return allDeleted.indexOf(n.id)===-1;});

  // books 直接用远端（books 不常变）
  if(remote.books&&remote.books.length)S.books=remote.books;
  saveLocal();
}

/* ── GITHUB API ── */
var GH_FILE='workspace-data.json';
var _syncTimer=null,_ghSha=null;
function ghHeaders(){var c=getCfg();return{'Authorization':'token '+c.token,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'};}
function ghUrl(){var c=getCfg();return'https://api.github.com/repos/'+c.owner+'/'+c.repo+'/contents/'+GH_FILE;}
function setSyncStatus(state,msg){
  var dot=eid('sync-dot'),msgEl=eid('sync-msg'),st=eid('sync-status-text');
  if(!dot)return;
  dot.className='sync-dot'+(state?' '+state:'');
  if(msgEl)msgEl.textContent=msg||'';
  if(st)st.textContent=state==='ok'?'已同步':state==='err'?'同步失败':state==='syncing'?'同步中…':'未配置';
}
async function ghPull(){
  if(!isConfigured())return null;
  try{
    var r=await fetch(ghUrl(),{headers:ghHeaders()});
    if(r.status===404){_ghSha=null;return'notfound';}
    if(!r.ok)throw new Error('HTTP '+r.status);
    var json=await r.json();
    _ghSha=json.sha;
    var remote=JSON.parse(decodeURIComponent(escape(atob(json.content.replace(/\n/g,'')))));
    mergeData(remote); // 合并而不是覆盖
    return true;
  }catch(e){console.warn('ghPull',e);return false;}
}
async function ghPush(){
  if(!isConfigured())return;
  setSyncStatus('syncing','同步中…');
  try{
    var content=btoa(unescape(encodeURIComponent(JSON.stringify({tasks:S.tasks,books:S.books,notes:S.notes,deletedIds:S.deletedIds},null,2))));
    var body={message:'sync '+new Date().toISOString(),content:content};
    if(_ghSha)body.sha=_ghSha;
    var r=await fetch(ghUrl(),{method:'PUT',headers:ghHeaders(),body:JSON.stringify(body)});
    if(!r.ok){var err=await r.json();throw new Error(err.message||'HTTP '+r.status);}
    var json=await r.json();_ghSha=json.content.sha;
    setSyncStatus('ok','已同步 · '+new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}));
    return true;
  }catch(e){setSyncStatus('err','同步失败：'+e.message);console.warn('ghPush',e);return false;}
}
function save(){
  saveLocal();
  if(isConfigured()){clearTimeout(_syncTimer);_syncTimer=setTimeout(ghPush,1500);}
}
function load(){
  loadLocal();
  if(isConfigured()){
    ghPull().then(function(r){
      if(r===true){renderAll();setSyncStatus('ok','已从云端加载');}
      else if(r==='notfound'){ghPush().then(function(ok){if(ok)setSyncStatus('ok','云端数据文件已初始化');});}
      else{setSyncStatus('err','云端读取失败，使用本地数据');}
    });
  }
}

/* ── UTILS ── */
function eid(id){return document.getElementById(id);}

function pad(n){return n<10?'0'+n:String(n);}
function todayStr(){var n=new Date();return pad(n.getMonth()+1)+'/'+pad(n.getDate());}
function nowStr(){var n=new Date();return pad(n.getMonth()+1)+'/'+pad(n.getDate())+' '+pad(n.getHours())+':'+pad(n.getMinutes());}
function toast(msg,dur){var t=eid('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},dur||1800);}

/* ── TIME PARSING ── */
function parseNaturalDate(text){
  var now=new Date();
  var map={'今天':0,'今日':0,'明天':1,'明日':1,'后天':2,'大后天':3};
  var wm={'下周一':1,'下周二':2,'下周三':3,'下周四':4,'下周五':5,'下周六':6,'下周日':0,'下周天':0};
  for(var k in map){if(text.indexOf(k)!==-1){var d=new Date(now);d.setDate(d.getDate()+map[k]);return pad(d.getMonth()+1)+'/'+pad(d.getDate());}}
  for(var k in wm){if(text.indexOf(k)!==-1){var t=wm[k],dy=now.getDay(),df=(t-dy+7)%7;if(df===0)df=7;var d=new Date(now);d.setDate(d.getDate()+df);return pad(d.getMonth()+1)+'/'+pad(d.getDate());}}
  var m=text.match(/(\d{1,2})[\/月](\d{1,2})[日号]?/);
  if(m)return pad(parseInt(m[1]))+'/'+pad(parseInt(m[2]));
  return null;
}
function stripDateKW(text){return text.replace(/(今天|今日|明天|明日|后天|大后天|下周[一二三四五六日天]|\d{1,2}[\/月]\d{1,2}[日号]?)/g,'').trim();}
var _parsedDate=null;
function onCaptureInput(el){
  autoResize(el);
  _parsedDate=parseNaturalDate(el.value);
  eid('date-preview').innerHTML=_parsedDate?'<span class="date-chip">📅 '+(_parsedDate===todayStr()?'今天 · ':'')+_parsedDate+'</span>':'';
}

/* ── CAPTURE ── */
var URL_RE=/https?:\/\/[^\s]+/g;
function submitCapture(){
  var inp=eid('capture-input'),raw=inp.value.trim();if(!raw)return;
  var date=_parsedDate||todayStr(),title=_parsedDate?stripDateKW(raw)||raw:raw;
  var urls=title.match(URL_RE)||[];
  var cleanTitle=urls.length?title.replace(URL_RE,'').trim():title;
  var links=urls.map(function(u){return{url:u,text:u};});
  var task={id:uid(),title:cleanTitle||title,tag:S.selectedTag,date:date,done:false,created:Date.now()};
  if(links.length)task.links=links;
  S.tasks.unshift(task);
  save();inp.value='';inp.style.height='auto';eid('date-preview').innerHTML='';_parsedDate=null;S.selectedTag=null;
  renderCaptureTags();renderTodayTasks();renderAllTasks();renderGreeting();updateBadge();
  if(links.length)toast('已添加，检测到链接，可进编辑页修改显示文字');
  else toast(date===todayStr()?'已添加到今日 ✓':'已添加到 '+date+' ✓');
}

/* ── TASK RENDER ── */
function taskHtml(t){
  var overdue=!t.done&&t.date&&t.date<todayStr();
  var dateLabel=t.date===todayStr()?'今天':t.date;
  var pinned=!!t.pinned;
  var hasChain=t.parentId||(t.childIds&&t.childIds.length);
  var linksHtml='';
  if(t.links&&t.links.length){
    linksHtml='<div class="task-links">'+t.links.map(function(lk){
      return'<a class="task-link-chip" href="'+esc(lk.url)+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗 '+esc(lk.text||lk.url)+'</a>';
    }).join('')+'</div>';
  }
  var imgsHtml='';
  if(t.images&&t.images.length){
    var shown=t.images.slice(0,3);
    var extra=t.images.length-3;
    imgsHtml='<div class="task-img-row" onclick="openTaskImagePreview(\''+t.id+'\',0,event)">'+
      shown.map(function(src){return'<img class="task-img-icon" src="'+src+'" />';}).join('')+
      (extra>0?'<span class="task-img-more">+'+extra+'</span>':'')+
    '</div>';
  }
  return'<div class="task-item'+(t.done?' done':'')+(pinned?' pinned':'')+'" id="ti-'+t.id+'">'+
    '<div class="task-check" onclick="toggleTask(\''+t.id+'\')"><svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'+
    '<div class="task-body" onclick="openEditTask(\''+t.id+'\')">'+
      '<div class="task-title">'+(pinned&&!t.done?'<span class="pin-indicator">📌</span>':'')+esc(t.title)+'</div>'+
      (t.note?'<div class="task-note-preview">'+esc(t.note)+'</div>':'')+
      linksHtml+
      '<div class="task-meta">'+(t.tag?'<span class="task-tag">'+esc(t.tag)+'</span>':'')+
      '<span class="task-date'+(overdue?' overdue':'')+'">'+dateLabel+(overdue?' · 逾期':'')+'</span>'+
      (hasChain?'<span class="task-chain-badge">🔗</span>':'')+
      (t.images&&t.images.length?'<span class="task-img-badge">🖼 '+t.images.length+'</span>':'')+
      '</div>'+
    '</div>'+
    (imgsHtml?imgsHtml:'')+
    '<div class="task-actions">'+
      (!t.done?'<button class="task-act-btn pin-btn'+(pinned?' active':'')+'" onclick="togglePin(\''+t.id+'\',event)" title="'+(pinned?'取消置顶':'置顶')+'">'+(pinned?'📌':'⬆')+'</button>':'')+
      '<button class="task-act-btn del" onclick="deleteTask(\''+t.id+'\',event)" title="删除">×</button>'+
    '</div>'+
  '</div>';
}

function openTaskImagePreview(taskId,idx,e){
  if(e)e.stopPropagation();
  var t=S.tasks.find(function(x){return x.id===taskId;});
  if(!t||!t.images||!t.images[idx])return;
  var ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:flex;align-items:center;justify-content:center;cursor:zoom-out';
  ov.onclick=function(){ov.remove();};
  var img=document.createElement('img');
  img.src=t.images[idx];
  img.style.cssText='max-width:92vw;max-height:92vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,.4)';
  ov.appendChild(img);document.body.appendChild(ov);
}

function sortTasks(tasks){
  return tasks.slice().sort(function(a,b){
    // 1. 置顶未完成 > 普通未完成 > 已完成
    var aPinned=!!a.pinned&&!a.done;
    var bPinned=!!b.pinned&&!b.done;
    var aDone=!!a.done;
    var bDone=!!b.done;
    if(aPinned!==bPinned) return aPinned?-1:1;
    if(aDone!==bDone) return aDone?1:-1;
    // 2. 同优先级按创建时间倒序
    return b.created-a.created;
  });
}

function renderTodayTasks(){
  var el=eid('today-tasks-list');
  var today=sortTasks(S.tasks.filter(function(t){return t.date===todayStr();}));
  el.innerHTML=today.length?today.map(taskHtml).join(''):'<div class="empty-state"><div class="empty-icon">🌿</div><p>今天还没有待办<br>用上面的输入框快速添加</p></div>';
}

function renderAllTasks(){
  var el=eid('all-tasks-list');
  var tasks=S.tasks.slice().filter(function(t){return !t.isTemplate;});
  if(S.taskFilter==='todo')tasks=tasks.filter(function(t){return !t.done;});
  if(S.taskFilter==='done')tasks=tasks.filter(function(t){return t.done;});
  if(!tasks.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">✨</div><p>暂无任务</p></div>';return;}

  var pinned=tasks.filter(function(t){return t.pinned&&!t.done;});
  var rest=tasks.filter(function(t){return !(t.pinned&&!t.done);});
  var html='';

  if(pinned.length){
    html+='<div class="tasks-group"><div class="tasks-group-label tasks-group-label-pin">📌 置顶</div>'+pinned.map(taskHtml).join('')+'</div>';
  }

  var groups={};
  rest.forEach(function(t){var d=t.date||'未分类';if(!groups[d])groups[d]=[];groups[d].push(t);});
  var dates=Object.keys(groups).sort(function(a,b){return b.localeCompare(a);});
  var today=todayStr();

  html+=dates.map(function(d){
    var isPast=d!=='未分类'&&d<today;
    var isToday=d===today;
    // 过去日期默认收起，今天和未来默认展开
    var collapsed=isPast&&S._collapsedDates&&S._collapsedDates[d];
    var sorted=sortTasks(groups[d]);
    var label=isToday?'今天 · '+d:d;
    var undone=groups[d].filter(function(t){return !t.done;}).length;
    var hint=isPast&&undone>0?'<span style="font-size:10px;color:var(--del);margin-left:6px">'+undone+' 未完成</span>':'';
    return'<div class="tasks-group" id="tg-'+d+'">'+
      '<div class="tasks-group-label" style="cursor:pointer;user-select:none" onclick="toggleDateGroup(\''+d+'\')">'+
        '<span class="tg-arrow" id="tga-'+d+'" style="font-size:10px;transition:transform .2s;display:inline-block;margin-right:4px">'+(collapsed?'▶':'▼')+'</span>'+
        label+hint+
      '</div>'+
      '<div id="tgc-'+d+'" style="'+(collapsed?'display:none':'')+'">'+sorted.map(taskHtml).join('')+'</div>'+
    '</div>';
  }).join('');

  el.innerHTML=html;
}

function toggleDateGroup(d){
  if(!S._collapsedDates)S._collapsedDates={};
  S._collapsedDates[d]=!S._collapsedDates[d];
  var content=eid('tgc-'+d);
  var arrow=eid('tga-'+d);
  if(content)content.style.display=S._collapsedDates[d]?'none':'';
  if(arrow)arrow.textContent=S._collapsedDates[d]?'▶':'▼';
}

// 初始化时过去日期默认收起
function initCollapsedDates(){
  if(!S._collapsedDates)S._collapsedDates={};
  var today=todayStr();
  var pastDates=[...new Set(S.tasks.map(function(t){return t.date;}).filter(function(d){return d&&d<today;}))];
  pastDates.forEach(function(d){if(S._collapsedDates[d]===undefined)S._collapsedDates[d]=true;});
}

function togglePin(id,e){
  if(e)e.stopPropagation();
  var t=S.tasks.find(function(x){return x.id===id;});if(!t)return;
  t.pinned=!t.pinned;
  save();renderTodayTasks();renderAllTasks();
  toast(t.pinned?'已置顶 📌':'已取消置顶');
}

function toggleTask(id){
  var t=S.tasks.find(function(x){return x.id===id;});if(!t)return;
  var wasDone=t.done;
  t.done=!t.done;save();
  renderTodayTasks();renderAllTasks();renderGreeting();updateBadge();
  // Show follow-up prompt when completing a task
  if(!wasDone&&t.done) showFollowUpBar(t);
}

/* ── FOLLOW-UP BAR ── */
var _fuTimer=null;
function showFollowUpBar(task){
  clearTimeout(_fuTimer);
  var existing=eid('followup-bar');if(existing)existing.remove();
  var bar=document.createElement('div');
  bar.id='followup-bar';bar.className='followup-bar';
  bar.innerHTML=
    '<div class="followup-bar-text">✓ 完成「'+esc(task.title)+'」</div>'+
    '<div style="display:flex;gap:6px;flex-shrink:0">'+
      '<button class="followup-btn followup-btn-yes" onclick="startFollowUp(\''+task.id+'\',\''+esc(task.title)+'\',\''+task.date+'\')">记录跟进</button>'+
      '<button class="followup-btn followup-btn-yes" style="background:#16a34a" onclick="createNextTask(\''+task.id+'\')">创建下一步</button>'+
      '<button class="followup-btn followup-btn-no" onclick="dismissFollowUp()">忽略</button>'+
    '</div>';
  document.body.appendChild(bar);
  _fuTimer=setTimeout(dismissFollowUp,8000);
}
function dismissFollowUp(){var b=eid('followup-bar');if(b){b.style.opacity='0';b.style.transform='translateX(-50%) translateY(10px)';setTimeout(function(){if(b.parentNode)b.remove();},200);}}
function startFollowUp(taskId,taskTitle,taskDate){
  dismissFollowUp();
  var date=taskDate||todayStr();
  var noteTitle='跟进：'+taskTitle+' · '+date;
  var note={id:uid(),title:noteTitle,body:'',cat:'followup',date:nowStr(),created:Date.now()};
  S.notes.unshift(note);save();
  switchTab('notes');
  setTimeout(function(){openNoteDetail(note.id);},150);
}
function createNextTask(parentId){
  dismissFollowUp();
  var parent=S.tasks.find(function(x){return x.id===parentId;});
  // 打开编辑面板预填新任务，parentId 已绑定
  S._modalAction='addNextTask';
  S._nextTaskParentId=parentId;
  eid('modal-title').textContent='创建下一步任务';
  var tagOpts=['<button class="modal-tag-opt none-opt selected" onclick="modalSelectTag(null,this)">无标签</button>'].concat(
    TAGS.map(function(tg){return'<button class="modal-tag-opt" onclick="modalSelectTag(\''+tg+'\',this)">'+tg+'</button>';})
  ).join('');
  eid('modal-body').innerHTML=
    (parent?'<div style="font-size:12px;color:var(--text3);margin-bottom:12px;padding:8px 12px;background:var(--surface2);border-radius:var(--rxs)">上一步：'+esc(parent.title)+'</div>':'')+
    '<div class="modal-field"><label class="modal-label">任务名称</label><input class="modal-input" id="edit-task-title" placeholder="下一步要做什么？" /></div>'+
    '<div class="modal-field"><label class="modal-label">日期</label><input class="modal-input" id="edit-task-date" value="'+todayStr()+'" placeholder="MM/DD" /></div>'+
    '<div class="modal-field"><label class="modal-label">标签</label><div class="modal-tag-row">'+tagOpts+'</div></div>';
  S._editTaskTag=parent?parent.tag:null;
  // 同步选中父任务标签
  if(parent&&parent.tag){
    S._editTaskTag=parent.tag;
  }
  eid('modal-overlay').style.display='flex';
  setTimeout(function(){eid('edit-task-title').focus();},100);
}

function deleteTask(id,e){
  if(e)e.stopPropagation();
  S.tasks=S.tasks.filter(function(x){return x.id!==id;});
  if(S.deletedIds.indexOf(id)===-1)S.deletedIds.push(id);
  save();renderTodayTasks();renderAllTasks();renderGreeting();updateBadge();toast('已删除');
}
function setFilter(f,btn){S.taskFilter=f;document.querySelectorAll('.filter-pill').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');renderAllTasks();}
function updateBadge(){
  var n=S.tasks.filter(function(t){return !t.done&&t.date===todayStr();}).length;
  var b=eid('badge-tasks');
  if(b){if(n>0){b.textContent=n>9?'9+':n;b.classList.add('visible');}else b.classList.remove('visible');}
  var sb=eid('sidebar-badge-tasks');
  if(sb){if(n>0){sb.textContent=n>9?'9+':n;sb.classList.add('visible');}else sb.classList.remove('visible');}
}

/* ── TASK EDIT MODAL ── */
function openEditTask(id){
  var t=S.tasks.find(function(x){return x.id===id;});if(!t)return;
  S._editingTaskId=id;
  S._modalAction='editTask';
  S._editTaskTag=t.tag||null;
  initEditLinks(t);
  eid('modal-title').textContent='编辑任务';

      return'<div class="chain-item chain-child'+(c.done?' chain-done':'')+'" onclick="closeModal();setTimeout(function(){openEditTask(\''+c.id+'\')},100)">'+(c.done?'✓ ':'↓ ')+esc(c.title)+'<span class="chain-date">'+c.date+'</span></div>';
    }).join('');
  }
  var chainHtml=(parentHtml||childrenHtml)?
    '<div class="modal-field"><label class="modal-label">任务链</label><div class="chain-block">'+parentHtml+childrenHtml+'</div></div>':'';

    if(candidates.length){

      linkHtml='<div class="modal-field"><label class="modal-label">关联上游任务 <span style="font-size:11px;color:var(--text3);font-weight:400">（选填）</span></label><select class="modal-select" id="edit-task-parent">'+opts+'</select></div>';
    }
  }

  eid('modal-body').innerHTML=
    '<div class="modal-field"><label class="modal-label">任务名称</label><input class="modal-input" id="edit-task-title" value="'+esc(t.title)+'" /></div>'+
    '<div class="modal-field"><label class="modal-label">备注</label><textarea class="modal-input" id="edit-task-note" style="height:72px;resize:none;padding-top:8px;line-height:1.5" placeholder="补充说明、背景信息…">'+esc(t.note||'')+'</textarea></div>'+
    '<div class="modal-field"><label class="modal-label">链接 <span style="font-size:11px;color:var(--text3);font-weight:400">（可添加多个）</span></label>'+
      '<div id="edit-task-links">'+renderEditLinks(t)+'</div>'+
      '<button onclick="addEditLink()" style="margin-top:6px;height:28px;padding:0 12px;border:1px dashed var(--border2);border-radius:var(--rxs);background:transparent;font-size:12px;color:var(--text2);cursor:pointer;font-family:inherit">＋ 添加链接</button>'+
    '</div>'+
    '<div class="modal-field"><label class="modal-label">图片 <span style="font-size:11px;color:var(--text3);font-weight:400">（粘贴截图 Ctrl+V）</span></label>'+
      '<div id="edit-task-imgs">'+renderEditImages(t)+'</div>'+
    '</div>'+
    '<div class="modal-field"><label class="modal-label">日期</label><input class="modal-input" id="edit-task-date" value="'+esc(t.date||'')+'" placeholder="MM/DD，如 05/08" /></div>'+
    '<div class="modal-field"><label class="modal-label">标签</label><div class="modal-tag-row">'+tagOpts+'</div></div>'+
    linkHtml+chainHtml;

  setTimeout(function(){
    eid('edit-task-title').focus();

    if(mb) mb.addEventListener('paste',function(e){handleTaskImagePaste(e,S._editingTaskId);});

      '<input class="modal-input" style="flex:2;height:32px;font-size:12px" placeholder="https://..." value="'+esc(lk.url||'')+'" oninput="updateEditLink('+i+',\'url\',this.value)" />'+
      '<button onclick="removeEditLink('+i+')" style="flex-shrink:0;width:28px;height:28px;border:none;background:none;cursor:pointer;color:var(--del);font-size:16px">×</button>'+
    '</div>';

}

function renderEditImages(t){

var _editLinks=[];
function initEditLinks(t){ _editLinks=(t.links||[]).map(function(l){return{url:l.url,text:l.text};});}
function updateEditLink(i,field,val){if(_editLinks[i])_editLinks[i][field]=val;}
function addEditLink(){

function removeEditLink(i){

function handleTaskImagePaste(e,taskId){
  var items=e.clipboardData&&e.clipboardData.items;if(!items)return;
  for(var i=0;i<items.length;i++){
    if(items[i].type.indexOf('image')!==-1){
      e.preventDefault();
      var file=items[i].getAsFile();
      compressImage(file,function(dataUrl){
        var t=S.tasks.find(function(x){return x.id===taskId;});if(!t)return;
        if(!t.images)t.images=[];
        t.images.push(dataUrl);save();
        var el=eid('edit-task-imgs');if(el)el.innerHTML=renderEditImages(t);
        toast('图片已添加 ✓');
      });
      return;
    }
  }
}
function removeEditTaskImage(idx){
  var t=S.tasks.find(function(x){return x.id===S._editingTaskId;});if(!t)return;
  t.images.splice(idx,1);save();
  var el=eid('edit-task-imgs');if(el)el.innerHTML=renderEditImages(t);
}
function compressImage(file,cb){
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var canvas=document.createElement('canvas');
      var MAX=1200,w=img.width,h=img.height;
      if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      var dataUrl=canvas.toDataURL('image/jpeg',0.75);
      var sizeKb=Math.round(dataUrl.length*0.75/1024);
      if(sizeKb>800){toast('图片太大（'+sizeKb+'KB），请截取更小区域');return;}
      cb(dataUrl);
    };img.src=e.target.result;
  };reader.readAsDataURL(file);
}

function modalSelectTag(tag,btn){
  S._editTaskTag=tag;

function confirmModal(){
  if(S._modalAction==='editTask'){
    var t=S.tasks.find(function(x){return x.id===S._editingTaskId;});if(!t)return;
    var title=(eid('edit-task-title').value||'').trim();
    var date=(eid('edit-task-date').value||'').trim();
    var note=(eid('edit-task-note').value||'').trim();
    if(!title){toast('任务名称不能为空');return;}
    t.title=title;t.date=date||t.date;t.tag=S._editTaskTag;t.note=note||'';
    t.links=_editLinks.filter(function(l){return l.url.trim();});
    var parentSel=eid('edit-task-parent');
    if(parentSel&&parentSel.value){
      var pid=parentSel.value;t.parentId=pid;
      var parent=S.tasks.find(function(x){return x.id===pid;});
      if(parent){if(!parent.childIds)parent.childIds=[];if(parent.childIds.indexOf(t.id)===-1)parent.childIds.push(t.id);}
    }
    save();renderTodayTasks();renderAllTasks();closeModal();toast('已更新 ✓');
  }
  if(S._modalAction==='addNextTask'){
    var title=(eid('edit-task-title').value||'').trim();
    var date=(eid('edit-task-date').value||'').trim()||todayStr();
    if(!title){toast('请输入任务名称');return;}
    var parent=S.tasks.find(function(x){return x.id===S._nextTaskParentId;});
    var newTask={id:uid(),title:title,tag:S._editTaskTag,date:date,done:false,created:Date.now(),
      parentId:S._nextTaskParentId,
      pinned:parent?!!parent.pinned:false}; // 继承置顶属性
    if(parent){if(!parent.childIds)parent.childIds=[];parent.childIds.push(newTask.id);}
    S.tasks.unshift(newTask);
    save();renderTodayTasks();renderAllTasks();updateBadge();
    closeModal();toast('下一步任务已创建 ✓');
  }
  if(S._modalAction==='addBook'){
    var title=((eid('new-book-title')||{}).value||'').trim();if(!title){toast('请输入书名');return;}
    S.books.push({id:uid(),title:title,author:((eid('new-book-author')||{}).value||'').trim(),notes:[]});
    save();renderBooks();toast('书已添加 ✓');closeModal();
  }
}

function openNewNote(cat){

      {key:'q3',icon:'💡',label:'有什么新的想法或待验证的判断？'},
      {key:'q4',icon:'💭',label:'今日心情（选填）'},
    ];
    // 解析已有内容（按题目分段存储在 body 里，用分隔符区分）
    var parsed=parseReviewBody(note.body||'');
    bodyContent=REVIEW_QS.map(function(q,i){

      renderNoteImages(note,id)+
    '</div>'+

        '<select class="note-cat-select" onchange="updateNoteField(\''+id+'\',\'cat\',this.value)">'+catOpts+'</select>')+
      '<span style="font-size:11px;color:var(--text3);margin-left:6px">'+note.date+'</span>'+
      '<button style="margin-left:auto;background:none;border:none;cursor:pointer;font-size:12px;color:var(--del);padding:4px 8px;border-radius:var(--rxs)" onclick="deleteNote(\''+id+'\',event,true)">删除</button>'+
    '</div>'+
    '<div class="sub-panel-body" id="note-editor-'+id+'">'+
      '<input class="note-detail-title-input" id="nd-title-'+id+'" placeholder="'+(isReview?'复盘标题':'标题（选填）')+'" value="'+esc(note.title||'')+'" oninput="updateNoteField(\''+id+'\',\'title\',this.value)" />'+

      else if(ta){ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);}
    } else {

      var parsed=parseReviewBody(note.body||'');
      var firstEmpty=parsed.findIndex(function(v){return !v.trim();});
      var focusIdx=firstEmpty>=0?firstEmpty:0;
      var el=eid('rq-'+id+'-'+focusIdx);
      if(el)el.focus();
    }
  },100);
}

var REVIEW_SEP='\n\n---REVIEW_SEP---\n\n';
function parseReviewBody(body){
  if(!body)return['','','',''];
  // 新格式：用分隔符分段
  if(body.indexOf('---REVIEW_SEP---')!==-1){
    var parts=body.split(REVIEW_SEP);
    while(parts.length<4)parts.push('');
    return parts.slice(0,4);
  }
  // 兼容旧格式（纯文本）：整体放在第一段
  return[body,'','',''];
}
function updateReviewField(noteId,idx,val){
  var note=S.notes.find(function(n){return n.id===noteId;});if(!note)return;
  var parts=parseReviewBody(note.body||'');
  parts[idx]=val;
  note.body=parts.join(REVIEW_SEP);
  save();
}

function renderNoteImages(note,id){
  if(!note.images||!note.images.length)return'';
  return'<div class="note-images-wrap" id="nd-imgs-'+id+'">'+
    note.images.map(function(img,i){
      return'<div class="note-img-item">'+
        '<img src="'+img+'" class="note-img" onclick="openImagePreview(\''+id+'\','+i+')" />'+
        '<button class="note-img-del" onclick="deleteNoteImage(\''+id+'\','+i+')">×</button>'+
      '</div>';
    }).join('')+
  '</div>';
}

function handleImagePaste(e,noteId){
  var items=e.clipboardData&&e.clipboardData.items;
  if(!items)return;
  for(var i=0;i<items.length;i++){
    if(items[i].type.indexOf('image')!==-1){
      e.preventDefault();
      var file=items[i].getAsFile();
      compressAndSaveImage(file,noteId);
      return;
    }
  }
}

function compressAndSaveImage(file,noteId){
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var canvas=document.createElement('canvas');
      var MAX=1200;
      var w=img.width,h=img.height;
      if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      var dataUrl=canvas.toDataURL('image/jpeg',0.75);
      var sizeKb=Math.round(dataUrl.length*0.75/1024);
      if(sizeKb>800){toast('图片太大（'+sizeKb+'KB），请截取更小的区域');return;}
      var note=S.notes.find(function(n){return n.id===noteId;});
      if(!note)return;
      if(!note.images)note.images=[];
      note.images.push(dataUrl);
      save();
      // 刷新图片区域
      var wrap=eid('nd-imgs-'+noteId);
      if(wrap){wrap.outerHTML=renderNoteImages(note,noteId);}
      else{
        var bwrap=eid('nd-bodywrap-'+noteId);
        if(bwrap)bwrap.insertAdjacentHTML('beforeend',renderNoteImages(note,noteId));
      }
      toast('图片已添加 ✓');
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function deleteNoteImage(noteId,idx){
  var note=S.notes.find(function(n){return n.id===noteId;});
  if(!note||!note.images)return;
  note.images.splice(idx,1);
  save();
  var wrap=eid('nd-imgs-'+noteId);
  if(wrap)wrap.outerHTML=renderNoteImages(note,noteId);
  toast('图片已删除');
}

function openImagePreview(noteId,idx){
  var note=S.notes.find(function(n){return n.id===noteId;});

  var ov=document.createElement('div');

}
function updateNoteField(id,field,val){var n=S.notes.find(function(x){return x.id===id;});if(n){n[field]=val;save();}}
function closeNoteDetail(){eid('note-detail-panel').style.display='none';renderNotes();}
function deleteNote(id,e,goBack){

function openSearch(){eid('search-overlay').style.display='flex';setTimeout(function(){eid('search-input').focus();},80);}
function closeSearch(){eid('search-overlay').style.display='none';eid('search-input').value='';eid('search-results').innerHTML='<div class="search-empty"><div class="search-empty-icon">🔍</div><p>输入关键词开始搜索</p></div>';}
function hl(text,kw){if(!kw)return esc(text);var re=new RegExp('('+kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');return esc(text).replace(re,'<mark>$1</mark>');}
function runSearch(kw){
  kw=kw.trim();var el=eid('search-results');
  if(!kw){el.innerHTML='<div class="search-empty"><div class="search-empty-icon">🔍</div><p>输入关键词开始搜索</p></div>';return;}
  var kl=kw.toLowerCase(),html='',count=0;
  var mt=S.tasks.filter(function(t){return t.title.toLowerCase().indexOf(kl)!==-1||(t.tag&&t.tag.toLowerCase().indexOf(kl)!==-1)||(t.date&&t.date.indexOf(kw)!==-1);});
  if(mt.length){html+='<div class="search-section-label">任务 ('+mt.length+')</div>';mt.slice(0,10).forEach(function(t){html+='<div class="search-result-item" onclick="goToTask(\''+t.id+'\')"><div class="search-result-title">'+hl(t.title,kw)+'</div><div class="search-result-meta"><span class="search-result-type">任务</span><span>'+t.date+'</span>'+(t.tag?'<span>'+esc(t.tag)+'</span>':'')+(t.done?'<span>已完成</span>':'')+'</div></div>';});count+=mt.length;}
  var mn=S.notes.filter(function(n){return(n.title&&n.title.toLowerCase().indexOf(kl)!==-1)||(n.body&&n.body.toLowerCase().indexOf(kl)!==-1);});
  if(mn.length){html+='<div class="search-section-label">笔记 ('+mn.length+')</div>';mn.slice(0,6).forEach(function(n){var cat=NOTE_CATS.find(function(c){return c.id===n.cat;})||{label:'笔记'};html+='<div class="search-result-item" onclick="goToNote(\''+n.id+'\')"><div class="search-result-title">'+(n.title?hl(n.title,kw):'（无标题）')+'</div>'+(n.body?'<div style="font-size:12px;color:var(--text3);margin:3px 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+hl(n.body.slice(0,80),kw)+'</div>':'')+'<div class="search-result-meta"><span class="search-result-type">'+cat.label+'</span><span>'+n.date+'</span></div></div>';});count+=mn.length;}
  var mb=[];S.books.forEach(function(b){if(b.title.toLowerCase().indexOf(kl)!==-1||(b.author&&b.author.toLowerCase().indexOf(kl)!==-1))mb.push({t:b.title,s:'',bid:b.id,isBook:true});(b.notes||[]).forEach(function(n){if(n.text.toLowerCase().indexOf(kl)!==-1)mb.push({t:b.title,s:n.text,bid:b.id,d:n.date});});});
  if(mb.length){html+='<div class="search-section-label">读书 ('+mb.length+')</div>';mb.slice(0,6).forEach(function(r){html+='<div class="search-result-item" onclick="goToBook(\''+r.bid+'\')"><div class="search-result-title">'+hl(r.isBook?r.t:r.s.slice(0,60),kw)+'</div><div class="search-result-meta"><span class="search-result-type">读书</span><span>'+esc(r.t)+'</span>'+(r.d?'<span>'+r.d+'</span>':'')+'</div></div>';});count+=mb.length;}
  if(!count)html='<div class="search-empty"><div class="search-empty-icon">🕳️</div><p>没有找到「'+esc(kw)+'」的相关内容</p></div>';
  el.innerHTML=html;
}

async function testSync(){
  if(!isConfigured()){toast('请先填写并保存配置');return;}
  setSyncStatus('syncing','测试连接中…');
  var result=await ghPull();
  if(result==='notfound'){
    setSyncStatus('syncing','仓库已连接，正在初始化…');
    var pushed=await ghPush();
    if(pushed){setSyncStatus('ok','连接成功，数据文件已创建 ✓');toast('连接成功 ✓');}
    else{setSyncStatus('err','写入失败，请检查 Token 权限');toast('写入失败');}
  }else if(result===true){renderAll();setSyncStatus('ok','连接成功，数据已同步');toast('连接成功 ✓');}
  else{setSyncStatus('err','连接失败，请检查配置');toast('连接失败');}
}
async function forcePull(){
  if(!isConfigured()){toast('请先配置 GitHub 同步');return;}
  setSyncStatus('syncing','从云端拉取中…');
  var r=await ghPull();
  if(r===true){renderAll();setSyncStatus('ok','已从云端拉取最新数据');toast('拉取成功 ✓');}
  else if(r==='notfound'){setSyncStatus('err','云端还没有数据文件');toast('云端暂无数据');}
  else{setSyncStatus('err','拉取失败');toast('拉取失败');}
}

/* ── BATCH RESCHEDULE ── */
function openBatchReschedule(){
  // 找出所有未完成且日期不是今天或未来的任务（即"过期未完成"）以及今天未完成的
  var candidates=S.tasks.filter(function(t){return !t.done;});
  if(!candidates.length){toast('没有未完成的任务');return;}
  S._modalAction='batchReschedule';
  S._batchSelected={};
  eid('modal-title').textContent='批量转移日期';
  var rows=candidates.map(function(t){
    var overdue=t.date&&t.date<todayStr();
    return'<div class="batch-row" id="brow-'+t.id+'" onclick="toggleBatchSelect(\''+t.id+'\')" style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--rxs);cursor:pointer;transition:background .12s;margin-bottom:4px;background:var(--surface2)">'+
      '<div class="batch-check" id="bchk-'+t.id+'" style="width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;transition:background .15s,border-color .15s"></div>'+
      '<div style="flex:1;min-width:0">'+
        '<div style="font-size:13.5px;color:var(--text1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(t.title)+'</div>'+
        '<div style="font-size:11px;color:'+(overdue?'var(--del)':'var(--text3)')+'">'+t.date+(overdue?' · 逾期':'')+'</div>'+
      '</div>'+
    '</div>';
  }).join('');
  eid('modal-body').innerHTML=
    '<div style="display:flex;gap:8px;margin-bottom:12px;align-items:center">'+
      '<button onclick="batchSelectAll()" style="height:26px;padding:0 10px;border:1px solid var(--border2);border-radius:var(--rxs);background:transparent;font-size:12px;font-family:inherit;cursor:pointer">全选</button>'+
      '<button onclick="batchSelectNone()" style="height:26px;padding:0 10px;border:1px solid var(--border2);border-radius:var(--rxs);background:transparent;font-size:12px;font-family:inherit;cursor:pointer">取消全选</button>'+
      '<span style="font-size:12px;color:var(--text3);margin-left:4px" id="batch-count">已选 0 条</span>'+
    '</div>'+
    '<div style="max-height:300px;overflow-y:auto">'+rows+'</div>'+
    '<div class="modal-field" style="margin-top:14px;margin-bottom:0">'+
      '<label class="modal-label">转移到</label>'+
      '<input class="modal-input" id="batch-target-date" placeholder="MM/DD，如 05/09" value="'+tomorrowStr()+'" />'+
    '</div>';
  eid('modal-overlay').style.display='flex';
}

function tomorrowStr(){var d=new Date();d.setDate(d.getDate()+1);return pad(d.getMonth()+1)+'/'+pad(d.getDate());}

function toggleBatchSelect(id){
  S._batchSelected[id]=!S._batchSelected[id];
  var chk=eid('bchk-'+id);var row=eid('brow-'+id);
  if(S._batchSelected[id]){
    chk.innerHTML='✓';chk.style.background='var(--accent)';chk.style.borderColor='var(--accent)';chk.style.color='#fff';
    row.style.background='var(--accent-light)';row.style.outline='1px solid var(--accent-border)';
  }else{
    chk.innerHTML='';chk.style.background='';chk.style.borderColor='var(--border2)';
    row.style.background='var(--surface2)';row.style.outline='';
  }
  var n=Object.values(S._batchSelected).filter(Boolean).length;
  eid('batch-count').textContent='已选 '+n+' 条';
}
function batchSelectAll(){
  S.tasks.filter(function(t){return !t.done;}).forEach(function(t){S._batchSelected[t.id]=true;toggleBatchSelect(t.id);S._batchSelected[t.id]=true;});
  // 重新渲染选中状态
  S.tasks.filter(function(t){return !t.done;}).forEach(function(t){
    var chk=eid('bchk-'+t.id);var row=eid('brow-'+t.id);
    if(!chk)return;
    chk.innerHTML='✓';chk.style.background='var(--accent)';chk.style.borderColor='var(--accent)';chk.style.color='#fff';
    row.style.background='var(--accent-light)';row.style.outline='1px solid var(--accent-border)';
  });
  var n=S.tasks.filter(function(t){return !t.done;}).length;
  eid('batch-count').textContent='已选 '+n+' 条';
}
function batchSelectNone(){
  Object.keys(S._batchSelected).forEach(function(id){
    S._batchSelected[id]=false;
    var chk=eid('bchk-'+id);var row=eid('brow-'+id);
    if(!chk)return;
    chk.innerHTML='';chk.style.background='';chk.style.borderColor='var(--border2)';
    row.style.background='var(--surface2)';row.style.outline='';
  });
  eid('batch-count').textContent='已选 0 条';
}

/* ── RECURRING TASKS ── */
// repeat: {type:'daily'|'weekly'|'monthly', weekday:0-6(仅weekly), day:1-31(仅monthly)}
function openRecurringManager(){
  var recurring=S.tasks.filter(function(t){return t.repeat&&!t._isRecurringTemplate===false;});
  // 实际存储：repeat 模板任务，用 isTemplate:true 标记
  var templates=S.tasks.filter(function(t){return t.isTemplate;});
  S._modalAction='recurringManager';
  eid('modal-title').textContent='重复任务';
  var WEEK=['周日','周一','周二','周三','周四','周五','周六'];
  var repeatLabel=function(t){
    if(!t.repeat)return'';
    if(t.repeat.type==='daily')return'每天';
    if(t.repeat.type==='weekly')return'每'+WEEK[t.repeat.weekday||1];
    if(t.repeat.type==='monthly')return'每月'+t.repeat.day+'日';
    return'';
  };
  var listHtml=templates.length?templates.map(function(t){
    return'<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface2);border-radius:var(--rxs);margin-bottom:6px">'+
      '<div style="flex:1;min-width:0">'+
        '<div style="font-size:13.5px;font-weight:500;color:var(--text1)">'+esc(t.title)+'</div>'+
        '<div style="font-size:11px;color:var(--accent);margin-top:2px">🔁 '+repeatLabel(t)+'</div>'+
      '</div>'+
      '<button onclick="deleteTemplate(\''+t.id+'\');renderRecurringList()" style="background:none;border:none;cursor:pointer;font-size:13px;color:var(--del);padding:4px 8px;border-radius:var(--rxs)">删除</button>'+
    '</div>';
  }).join(''):'<div style="text-align:center;padding:20px;color:var(--text3);font-size:13px">还没有重复任务</div>';

  eid('modal-body').innerHTML=
    '<div id="recurring-list">'+listHtml+'</div>'+
    '<div style="border-top:1px solid var(--border);padding-top:14px;margin-top:4px">'+
      '<div style="font-size:12px;font-weight:500;color:var(--text2);margin-bottom:10px">添加重复任务</div>'+
      '<div class="modal-field"><label class="modal-label">任务名称</label><input class="modal-input" id="rec-title" placeholder="任务名称" /></div>'+
      '<div class="modal-field"><label class="modal-label">重复频率</label>'+
        '<select class="modal-select" id="rec-type" onchange="updateRecurringFields()">'+
          '<option value="daily">每天</option>'+
          '<option value="weekly">每周（指定星期）</option>'+
          '<option value="monthly">每月（指定日期）</option>'+
        '</select>'+
      '</div>'+
      '<div id="rec-extra"></div>'+
    '</div>';
  updateRecurringFields();
  eid('modal-overlay').style.display='flex';
}

function updateRecurringFields(){
  var type=(eid('rec-type')||{}).value;
  var extra=eid('rec-extra');if(!extra)return;
  var WEEK=['周日','周一','周二','周三','周四','周五','周六'];
  if(type==='weekly'){
    extra.innerHTML='<div class="modal-field"><label class="modal-label">星期几</label>'+
      '<select class="modal-select" id="rec-weekday">'+
        WEEK.map(function(w,i){return'<option value="'+i+'"'+(i===1?' selected':'')+'>'+w+'</option>';}).join('')+
      '</select></div>';
  }else if(type==='monthly'){
    extra.innerHTML='<div class="modal-field"><label class="modal-label">每月几号</label>'+
      '<input class="modal-input" id="rec-day" type="number" min="1" max="31" value="1" placeholder="1-31" /></div>';
  }else{
    extra.innerHTML='';
  }
}

function deleteTemplate(id){
  S.tasks=S.tasks.filter(function(t){return t.id!==id;});save();
}

function renderRecurringList(){
  var WEEK=['周日','周一','周二','周三','周四','周五','周六'];
  var templates=S.tasks.filter(function(t){return t.isTemplate;});
  var repeatLabel=function(t){
    if(!t.repeat)return'';
    if(t.repeat.type==='daily')return'每天';
    if(t.repeat.type==='weekly')return'每'+WEEK[t.repeat.weekday||1];
    if(t.repeat.type==='monthly')return'每月'+t.repeat.day+'日';
    return'';
  };
  var el=eid('recurring-list');if(!el)return;
  el.innerHTML=templates.length?templates.map(function(t){
    return'<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface2);border-radius:var(--rxs);margin-bottom:6px">'+
      '<div style="flex:1;min-width:0"><div style="font-size:13.5px;font-weight:500;color:var(--text1)">'+esc(t.title)+'</div>'+
      '<div style="font-size:11px;color:var(--accent);margin-top:2px">🔁 '+repeatLabel(t)+'</div></div>'+
      '<button onclick="deleteTemplate(\''+t.id+'\');renderRecurringList()" style="background:none;border:none;cursor:pointer;font-size:13px;color:var(--del);padding:4px 8px;border-radius:var(--rxs)">删除</button>'+
    '</div>';
  }).join(''):'<div style="text-align:center;padding:20px;color:var(--text3);font-size:13px">还没有重复任务</div>';
}

function shouldGenerateToday(template,today){
  var r=template.repeat;if(!r)return false;
  var now=new Date();
  if(r.type==='daily')return true;
  if(r.type==='weekly')return now.getDay()===r.weekday;
  if(r.type==='monthly')return now.getDate()===r.day;
  return false;
}

function generateRecurringTasks(){
  var today=todayStr();
  var templates=S.tasks.filter(function(t){return t.isTemplate;});
  var generated=false;
  templates.forEach(function(tmpl){
    if(!shouldGenerateToday(tmpl,today))return;
    // 检查今天是否已有该模板生成的未完成任务
    var existing=S.tasks.find(function(t){return t.fromTemplate===tmpl.id&&t.date===today&&!t.done;});
    if(existing)return;
    // 生成新任务
    S.tasks.unshift({id:uid(),title:tmpl.title,tag:tmpl.tag||null,date:today,done:false,created:Date.now(),fromTemplate:tmpl.id});
    generated=true;
  });
  if(generated){save();renderTodayTasks();renderAllTasks();updateBadge();toast('🔁 重复任务已自动生成');}
}

/* ── MIDNIGHT AUTO-REFRESH ── */
function scheduleMidnightRefresh(){
  var now=new Date();
  var midnight=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1,0,0,5); // 凌晨00:00:05
  var ms=midnight-now;
  setTimeout(function(){
    generateRecurringTasks();
    renderAll(); // 刷新今日列表、日期显示等
    var dd=eid('desktop-header-date');
    if(dd)dd.textContent=new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
    scheduleMidnightRefresh(); // 递归，下一天继续
  },ms);
}

// 更新 confirmModal 增加 batchReschedule 和 recurringManager 处理
var _origConfirmModal=confirmModal;
confirmModal=function(){
  if(S._modalAction==='catManager'){
    // 标签切换实时生效，确认直接关闭
    closeModal();renderNotes();return;
  }
  if(S._modalAction==='batchReschedule'){
    var targetDate=(eid('batch-target-date').value||'').trim();
    if(!targetDate){toast('请填写目标日期');return;}
    var ids=Object.keys(S._batchSelected).filter(function(id){return S._batchSelected[id];});
    if(!ids.length){toast('请至少选择一条任务');return;}
    ids.forEach(function(id){
      var t=S.tasks.find(function(x){return x.id===id;});
      if(t&&!t.done)t.date=targetDate;
    });
    save();renderTodayTasks();renderAllTasks();closeModal();
    toast('已将 '+ids.length+' 条任务转移到 '+targetDate+' ✓');
    return;
  }
  if(S._modalAction==='recurringManager'){
    var title=(eid('rec-title')||{}).value||'';title=title.trim();
    if(!title){toast('请填写任务名称');return;}
    var type=(eid('rec-type')||{}).value||'daily';
    var repeat={type:type};
    if(type==='weekly'){var wd=eid('rec-weekday');repeat.weekday=wd?parseInt(wd.value):1;}
    if(type==='monthly'){var rd=eid('rec-day');repeat.day=rd?parseInt(rd.value):1;}
    S.tasks.push({id:uid(),title:title,tag:null,date:'',done:false,created:Date.now(),isTemplate:true,repeat:repeat});
    save();toast('重复任务已添加 ✓');renderRecurringList();
    eid('rec-title').value='';
    generateRecurringTasks();return;
  }
  _origConfirmModal();
};
</script>
