/* ══ ANALYSIS ══ */
function renderAnalysis(m){
  var today=todayDs();
  var allTasks=S.tasks;
  /* ── today stats ── */
  var todayTasks=allTasks.filter(function(t){return t.ds===today});
  var todayDone=todayTasks.filter(function(t){return t.status==='done'}).length;
  var todayTotal=todayTasks.length;
  var todayRate=todayTotal>0?Math.round(todayDone/todayTotal*100):0;
  /* ── week stats (last 7 days) ── */
  var weekDays=[];
  for(var i=6;i>=0;i--){var d=new Date();d.setDate(d.getDate()-i);weekDays.push({ds:ds(d),label:(d.getMonth()+1)+'/'+(d.getDate()),done:0,total:0})}
  allTasks.forEach(function(t){
    var day=weekDays.find(function(d){return d.ds===t.ds});
    if(!day)return;
    day.total++;
    if(t.status==='done')day.done++;
  });
  /* ── tag distribution ── */
  var tagMap={};
  allTasks.forEach(function(t){
    if(!t.tag)return;
    var tags=t.tag.split('/');
    tags.forEach(function(tg){tg=tg.trim();if(!tg)return;tagMap[tg]=(tagMap[tg]||0)+1});
  });
  var tagEntries=Object.keys(tagMap).map(function(k){return{name:k,count:tagMap[k]}}).sort(function(a,b){return b.count-a.count}).slice(0,6);
  /* ── status distribution ── */
  var statusCount={todo:0,inprogress:0,done:0,cancelled:0};
  allTasks.forEach(function(t){if(statusCount[t.status]!==undefined)statusCount[t.status]++});
  /* ── avg hours ── */
  var withHours=allTasks.filter(function(t){return t.hours>0});
  var avgH=withHours.length>0?(withHours.reduce(function(a,t){return a+t.hours},0)/withHours.length).toFixed(1):0;

  var h='<div style="display:flex;flex-direction:column;gap:14px;overflow-y:auto;flex:1;padding-bottom:8px">';
  /* row 1: summary cards */
  h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">';
  var stats=[
    {label:'今日完成率',val:todayRate+'%',sub:todayDone+' / '+todayTotal+' 个',color:'var(--accent)'},
    {label:'总任务数',val:allTasks.length,sub:'历史累计',color:'var(--green)'},
    {label:'平均预估时长',val:avgH+'h',sub:'有预估的任务',color:'var(--amber)'},
    {label:'记录条数',val:S.records.length,sub:'灵感 & 笔记',color:'var(--purple)'}
  ];
  stats.forEach(function(s){
    h+='<div class="an-kpi">';
    h+='<div style="font-size:11px;color:var(--text3);font-weight:600;letter-spacing:.05em;text-transform:uppercase">'+s.label+'</div>';
    h+='<div style="font-size:28px;font-weight:700;color:'+s.color+';line-height:1">'+s.val+'</div>';
    h+='<div style="font-size:11.5px;color:var(--text2)">'+s.sub+'</div>';
    h+='</div>';
  });
  h+='</div>';
  /* row 2: today ring + week bar chart side by side */
  h+='<div style="display:grid;grid-template-columns:220px 1fr;gap:10px">';
  /* donut ring */
  h+='<div style="background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:16px;display:flex;flex-direction:column;align-items:center;gap:10px">';
  h+='<div style="font-size:12px;font-weight:600;color:var(--text2);align-self:flex-start">今日完成</div>';
  h+='<canvas id="donut-canvas" width="140" height="140"></canvas>';
  h+='<div style="display:flex;gap:14px;font-size:11px">';
  h+='<span style="color:var(--green)">● 已完成 '+todayDone+'</span>';
  h+='<span style="color:var(--text3)">● 未完成 '+(todayTotal-todayDone)+'</span>';
  h+='</div></div>';
  /* week bar chart */
  h+='<div style="background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:16px;display:flex;flex-direction:column;gap:10px">';
  h+='<div style="font-size:12px;font-weight:600;color:var(--text2)">近7天完成情况</div>';
  h+='<canvas id="week-canvas" width="600" height="130"></canvas>';
  h+='</div></div>';
  /* row 3: tag bar + status pie */
  h+='<div style="display:grid;grid-template-columns:1fr 220px;gap:10px">';
  /* tag horizontal bars */
  h+='<div style="background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:16px;display:flex;flex-direction:column;gap:10px">';
  h+='<div style="font-size:12px;font-weight:600;color:var(--text2)">标签分布（Top 6）</div>';
  if(tagEntries.length){
    var maxC=tagEntries[0].count;
    var tagColors=['var(--accent)','var(--green)','var(--amber)','var(--purple)','var(--teal)','var(--red)'];
    tagEntries.forEach(function(e,i){
      var pct=Math.round(e.count/maxC*100);
      h+='<div style="display:flex;align-items:center;gap:10px">';
      h+='<div style="font-size:12px;color:var(--text2);width:70px;text-align:right;flex-shrink:0">'+esc(e.name)+'</div>';
      h+='<div style="flex:1;background:var(--surface2);border-radius:4px;height:14px;overflow:hidden">';
      h+='<div style="width:'+pct+'%;height:100%;background:'+tagColors[i%6]+';border-radius:4px;transition:width .6s var(--ease)"></div></div>';
      h+='<div style="font-size:11.5px;color:var(--text3);width:24px;text-align:right">'+e.count+'</div>';
      h+='</div>';
    });
  } else {h+='<div style="color:var(--text3);font-size:12.5px">暂无带标签的任务</div>';}
  h+='</div>';
  /* status donut */
  h+='<div style="background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:16px;display:flex;flex-direction:column;align-items:center;gap:10px">';

  h+='<canvas id="status-canvas" width="140" height="140"></canvas>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:10.5px;width:100%">';
  [['未开始','var(--c-todo)',statusCount.todo],['进行中','var(--c-doing)',statusCount.inprogress],['已完成','var(--green)',statusCount.done],['已取消','var(--c-cancel)',statusCount.cancelled]].forEach(function(row){
    h+='<span style="color:'+row[1]+'">● '+row[0]+' '+row[2]+'</span>';
  });
  h+='</div></div></div>';
  h+='</div>';
  m.innerHTML=h;
  /* draw charts after DOM ready */
  setTimeout(function(){
    drawDonut('donut-canvas',todayDone,todayTotal-todayDone,['#22c55e','#374151']);
    drawWeekBars('week-canvas',weekDays);
    var sc=statusCount;
    drawDonut('status-canvas',0,0,[],true,[sc.todo,sc.inprogress,sc.done,sc.cancelled],['#6b7280','#5b6ef5','#22c55e','#d97706']);
  },50);
}

function drawDonut(canvasId,done,notDone,colors,multi,vals,mColors){
  var c=byId(canvasId);if(!c)return;
  var ctx=c.getContext('2d');
  var W=c.width,H=c.height,cx=W/2,cy=H/2,r=Math.min(W,H)/2-14,ir=r*0.58;
  ctx.clearRect(0,0,W,H);
  var segments=multi?vals.map(function(v,i){return{v:v,c:mColors[i]}}):([done,notDone].map(function(v,i){return{v:v,c:colors[i]}}));
  var total=segments.reduce(function(a,s){return a+s.v},0);
  if(total===0){
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle='rgba(128,128,128,.2)';ctx.lineWidth=r-ir;ctx.stroke();
    ctx.fillStyle='rgba(128,128,128,.4)';ctx.font='bold 13px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('暂无',cx,cy);
    return;
  }
  var start=-Math.PI/2,gap=0.03;
  segments.forEach(function(seg){
    if(!seg.v)return;
    var sweep=seg.v/total*Math.PI*2-gap;
    ctx.beginPath();ctx.arc(cx,cy,r,start,start+sweep);ctx.arc(cx,cy,ir,start+sweep,start,true);ctx.closePath();
    ctx.fillStyle=seg.c;ctx.fill();
    start+=sweep+gap;
  });
  /* center label for today donut */
  if(!multi){
    var pct=total>0?Math.round(done/total*100):0;
    ctx.fillStyle='var(--text1)' /* fallback */;
    /* use computed color */
    ctx.fillStyle=document.documentElement.classList.contains('light')?'#111318':'#f0f2f8';
    ctx.font='bold 20px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(pct+'%',cx,cy-6);
    ctx.font='11px system-ui';ctx.fillStyle='rgba(128,128,128,.7)';ctx.fillText('完成率',cx,cy+12);
  }
}

function drawWeekBars(canvasId,days){
  var c=byId(canvasId);if(!c)return;
  var ctx=c.getContext('2d');
  var W=c.width,H=c.height;
  ctx.clearRect(0,0,W,H);
  var padL=10,padR=10,padT=10,padB=28;
  var chartW=W-padL-padR,chartH=H-padT-padB;
  var maxV=Math.max(1,Math.max.apply(null,days.map(function(d){return d.total})));
  var barW=Math.floor(chartW/days.length);
  var isDark=!document.documentElement.classList.contains('light');
  var textColor=isDark?'rgba(240,242,248,.5)':'rgba(90,97,112,.7)';
  days.forEach(function(day,i){
    var x=padL+i*barW;
    var bw=barW-6;
    /* total bar (background) */
    if(day.total>0){
      var totalH=Math.round(day.total/maxV*chartH);
      ctx.fillStyle=isDark?'rgba(255,255,255,.07)':'rgba(0,0,0,.06)';
      ctx.beginPath();ctx.roundRect(x+3,padT+chartH-totalH,bw,totalH,3);ctx.fill();
      /* done bar */
      if(day.done>0){
        var doneH=Math.round(day.done/maxV*chartH);
        ctx.fillStyle='#22c55e';
        ctx.globalAlpha=0.85;
        ctx.beginPath();ctx.roundRect(x+3,padT+chartH-doneH,bw,doneH,3);ctx.fill();
        ctx.globalAlpha=1;
      }
      /* count label */
      ctx.fillStyle=isDark?'rgba(240,242,248,.8)':'rgba(30,33,48,.8)';
      ctx.font='10px system-ui';ctx.textAlign='center';
      if(day.total>0)ctx.fillText(day.done+'/'+day.total,x+3+bw/2,padT+chartH-totalH-4);
    }
    /* day label */
    ctx.fillStyle=textColor;ctx.font='10px system-ui';ctx.textAlign='center';
    ctx.fillText(day.label,x+3+bw/2,H-8);
  });
}

function drawWeekBars(){
  var wrap=byId('an-week-bars');if(!wrap)return;
  var days=[];
  for(var i=6;i>=0;i--){var d=new Date();d.setDate(d.getDate()-i);days.push({ds:ds(d),label:(d.getMonth()+1)+'/'+(d.getDate())});}
  var maxTotal=1;
  days.forEach(function(day){
    var dt=S.tasks.filter(function(t){return t.ds===day.ds});
    day.total=dt.length;day.done=dt.filter(function(t){return t.status==='done'}).length;
    if(day.total>maxTotal)maxTotal=day.total;
  });
  var html='';
  days.forEach(function(day){
    var pct=Math.round(day.total/maxTotal*100);
    var donePct=day.total?Math.round(day.done/day.total*100):0;
    html+='<div class="an-bar-row">';
    html+='<div class="an-bar-label">'+day.label+'</div>';
    html+='<div class="an-bar-track"><div class="an-bar-fill" style="width:'+pct+'%;background:linear-gradient(90deg,var(--c-done) '+donePct+'%,var(--accent) '+donePct+'%)"></div></div>';
    html+='<div class="an-bar-count">'+day.done+'/'+day.total+'</div>';
    html+='</div>';
  });
  wrap.innerHTML=html;
}

function drawDonut(canvasId,legendId,segments){
  var canvas=byId(canvasId);if(!canvas||!canvas.getContext)return;
  var total=segments.reduce(function(a,s){return a+s.count},0);
  if(!total){canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);return}
  var ctx=canvas.getContext('2d');
  var W=canvas.offsetWidth||200,H=160;
  canvas.width=W;canvas.height=H;
  var cx=W/2,cy=H/2,R=Math.min(cx,cy)-8,r=R*0.55;
  var angle=-Math.PI/2;
  ctx.clearRect(0,0,W,H);
  segments.forEach(function(s){
    if(!s.count)return;
    var sweep=s.count/total*Math.PI*2;
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,R,angle,angle+sweep);
    ctx.closePath();ctx.fillStyle=s.color;ctx.fill();
    angle+=sweep;
  });
  /* hole */
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--surface').trim()||'#171a23';
  ctx.fill();
  /* center text */
  ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--text1').trim()||'#f0f2f8';
  ctx.font='bold 18px Noto Sans SC,system-ui,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(total,cx,cy-7);
  ctx.font='11px Noto Sans SC,system-ui,sans-serif';
  ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--text3').trim()||'#4e5470';
  ctx.fillText('总计',cx,cy+10);
  /* legend */
  var leg=byId(legendId);if(!leg)return;
  leg.innerHTML=segments.map(function(s){return'<div class="an-legend-item"><div class="an-legend-dot" style="background:'+s.color+'"></div>'+esc(s.label)+' '+s.count+'</div>'}).join('');
}

function drawTagBars(){
  var wrap=byId('an-tag-bars');if(!wrap)return;
  var map={};
  S.tasks.forEach(function(t){if(t.tag){map[t.tag]=(map[t.tag]||0)+1}});
  var sorted=Object.keys(map).sort(function(a,b){return map[b]-map[a]}).slice(0,6);
  if(!sorted.length){wrap.innerHTML='<div class="empty-tip" style="padding:20px 0">暂无标签数据</div>';return}
  var max=map[sorted[0]]||1;
  var colors=['var(--accent2)','var(--green)','var(--purple)','var(--teal)','var(--amber)','var(--red)'];
  wrap.innerHTML=sorted.map(function(tag,i){
    var pct=Math.round(map[tag]/max*100);
    return'<div class="an-bar-row"><div class="an-bar-label">'+esc(tag)+'</div><div class="an-bar-track"><div class="an-bar-fill" style="width:'+pct+'%;background:'+colors[i]+'"></div></div><div class="an-bar-count">'+map[tag]+'</div></div>';
  }).join('');
}

function drawTodayDonut(pct){
  var canvas=byId('an-today');if(!canvas||!canvas.getContext)return;
  var ctx=canvas.getContext('2d');
  var W=160,H=160,cx=80,cy=80,R=66,r=46;
  canvas.width=W;canvas.height=H;
  ctx.clearRect(0,0,W,H);
  /* bg ring */
  ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--surface2').trim()||'#1e2130';
  ctx.lineWidth=R-r;ctx.stroke();
  /* progress arc */
  if(pct>0){
    var sweep=pct/100*Math.PI*2;
    ctx.beginPath();ctx.arc(cx,cy,R,-Math.PI/2,-Math.PI/2+sweep);
    ctx.strokeStyle=pct>=80?'#22c55e':pct>=50?'#5b6ef5':'#f59e0b';
    ctx.lineWidth=R-r;ctx.lineCap='round';ctx.stroke();
  }
  /* center pct */
  ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--text1').trim()||'#f0f2f8';
  ctx.font='bold 24px Noto Sans SC,system-ui,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(pct+'%',cx,cy-8);
  ctx.font='11px Noto Sans SC,system-ui,sans-serif';
  ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--text3').trim()||'#4e5470';
  ctx.fillText('今日完成',cx,cy+12);
}

function toggleCfg(k){S.cfg[k]=!S.cfg[k];if(k==='flashOn'){startFlash();if(!S.cfg[k])byId('flash-strip').classList.add('hidden')}render()}
function toggleFlashType(tp){if(!S.cfg.flashTypes)S.cfg.flashTypes=[];var idx=S.cfg.flashTypes.indexOf(tp);if(idx>=0)S.cfg.flashTypes.splice(idx,1);else S.cfg.flashTypes.push(tp);autoPush();render()}
function addRecType(){var inp=byId('new-type-input');if(!inp)return;var v=inp.value.trim();if(!v||S.recTypes.indexOf(v)>=0)return;S.recTypes.push(v);inp.value='';autoPush();render()}
function delRecType(i){if(S.recTypes.length<=1){alert('至少保留一个类型');return}S.recTypes.splice(i,1);autoPush();render()}

/* ══ TASK OPS ══ */
function delTask(id){if(!confirm('确认删除？'))return;S.tasks=S.tasks.filter(function(t){return t.id!==id});closeModal();render();autoPush()}
function toggleChk(id,cb){var t=S.tasks.find(function(x){return x.id===id});if(t){t.status=cb.checked?'done':'todo';t.prog=cb.checked?100:0}render();autoPush()}
function markDone(id){
  var t=S.tasks.find(function(x){return x.id===id});
  if(!t)return;
  var wasDone=t.status==='done';
  t.status=wasDone?'todo':'done';t.prog=t.status==='done'?100:0;
  /* play complete animation */
  if(!wasDone){
    var el=byId('tc-'+id);
    if(el){
      el.classList.add('completing');
      var rect=el.getBoundingClientRect();
      var fc=document.createElement('span');
      fc.className='float-check';fc.textContent='✓';
      fc.style.left=(rect.left+rect.width/2-11)+'px';
      fc.style.top=(rect.top+rect.height/2)+'px';
      fc.style.color='var(--c-done)';
      document.body.appendChild(fc);
      setTimeout(function(){fc.remove()},700);
    }
  }
  setTimeout(function(){render();autoPush();},wasDone?0:350);
}
function moveToInbox(id){var t=S.tasks.find(function(x){return x.id===id});if(t){t.loc='inbox';t.ds=''}S.view='inbox';render();autoPush()}
function postpone(id,days){var t=S.tasks.find(function(x){return x.id===id});if(!t)return;var d=t.ds?new Date(t.ds):new Date();d.setDate(d.getDate()+days);t.ds=ds(d);closeAllPops();render();autoPush()}
function postponeNextMon(id){var t=S.tasks.find(function(x){return x.id===id});if(!t)return;var d=t.ds?new Date(t.ds):new Date();var diff=d.getDay()===0?1:8-d.getDay();d.setDate(d.getDate()+diff);t.ds=ds(d);closeAllPops();render();autoPush()}

/* ══ TASK DESC TOOLTIP ══ */
var _tooltipEl=null,_tooltipTimer=null;
function showDescTooltip(e,desc){
  if(!desc||!desc.trim())return;
  clearTimeout(_tooltipTimer);
  _tooltipTimer=setTimeout(function(){
    hideDescTooltip();
    _tooltipEl=document.createElement('div');
    _tooltipEl.className='tc-tooltip';
    _tooltipEl.textContent=desc;
    document.body.appendChild(_tooltipEl);
    var tw=_tooltipEl.offsetWidth,th=_tooltipEl.offsetHeight;
    var x=Math.min(e.clientX+14,window.innerWidth-tw-8);
    var y=e.clientY+20+th>window.innerHeight?e.clientY-th-8:e.clientY+14;
    _tooltipEl.style.left=x+'px';_tooltipEl.style.top=y+'px';
  },400);
}
function hideDescTooltip(){
  clearTimeout(_tooltipTimer);
  if(_tooltipEl){_tooltipEl.remove();_tooltipEl=null;}
}

/* ══ ATTACHMENTS ══ */
function addLink(){var v=byId('m-link').value.trim();if(!v)return;if(!/^https?:\/\//i.test(v))v='https://'+v;S.links.push(v);byId('m-link').value='';renderLinks()}
function removeLink(i){S.links.splice(i,1);renderLinks()}
function renderLinks(){var el=byId('link-list');if(!el)return;el.innerHTML=S.links.map(function(l,i){var lbl=l.replace(/^https?:\/\//,'').substring(0,26);return'<div class="attach-chip">🔗'+esc(lbl)+'<span onclick="removeLink('+i+')" style="margin-left:3px;cursor:pointer;color:var(--text3)">×</span></div>'}).join('')}
function handleImgUpload(e){
  var files=Array.from(e.target.files);e.target.value='';
  if(getToken()){files.forEach(function(f){ghUploadImage(f).then(function(url){S.imgs.push({name:f.name,src:url});renderImgs()}).catch(function(){var r=new FileReader();r.onload=function(ev){S.imgs.push({name:f.name,src:ev.target.result});renderImgs()};r.readAsDataURL(f)})});}
  else{files.forEach(function(f){var r=new FileReader();r.onload=function(ev){S.imgs.push({name:f.name,src:ev.target.result});renderImgs()};r.readAsDataURL(f)})}
}
function removeImg(i){S.imgs.splice(i,1);renderImgs()}
function renderImgs(){var el=byId('img-list');if(!el)return;el.innerHTML=S.imgs.map(function(img,i){return'<div style="position:relative;display:inline-block"><img class="attach-img-preview" src="'+img.src+'" onclick="window.open(\''+img.src+'\')">'+'<span onclick="removeImg('+i+')" style="position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer">×</span></div>'}).join('')}

/* ══ TASK MODAL ══ */
function updStatusBar(){var v=byId('m-status').value;var bar=byId('status-bar');if(bar)bar.className='status-bar '+v}
function openModalWithStatus(status){
  openModal(null,null);
  byId('m-status').value=status||'todo';updStatusBar();
  /* sync date to current kanban date */
  byId('m-date').value=ds(S.cur);
  var base=ds(S.cur);
  byId('m-start').value=base+'T09:00';byId('m-end').value=base+'T18:00';
}
function openModal(id,priStr){
  S.editId=id||null;S.loc='date';S.detOpen=false;S.links=[];S.imgs=[];resetModal();
  if(typeof priStr==='string'&&/^q[1-4]$/.test(priStr)){S.pri=priStr;applyP(priStr)}
  if(id){
    var t=S.tasks.find(function(x){return x.id===id});
    if(t){byId('m-title').value=t.title;byId('m-tag').value=t.tag||'';byId('m-status').value=t.status;updStatusBar();byId('m-repeat').value=t.repeat||'none';byId('m-hours').value=t.hours||0;byId('m-date').value=t.ds||todayDs();byId('m-desc').value=t.desc||'';S.links=(t.links||[]).slice();S.imgs=(t.imgs||[]).slice();renderLinks();renderImgs();byId('del-btn-wrap').innerHTML='<button class="btn btn-danger" onclick="delTask('+id+')">'+IC.trash+' 删除</button>';}
    byId('mtitle').textContent='编辑待办';byId('bsave').textContent='保存';
  } else {byId('mtitle').textContent='新建待办';byId('bsave').textContent='创建';byId('del-btn-wrap').innerHTML='';}
  byId('overlay').classList.add('open');
  setTimeout(function(){buildTagSelect();if(!S.editId)byId('m-tag').value='日常待办';var el=byId('m-title');if(el)el.focus()},80);
}
function resetModal(){['m-title','m-desc','m-link'].forEach(function(id){byId(id).value=''});byId('m-tag').value='日常待办';byId('m-status').value='todo';updStatusBar();byId('m-repeat').value='none';byId('m-hours').value=0;S.pri='q4';var n=new Date(),base=ds(n);byId('m-start').value=base+'T09:00';byId('m-end').value=base+'T18:00';byId('m-date').value=base;applyLoc('date');byId('link-list').innerHTML='';byId('img-list').innerHTML='';byId('del-btn-wrap').innerHTML=''}
function closeModal(){byId('overlay').classList.remove('open')}
function ovClick(e){if(e.target===byId('overlay'))closeModal()}
function selLoc(l){S.loc=l;applyLoc(l)}
function applyLoc(l){byId('loc-date').className='locbtn '+(l==='date'?'sdate':'sinbox');byId('loc-inbox').className='locbtn '+(l==='inbox'?'sdate':'sinbox');byId('tfields').style.display=l==='date'?'grid':'none'}
function selP(p){S.pri=p;applyP(p)}
function applyP(p){document.querySelectorAll('.popt').forEach(function(b){b.classList.toggle('sel',b.dataset.p===p)})}
/* ══ TASK TAG DROPDOWN ══ */
function addRecTypeInModal(){
  var inp=byId('rec-type-new');if(!inp)return;
  var v=inp.value.trim();if(!v||S.recTypes.indexOf(v)>=0)return;
  S.recTypes.push(v);inp.value='';rebuildRecTypeSelect();byId('rec-type').value=v;autoPush();
}
function delRecTypeInModal(){
  var sel=byId('rec-type');if(!sel||S.recTypes.length<=1){showToast('至少保留一个类型');return}
  var v=sel.value;var idx=S.recTypes.indexOf(v);if(idx<0)return;
  S.recTypes.splice(idx,1);rebuildRecTypeSelect();autoPush();
}
function buildTagSelect(){
  var sel=byId('m-tag');if(!sel)return;
  var cur=sel.value;
  sel.innerHTML=S.taskTags.map(function(t){return'<option value="'+esc(t)+'">'+esc(t)+'</option>'}).join('');
  if(cur&&S.taskTags.indexOf(cur)>=0)sel.value=cur;
  else if(S.taskTags.length)sel.value=S.taskTags[0];
}
function addCustomTag(){
  var inp=byId('m-tag-new');if(!inp)return;
  var v=inp.value.trim();if(!v||S.taskTags.indexOf(v)>=0)return;
  S.taskTags.push(v);inp.value='';
  buildTagSelect();
  byId('m-tag').value=v;
  autoPush();
}
function delCustomTag(){
  var sel=byId('m-tag');if(!sel||S.taskTags.length<=1)return;
  var v=sel.value;var idx=S.taskTags.indexOf(v);
  if(idx<0)return;
  S.taskTags.splice(idx,1);
  buildTagSelect();
  autoPush();
}
function updRepeatDetail(){
  var v=byId('m-repeat').value;
  var det=byId('repeat-detail');
  var cont=byId('repeat-detail-content');
  if(!det||!cont)return;
  if(v==='weekly'){
    det.style.display='flex';
    var days=['一','二','三','四','五','六','日'];
    var sel=(S._repeatWeekdays||[]);
    cont.innerHTML='每周 '+days.map(function(d,i){
      var isSel=sel.indexOf(i)>=0;
      return '<button class="weekday-chip'+(isSel?' sel':'')+'" onclick="toggleWeekday('+i+',this)">'+d+'</button>';
    }).join('');
  } else if(v==='monthly'){
    det.style.display='flex';
    var mday=S._repeatMonthday||1;
    cont.innerHTML='每月 <select id="m-monthday" onchange="S._repeatMonthday=parseInt(this.value)">'+
      Array.from({length:31},function(_,i){return'<option value="'+(i+1)+'"'+(mday===i+1?' selected':'')+'>'+(i+1)+'号</option>'}).join('')+'</select>';
  } else {
    det.style.display='none';
  }
}
function toggleWeekday(idx,btn){
  if(!S._repeatWeekdays)S._repeatWeekdays=[];
  var i=S._repeatWeekdays.indexOf(idx);
  if(i>=0){S._repeatWeekdays.splice(i,1);btn.classList.remove('sel');}
  else{S._repeatWeekdays.push(idx);btn.classList.add('sel');}
}

function saveTask(){
  var title=byId('m-title').value.trim();if(!title){alert('请输入任务标题');return}
  var status=byId('m-status').value,tag=(byId('m-tag').value||'').trim(),repeat=byId('m-repeat').value;
  var hours=parseFloat(byId('m-hours').value)||0,dateStr=byId('m-date').value||todayDs();
  var repeatWeekdays=(repeat==='weekly'?(S._repeatWeekdays||[]).slice():[]);
  var repeatMonthday=(repeat==='monthly'?(S._repeatMonthday||1):null);
  var prog=0,desc=byId('m-desc').value.trim();
  
  var tagType=tag.indexOf('周')>=0?'purple':'green';
  if(S.editId!==null){var t=S.tasks.find(function(x){return x.id===S.editId});if(t)Object.assign(t,{title:title,desc:desc,status:status,tag:tag,tagType:tagType,pri:S.pri,prog:prog,repeat:repeat,hours:hours,ds:dateStr,links:S.links.slice(),imgs:S.imgs.slice(),loc:S.loc});}
  else{var mo=S.tasks.filter(function(x){return x.status===status}).length;var newId=S.nid++;S.tasks.push({id:newId,title:title,desc:desc,status:status,tag:tag,tagType:tagType,pri:S.pri,prog:prog,repeat:repeat,hours:hours,ds:dateStr,links:S.links.slice(),imgs:S.imgs.slice(),loc:S.loc,order:mo});
    /* link back to source record if converted */
    if(S._convertFromRec){var srcRec=S.records.find(function(x){return x.id===S._convertFromRec});if(srcRec)srcRec.linkedTaskId=newId;S._convertFromRec=null;}
  }
  closeModal();render();autoPush();
}

function renderShortcutPopup(){
  var grid=byId('shortcut-popup-grid');if(!grid)return;
  var items=S.shortcuts||[];
  if(!items.length){
    grid.innerHTML='<div class="shortcut-popup-empty">暂无快捷入口<br>点击下方「管理入口」添加</div>';
    return;
  }
  var h='';
  items.forEach(function(item,i){
    var faviconUrl=item.url?('https://www.google.com/s2/favicons?domain='+encodeURIComponent(item.url)+'&sz=32'):'';
    var itemJson=JSON.stringify(item).replace(/"/g,'&quot;');
    h+='<button class="shortcut-popup-item" onclick="openDockSite('+itemJson+');closeShortcutMenu()">';
    h+='<div class="shortcut-popup-icon">';
    if(item.imgSrc){
      h+='<img src="'+item.imgSrc+'" style="width:100%;height:100%;object-fit:cover;border-radius:9px" alt="">';
    } else if(faviconUrl&&item.url){
      h+='<img src="'+faviconUrl+'" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'" alt="">';
      h+='<span style="display:none;align-items:center;justify-content:center;font-size:20px;width:100%;height:100%">'+item.emoji+'</span>';
    } else {
      h+='<span style="font-size:20px">'+item.emoji+'</span>';
    }
    h+='</div>';
    h+='<span class="shortcut-popup-name">'+esc(item.name)+'</span>';
    h+='</button>';
  });
  grid.innerHTML=h;
}
function toggleShortcutMenu(e){
  e.stopPropagation();
  var popup=byId('shortcut-popup');
  var btn=byId('shortcut-menu-btn');
  if(!popup)return;
  var isOpen=popup.classList.contains('open');
  closeShortcutMenu();
  if(!isOpen){
    renderShortcutPopup();
    /* position popup below the button */
    var rect=btn.getBoundingClientRect();
    popup.style.left=rect.left+'px';
    popup.classList.add('open');
    btn.classList.add('active');
  }
}
function closeShortcutMenu(){
  var popup=byId('shortcut-popup');
  var btn=byId('shortcut-menu-btn');
  if(popup)popup.classList.remove('open');
  if(btn)btn.classList.remove('active');
}
/* close on outside click */
document.addEventListener('click',function(e){
  var popup=byId('shortcut-popup');
  if(popup&&popup.classList.contains('open')&&!popup.contains(e.target))closeShortcutMenu();
});


function openDockSite(item){
  if(!item.url){showToast('请先在设置中配置网址');return}
  window.open(item.url,'_blank');
}



/* Settings shortcuts tab render */
function renderShortcutsSettings(container){
  var h='<div class="scard"><h3>快捷入口管理</h3>';
  h+='<div style="font-size:11.5px;color:var(--text3);margin-bottom:10px">点击 topbar「入口」按钮展开快捷菜单 · 拖动 ⋮⋮ 手柄排序 · 点 ✎ 编辑</div>';
  h+='<div class="dock-manage-grid" id="dock-manage-grid">';
  (S.shortcuts||[]).forEach(function(item,i){
    var iconHtml='';
    if(item.imgSrc){iconHtml='<img src="'+item.imgSrc+'" style="width:100%;height:100%;object-fit:cover;border-radius:6px" alt="">';}
    else{iconHtml='<span style="font-size:20px">'+item.emoji+'</span>';}
    h+='<div>';
    h+='<div class="dock-manage-item" id="dmi-'+i+'" draggable="true" ondragstart="scDragStart(event,'+i+')" ondragover="scDragOver(event,'+i+')" ondragleave="scDragLeave(event)" ondrop="scDrop(event,'+i+')" ondragend="scDragEnd()">';
    h+='<span class="dock-drag-handle">⋮⋮</span>';
    h+='<div style="position:relative;overflow:hidden;border-radius:6px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:var(--surface3);flex-shrink:0">'+iconHtml+'</div>';
    h+='<div class="dock-manage-info"><div class="dock-manage-name">'+esc(item.name)+'</div><div class="dock-manage-url">'+esc(item.url||'未配置网址')+'</div></div>';
    h+='<button class="dock-manage-del" onclick="toggleScEdit('+i+')" title="编辑" style="color:var(--accent2);font-size:14px">✎</button>';
    h+='<button class="dock-manage-del" onclick="delShortcut('+i+')" title="删除">×</button>';
    h+='</div>';
    /* inline edit panel */
    var modeOpts=['new-tab','iframe'].map(function(m){return'<option value="'+m+'"'+(item.openMode===m?' selected':'')+'>'+( m==='new-tab'?'↗ 新标签打开':'▣ 侧边嵌入')+'</option>'}).join('');
    h+='<div class="dock-manage-edit-panel" id="dme-'+i+'">';
    h+='<div class="dme-row">';
    h+='<div class="dme-field"><div class="dme-label">图标</div>';
    h+='<div class="dme-icon-wrap">';
    h+='<input class="dme-icon-input" id="dme-emoji-'+i+'" value="'+esc(item.emoji)+'" maxlength="4" onclick="triggerDmeImg('+i+')" title="点击上传图片或输入emoji" placeholder="🌐">';
    h+='<input type="file" class="dme-img-upload" id="dme-img-'+i+'" accept="image/*" onchange="handleDmeImg(event,'+i+')">';
    var prevStyle=item.imgSrc?'display:block':'display:none';
    h+='<div class="dme-img-preview" id="dme-prev-'+i+'" style="'+prevStyle+'"><img id="dme-prev-img-'+i+'" src="'+(item.imgSrc||'')+'"></div>';
    h+='</div></div>';
    h+='<div class="dme-field"><div class="dme-label">名称</div><input class="dme-input" id="dme-name-'+i+'" value="'+esc(item.name)+'" placeholder="网站名称"></div>';
    h+='<div class="dme-field"><div class="dme-label">打开方式</div><select class="dme-input" id="dme-mode-'+i+'">'+modeOpts+'</select></div>';
    h+='</div>';
    h+='<div class="dme-field" style="margin-bottom:8px"><div class="dme-label">网址</div><input class="dme-input" id="dme-url-'+i+'" value="'+esc(item.url||'')+'" placeholder="https://..."></div>';
    h+='<div class="dme-actions">';
    h+='<button class="btn btn-ghost" style="height:30px;font-size:12px;padding:0 12px" onclick="toggleScEdit('+i+')">取消</button>';
    h+='<button class="btn btn-primary" style="height:30px;font-size:12px;padding:0 12px" onclick="saveScEdit('+i+')">保存</button>';
    h+='</div></div>';
    h+='</div>';
  });
  h+='</div>';
  /* Add new shortcut form */
  h+='<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">';
  h+='<div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px">添加新快捷入口</div>';
  h+='<div style="display:grid;grid-template-columns:60px 1fr 1fr;gap:6px;margin-bottom:6px">';
  h+='<div style="position:relative;width:60px;height:38px">';
  h+='<input id="sc-emoji" placeholder="🌐" maxlength="4" style="width:100%;height:100%;padding:0 6px;text-align:center;font-size:18px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--surface2);color:var(--text1);font-family:inherit;outline:none;cursor:pointer" onclick="triggerScImgUpload()" title="点击上传图片或直接输入emoji">';
  h+='<input type="file" id="sc-img-upload" accept="image/*" style="display:none" onchange="handleScImgUpload(event)">';
  h+='<div id="sc-img-preview" style="position:absolute;inset:0;border-radius:var(--rs);overflow:hidden;pointer-events:none;display:none"><img id="sc-img-preview-img" style="width:100%;height:100%;object-fit:cover"></div>';
  h+='</div>';
  h+='<input id="sc-name" placeholder="网站名称" style="padding:7px 10px;border:1px solid var(--border2);border-radius:var(--rs);font-size:12.5px;background:var(--surface2);color:var(--text1);font-family:inherit;outline:none">';
  h+='<select id="sc-mode" style="padding:7px 10px;border:1px solid var(--border2);border-radius:var(--rs);font-size:12.5px;background:var(--surface2);color:var(--text1);font-family:inherit;outline:none">';
  h+='<option value="new-tab">↗ 新标签打开</option><option value="iframe">▣ 侧边嵌入</option></select>';
  h+='</div>';
  h+='<input id="sc-url" placeholder="https://..." style="width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--rs);font-size:12.5px;background:var(--surface2);color:var(--text1);font-family:inherit;outline:none;margin-bottom:6px">';
  h+='<button onclick="addShortcut()" class="btn btn-primary" style="width:100%;height:34px;font-size:12.5px">添加到 Dock</button>';
  h+='</div></div>';
  container.innerHTML=h;
}

var _scImgSrc='';
function triggerScImgUpload(){var el=byId('sc-img-upload');if(el)el.click();}
function handleScImgUpload(e){
  var f=e.target.files[0];if(!f)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    _scImgSrc=ev.target.result;
    var prev=byId('sc-img-preview');var img=byId('sc-img-preview-img');
    if(prev&&img){img.src=_scImgSrc;prev.style.display='block';}
    var inp=byId('sc-emoji');if(inp)inp.value='';
  };
  reader.readAsDataURL(f);e.target.value='';
}
/* shortcut drag sort */
var _scDragIdx=null;
function scDragStart(e,i){_scDragIdx=i;setTimeout(function(){var el=document.getElementById('dmi-'+i);if(el)el.classList.add('dragging')},0)}
function scDragOver(e,i){e.preventDefault();if(_scDragIdx===null||_scDragIdx===i)return;document.querySelectorAll('.dock-manage-item').forEach(function(el){el.classList.remove('drag-over')});var el=document.getElementById('dmi-'+i);if(el)el.classList.add('drag-over')}
function scDragLeave(e){e.currentTarget.classList.remove('drag-over')}
function scDrop(e,i){
  e.preventDefault();
  document.querySelectorAll('.dock-manage-item').forEach(function(el){el.classList.remove('drag-over','dragging')});
  if(_scDragIdx===null||_scDragIdx===i){_scDragIdx=null;return}
  var item=S.shortcuts.splice(_scDragIdx,1)[0];
  S.shortcuts.splice(i,0,item);
  _scDragIdx=null;
  autoPush();renderSettings(byId('main'));
}
function scDragEnd(){document.querySelectorAll('.dock-manage-item').forEach(function(el){el.classList.remove('dragging','drag-over')});_scDragIdx=null}

function triggerDmeImg(i){var el=byId('dme-img-'+i);if(el)el.click();}
function handleDmeImg(e,i){
  var f=e.target.files[0];if(!f)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    var prev=byId('dme-prev-'+i);var img=byId('dme-prev-img-'+i);var inp=byId('dme-emoji-'+i);
    if(prev&&img){img.src=ev.target.result;prev.style.display='block';}
    if(inp)inp.value='';
    if(!window._dmeImgCache)window._dmeImgCache={};
    window._dmeImgCache[i]=ev.target.result;
  };
  reader.readAsDataURL(f);e.target.value='';
}
function toggleScEdit(i){
  var panel=byId('dme-'+i);if(!panel)return;
  var isOpen=panel.classList.contains('open');
  document.querySelectorAll('.dock-manage-edit-panel').forEach(function(p){p.classList.remove('open')});
  if(!isOpen)panel.classList.add('open');
}
function saveScEdit(i){
  var item=S.shortcuts[i];if(!item)return;
  var nameEl=byId('dme-name-'+i);var urlEl=byId('dme-url-'+i);
  var emojiEl=byId('dme-emoji-'+i);var modeEl=byId('dme-mode-'+i);
  if(nameEl&&nameEl.value.trim())item.name=nameEl.value.trim();
  var url=urlEl?urlEl.value.trim():'';
  if(url&&!/^https?:\/\//i.test(url))url='https://'+url;
  item.url=url;
  if(emojiEl&&emojiEl.value.trim())item.emoji=emojiEl.value.trim();
  if(modeEl)item.openMode=modeEl.value;
  if(window._dmeImgCache&&window._dmeImgCache[i]){item.imgSrc=window._dmeImgCache[i];delete window._dmeImgCache[i];}
  else if(emojiEl&&emojiEl.value.trim()){item.imgSrc='';}
  autoPush();renderSettings(byId('main'));
}

function addShortcut(){
  var name=(byId('sc-name')||{}).value&&byId('sc-name').value.trim();
  var url=(byId('sc-url')||{}).value&&byId('sc-url').value.trim();
  var emoji=(byId('sc-emoji')||{}).value&&byId('sc-emoji').value.trim()||'🌐';
  var mode=(byId('sc-mode')||{}).value||'new-tab';
  if(!name){showToast('请填写网站名称');return}
  if(url&&!/^https?:\/\//i.test(url))url='https://'+url;
  if(!S.shortcuts)S.shortcuts=[];
  S.shortcuts.push({id:S.shortcutId++,name:name,url:url||'',emoji:emoji,imgSrc:_scImgSrc||'',openMode:mode});
  _scImgSrc='';
  autoPush();renderSettings(byId('main'));
}
function delShortcut(i){
  if(!confirm('确认删除？'))return;
  S.shortcuts.splice(i,1);autoPush();renderSettings(byId('main'));
}

function editShortcut(i){
  var item=S.shortcuts[i];if(!item)return;
  var newUrl=prompt('修改网址（当前：'+(item.url||'未设置')+'）',item.url||'https://');
  if(newUrl===null)return;
  if(newUrl&&!/^https?:\/\//i.test(newUrl))newUrl='https://'+newUrl;
  item.url=newUrl||'';
  var newName=prompt('修改名称（当前：'+item.name+'）',item.name);
  if(newName!==null&&newName.trim())item.name=newName.trim();
  var newEmoji=prompt('修改图标 emoji（当前：'+item.emoji+'）',item.emoji);
  if(newEmoji!==null&&newEmoji.trim())item.emoji=newEmoji.trim();
  autoPush();renderSettings(byId('main'));
}

/* ══ THEME ══ */
function toggleTheme(){
  var isLight=document.documentElement.classList.toggle('light');
  byId('ti-moon').style.display=isLight?'none':'block';
  byId('ti-sun').style.display=isLight?'block':'none';
  try{localStorage.setItem('tf-theme',isLight?'light':'dark')}catch(e){}
}

/* ══ INIT ══ */
function init(){
  try{if(localStorage.getItem('tf-theme')==='light'){document.documentElement.classList.add('light');byId('ti-moon').style.display='none';byId('ti-sun').style.display='block'}}catch(e){}
  byId('dchip').textContent=fmtDate(S.cur);
  var n=new Date(),base=ds(n);
  byId('m-start').value=base+'T09:00';byId('m-end').value=base+'T18:00';byId('m-date').value=base;
  byId('date-pick-input').value=base;
  /* restore local backup first, render immediately */
  var savedAt=localLoad();
  if(savedAt){
    var ago=Math.round((Date.now()-savedAt)/1000);
    var agoStr=ago<60?ago+'秒前':ago<3600?Math.round(ago/60)+'分钟前':Math.round(ago/3600)+'小时前';
    console.log('[本地备份] 已恢复，保存于 '+agoStr);
  }
  /* restore flash collapsed state */
  try{var fc=localStorage.getItem('tf-flash-collapsed');if(fc==='0'){_flashCollapsed=false;var btn=byId('flash-toggle-btn');if(btn)btn.classList.remove('collapsed');var lbl=byId('flash-toggle-label');if(lbl)lbl.textContent='收起';}}catch(e){}
  startFlash();
  updateInboxBadge();
  /* init dock shortcuts if not set */
  if(!S.shortcuts){S.shortcuts=[{id:1,name:'OA系统',url:'',emoji:'🏢',openMode:'new-tab'},{id:2,name:'会议室预订',url:'',emoji:'📅',openMode:'new-tab'},{id:3,name:'手机标准',url:'',emoji:'📱',openMode:'new-tab'}];S.shortcutId=4;}
  /* shortcut popup ready (renders on demand) */
  if(getToken()){
    /* GitHub pulls latest and overwrites local */
    ghPull();
  } else {
    render();
    if(savedAt) showToast('已从本地恢复数据（'+new Date(savedAt).toLocaleTimeString()+'）');
  }
}
init();
</script>
