<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工作台</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');
:root{
  --bg:#0f1117;--surface:#171a23;--surface2:#1e2130;--surface3:#252840;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --text1:#f0f2f8;--text2:#8b91a8;--text3:#4e5470;
  --accent:#5b6ef5;--accent2:#7c8fff;--accent-bg:rgba(91,110,245,.18);--accent-border:rgba(91,110,245,.35);
  --c-todo:#6b7280;--c-doing:#5b6ef5;--c-done:#22c55e;--c-cancel:#d97706;
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,.15);
  --green:#4ade80;--green-bg:rgba(74,222,128,.12);
  --teal:#2dd4bf;--teal-bg:rgba(45,212,191,.12);
  --amber:#fbbf24;--amber-bg:rgba(251,191,36,.12);
  --red:#f87171;--red-bg:rgba(248,113,113,.15);
  --r:12px;--rs:8px;--rxs:5px;
  --ease:cubic-bezier(.25,.46,.45,.94);
}
html.light{
  --bg:#f4f5f7;--surface:#fff;--surface2:#f0f1f5;--surface3:#e4e6ed;
  --border:rgba(0,0,0,.07);--border2:rgba(0,0,0,.13);
  --text1:#111318;--text2:#5c6170;--text3:#9ca3af;
  --accent:#4355e8;--accent2:#3b4dd4;--accent-bg:rgba(67,85,232,.1);--accent-border:rgba(67,85,232,.25);
  --c-todo:#9ca3af;--c-doing:#4355e8;--c-done:#16a34a;--c-cancel:#d97706;
  --purple:#7c3aed;--purple-bg:rgba(124,58,237,.1);
  --green:#16a34a;--green-bg:rgba(22,163,74,.1);
  --teal:#0d9488;--teal-bg:rgba(13,148,136,.1);
  --amber:#d97706;--amber-bg:rgba(217,119,6,.1);
  --red:#dc2626;--red-bg:rgba(220,38,38,.1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans SC',system-ui,sans-serif;background:var(--bg);color:var(--text1);height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:13px;-webkit-font-smoothing:antialiased}

/* ══ ANIMATIONS ══ */
@keyframes shine{0%{background-position:100% 0}100%{background-position:-100% 0}}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardPop{0%{transform:scale(.97);opacity:.7}100%{transform:scale(1);opacity:1}}
@keyframes heartBeat{0%{transform:scale(1)}30%{transform:scale(1.4)}60%{transform:scale(.9)}100%{transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes dropZoneIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmerBg{0%{background-position:200% center}100%{background-position:-200% center}}

/* ══ FLASH BANNER ══ */
.flash-banner{
  background:linear-gradient(135deg,rgba(91,110,245,.2),rgba(124,143,255,.1));
  border-bottom:1px solid var(--accent-border);color:#c7d0ff;
  font-size:12.5px;padding:7px 18px;display:flex;align-items:center;gap:10px;
  flex-shrink:0;cursor:pointer;transition:background .2s;
  animation:fadeIn .3s var(--ease);
}
.flash-banner:hover{background:linear-gradient(135deg,rgba(91,110,245,.28),rgba(124,143,255,.18))}
.flash-banner.hidden{display:none!important}
html.light .flash-banner{background:linear-gradient(135deg,rgba(67,85,232,.08),rgba(91,110,245,.05));color:var(--accent)}
html.light .flash-banner:hover{background:linear-gradient(135deg,rgba(67,85,232,.13),rgba(91,110,245,.08))}
.flash-icon{font-size:13px;flex-shrink:0;animation:pulse 2s ease infinite}
.flash-text{flex:1;font-style:italic;opacity:.92;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;user-select:none}
.flash-liked{color:var(--red);font-size:13px;flex-shrink:0;transition:transform .2s}
.flash-liked.pop{animation:heartBeat .4s ease}
.flash-close-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;line-height:1;flex-shrink:0;padding:2px 4px;border-radius:4px;transition:color .15s,background .15s}
.flash-close-btn:hover{color:var(--text1);background:var(--surface2)}

/* ══ TOPBAR ══ */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);height:46px;display:flex;align-items:center;padding:0 14px;gap:6px;flex-shrink:0;z-index:100}
html.light .topbar{background:rgba(255,255,255,.92);backdrop-filter:blur(16px)}
.logo{font-size:14px;font-weight:700;cursor:default;user-select:none;display:flex;align-items:baseline;gap:5px;flex-shrink:0}
.logo-text{background:linear-gradient(110deg,#e0e4ff 0%,#e0e4ff 25%,#7c8fff 45%,#fff 52%,#7c8fff 59%,#e0e4ff 75%,#e0e4ff 100%);background-size:280% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shine 4s linear infinite}
html.light .logo-text{background:linear-gradient(110deg,#111318 0%,#111318 25%,#4355e8 45%,#7c8fff 52%,#4355e8 59%,#111318 75%,#111318 100%);background-size:280% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shine 4s linear infinite}
.logo-ver{font-size:10px;color:var(--text3);font-weight:400;-webkit-text-fill-color:var(--text3)}

/* ── Quick Capture ── */
.quick-capture{display:flex;align-items:center;flex:1;max-width:280px;position:relative}
.quick-capture input{width:100%;height:28px;padding:0 10px 0 30px;border:1px solid var(--border2);border-radius:var(--rxs);background:var(--surface2);color:var(--text1);font-size:12px;font-family:inherit;outline:none;transition:border-color .15s,box-shadow .15s}
.quick-capture input::placeholder{color:var(--text3)}
.quick-capture input:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-bg)}
.quick-capture-icon{position:absolute;left:9px;color:var(--text3);pointer-events:none;display:flex;align-items:center}
.quick-capture-icon svg{width:12px;height:12px;fill:currentColor}
.quick-capture-hint{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--text3);pointer-events:none;opacity:.5}

.nav-sep{width:1px;height:18px;background:var(--border2);flex-shrink:0;margin:0 4px}
.nav-tab{height:28px;padding:0 10px;border-radius:var(--rxs);font-size:12px;cursor:pointer;color:var(--text2);border:none;background:none;font-family:inherit;transition:background .15s,color .15s;white-space:nowrap}
.nav-tab:hover{background:var(--surface2);color:var(--text1)}
.nav-tab.active{background:var(--accent-bg);color:var(--accent2);font-weight:500}
.theme-btn{width:28px;height:28px;border-radius:var(--rxs);border:1px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:background .15s,transform .15s;flex-shrink:0}
.theme-btn:hover{background:var(--surface2);color:var(--text1);transform:rotate(20deg)}
.theme-btn svg{width:14px;height:14px;fill:currentColor}

/* ══ TOOLBAR ══ */
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:8px;height:44px;flex-shrink:0}
.tleft{display:flex;align-items:center;gap:8px;margin-right:auto}
.pg-label{font-size:13px;font-weight:600;color:var(--text1)}
.dnav{display:flex;align-items:center;gap:3px}
.darr{width:26px;height:26px;border:1px solid var(--border2);border-radius:var(--rxs);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:background .12s,transform .12s}
.darr:hover{background:var(--surface2);color:var(--text1);transform:scale(1.08)}
.darr svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.dchip{font-size:12px;color:var(--text2);padding:4px 10px;border:1px solid var(--border);border-radius:var(--rxs);background:var(--surface2);white-space:nowrap;font-weight:500}
.inbox-btn{height:26px;padding:0 11px;background:rgba(167,139,250,.2);color:var(--purple);border:1px solid rgba(167,139,250,.3);border-radius:var(--rxs);font-size:11.5px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px;transition:all .2s;font-weight:500}
.inbox-btn:hover{background:rgba(167,139,250,.35);transform:translateY(-1px);box-shadow:0 2px 8px rgba(167,139,250,.2)}
.seg{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:var(--rxs);padding:2px;gap:1px}
.seg button{height:22px;padding:0 9px;border:none;border-radius:3px;background:none;font-size:11px;cursor:pointer;color:var(--text2);font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:3px;white-space:nowrap}
.seg button.active{background:var(--surface3);color:var(--text1);font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.seg button:not(.active):hover{background:var(--surface2);color:var(--text1)}

/* ══ MAIN ══ */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;padding:12px 16px;min-height:0}

/* ══ KANBAN ══ */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;flex:1;min-height:0;overflow:hidden}
.kcol{border-radius:var(--r);border:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden;transition:border-color .2s,box-shadow .2s;animation:cardPop .25s var(--ease)}
.kcol.todo{border-top:3px solid var(--c-todo)}
.kcol.inprogress{border-top:3px solid var(--c-doing)}
.kcol.done{border-top:3px solid var(--c-done)}
.kcol.cancelled{border-top:3px solid var(--c-cancel)}
.kcol.dragover{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-bg);outline:none}
.kch{padding:10px 12px 8px;display:flex;align-items:center;gap:7px;flex-shrink:0}
.kch-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;box-shadow:0 0 6px currentColor}
.kch-label{font-size:11.5px;font-weight:600;flex:1;letter-spacing:.01em}
.kch-count{font-size:11px;color:var(--text3);background:rgba(255,255,255,.08);border-radius:10px;min-width:20px;height:18px;display:flex;align-items:center;justify-content:center;padding:0 5px;transition:background .2s}
html.light .kch-count{background:rgba(0,0,0,.07)}
.kbody{flex:1;padding:0 8px 8px;overflow-y:auto;display:flex;flex-direction:column;gap:3px}
.kbody::-webkit-scrollbar{width:3px}
.kbody::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

/* ── task card ── */
.tcard{border-radius:var(--rs);padding:9px 10px 9px 13px;cursor:pointer;position:relative;transition:background .12s,transform .15s var(--ease),box-shadow .15s;user-select:none;border:1px solid transparent;animation:slideUp .2s var(--ease)}
.tcard:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.2)}
.tcard:hover .tc-actions{opacity:1;pointer-events:auto}
.tcard::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:3px;border-radius:2px;transition:height .2s}
.tcard.todo{background:rgba(255,255,255,.04)}.tcard.todo::before{background:var(--c-todo)}
.tcard.inprogress{background:rgba(91,110,245,.1)}.tcard.inprogress::before{background:var(--c-doing)}
.tcard.done{background:rgba(34,197,94,.07)}.tcard.done::before{background:var(--c-done)}
.tcard.cancelled{background:rgba(217,119,6,.08)}.tcard.cancelled::before{background:var(--c-cancel)}
html.light .tcard.todo{background:rgba(255,255,255,.8)}
html.light .tcard.inprogress{background:rgba(67,85,232,.06)}
html.light .tcard.done{background:rgba(22,163,74,.05)}
html.light .tcard.cancelled{background:rgba(217,119,6,.06)}
.tcard.drag-over-top{border-top:2px solid var(--accent)!important;border-top-left-radius:0;border-top-right-radius:0}
.tcard.drag-over-bot{border-bottom:2px solid var(--accent)!important}
.tcard.dragging{opacity:.35;transform:scale(.97)}
.tc-title{font-size:12.5px;font-weight:500;color:var(--text1);line-height:1.4;margin-bottom:4px}
.tc-title.done{text-decoration:line-through;color:var(--text3)}
.tc-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.tc-tag{font-size:10.5px;padding:1px 6px;border-radius:3px;font-weight:500;transition:transform .12s}
.tc-tag:hover{transform:scale(1.05)}
.tc-tag.purple{background:var(--purple-bg);color:var(--purple)}
.tc-tag.green{background:var(--green-bg);color:var(--green)}
.tc-tag.blue{background:var(--accent-bg);color:var(--accent2)}
/* link icon - more prominent */
.tc-link-icon{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:4px;background:var(--amber-bg);border:1px solid rgba(251,191,36,.3);color:var(--amber);text-decoration:none;font-size:11px;transition:all .15s;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.tc-link-icon:hover{background:rgba(251,191,36,.25);transform:scale(1.1) rotate(-5deg);box-shadow:0 2px 8px rgba(251,191,36,.2)}
/* [[双链]] badge */
.tc-wikilink{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:1px 5px;border-radius:3px;background:rgba(45,212,191,.12);color:var(--teal);border:1px solid rgba(45,212,191,.2);cursor:pointer;transition:all .12s}
.tc-wikilink:hover{background:rgba(45,212,191,.2)}
/* hover actions */
.tc-actions{position:absolute;right:6px;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:2px;opacity:0;pointer-events:none;transition:opacity .15s;background:var(--surface2);border-radius:6px;padding:2px;border:1px solid var(--border2);box-shadow:0 2px 8px rgba(0,0,0,.2)}
.tact{width:26px;height:26px;border:none;background:none;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:background .1s,color .1s,transform .1s;position:relative}
.tact:hover{background:var(--surface3);color:var(--text1);transform:scale(1.1)}
.tact.g:hover{background:rgba(74,222,128,.15);color:var(--green)}
.tact.r:hover{background:rgba(248,113,113,.15);color:var(--red)}
.tact svg{width:13px;height:13px;fill:currentColor;display:block}
.kfoot{padding:7px 12px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);display:flex;justify-content:space-between;flex-shrink:0}

/* postpone popup */
.ppop{position:absolute;right:0;top:calc(100% + 4px);z-index:300;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--rs);box-shadow:0 8px 32px rgba(0,0,0,.4);min-width:148px;overflow:hidden;display:none;animation:fadeIn .15s var(--ease)}
.ppop-item{padding:9px 14px;font-size:12.5px;color:var(--text1);cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:8px}
.ppop-item svg{width:12px;height:12px;fill:currentColor;flex-shrink:0}
.ppop-item:hover{background:var(--surface3)}

/* ══ WEEK DROP ZONE ══ */
.week-drop-zone{position:fixed;bottom:0;left:0;right:0;z-index:400;padding:12px 16px;display:none;animation:dropZoneIn .25s var(--ease)}
.week-drop-zone.visible{display:block}
.week-drop-zone-inner{background:rgba(15,17,23,.92);border:1px solid var(--border2);border-radius:var(--r);backdrop-filter:blur(12px);padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.week-drop-zone-label{font-size:11.5px;color:var(--text2);text-align:center;display:flex;align-items:center;justify-content:center;gap:6px}
.week-drop-zone-label svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round}
.week-drop-cols{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.wdrop-col{border-radius:var(--rs);padding:10px 14px;display:flex;align-items:center;justify-content:center;gap:7px;font-size:12.5px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .2s;min-height:44px}
.wdrop-col.todo{background:rgba(107,114,128,.15);color:var(--c-todo);border-color:rgba(107,114,128,.25)}
.wdrop-col.inprogress{background:rgba(91,110,245,.15);color:var(--c-doing);border-color:rgba(91,110,245,.25)}
.wdrop-col.done{background:rgba(34,197,94,.12);color:var(--c-done);border-color:rgba(34,197,94,.25)}
.wdrop-col.cancelled{background:rgba(217,119,6,.12);color:var(--c-cancel);border-color:rgba(217,119,6,.25)}
.wdrop-col:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.wdrop-col.wdrop-over{transform:scale(1.04);filter:brightness(1.15)}
.wdrop-col svg{width:14px;height:14px;fill:currentColor;flex-shrink:0}

/* ══ MATRIX ══ */
.mxwrap{flex:1;overflow:hidden;display:flex;flex-direction:column;gap:8px;min-height:0}
.mxaxis{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);padding:0 2px;font-weight:500;letter-spacing:.04em}
.mxgrid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:8px;flex:1;min-height:0}
.mxcell{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:14px;display:flex;flex-direction:column;overflow-y:auto;transition:box-shadow .2s}
.mxcell::-webkit-scrollbar{width:3px}
.mxcell::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px}
.mxcell.q1{border-top:2px solid var(--red)}.mxcell.q2{border-top:2px solid var(--accent)}.mxcell.q3{border-top:2px solid var(--amber)}.mxcell.q4{border-top:2px solid var(--border2)}
.mxcell.dragover{outline:2px dashed var(--accent);outline-offset:-2px;box-shadow:0 0 0 4px var(--accent-bg)}
.mxhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-shrink:0}
.mxlbl{font-size:12px;font-weight:600}
.mxcell.q1 .mxlbl{color:var(--red)}.mxcell.q2 .mxlbl{color:var(--accent2)}.mxcell.q3 .mxlbl{color:var(--amber)}.mxcell.q4 .mxlbl{color:var(--text3)}
.mxbadge{font-size:11px;color:var(--text3)}
.mxitems{flex:1;display:flex;flex-direction:column;gap:4px}
.mxitem{display:flex;align-items:flex-start;gap:8px;transition:background .12s;padding:2px 4px;border-radius:4px}
.mxitem:hover{background:var(--surface2)}
.mxitem input[type=checkbox]{width:14px;height:14px;margin-top:1px;cursor:pointer;accent-color:var(--accent);flex-shrink:0}
.mxitem label{font-size:12px;color:var(--text2);cursor:pointer;line-height:1.45}
.mxitem label.done{text-decoration:line-through;color:var(--text3)}
.mxadd{font-size:12px;color:var(--text3);cursor:pointer;margin-top:8px;flex-shrink:0;transition:color .15s}
.mxadd:hover{color:var(--text2)}

/* ══ WEEK ══ */
.weekview{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.weekcard{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;flex:1;display:flex;flex-direction:column}
.wcardh{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.wcardh-title{font-size:13px;font-weight:600;margin-right:auto}
.warr{width:26px;height:26px;border:1px solid var(--border2);border-radius:var(--rxs);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:background .12s,transform .12s}
.warr:hover{background:var(--surface2);color:var(--text1);transform:scale(1.08)}
.warr svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.wtoday-btn{padding:3px 8px;border:1px solid var(--border2);border-radius:var(--rxs);background:none;cursor:pointer;font-size:11px;font-family:inherit;color:var(--text2);transition:all .15s}
.wtoday-btn:hover{background:var(--surface2);color:var(--text1)}
.wdays-h{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border);flex-shrink:0}
.wdayh{padding:8px 4px;text-align:center}
.wdayname{font-size:10.5px;color:var(--text3);margin-bottom:4px}
.wdaynum{font-size:14px;font-weight:500;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto;color:var(--text2);transition:background .2s,color .2s}
.wdaynum.today{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(91,110,245,.4)}
.wbody{display:grid;grid-template-columns:repeat(7,1fr);flex:1;overflow:hidden}
.wcell{padding:6px 4px;border-right:1px solid var(--border);overflow-y:auto;transition:background .15s}
.wcell:last-child{border-right:none}
.wcell.today{background:rgba(91,110,245,.06)}
.wcell.wdrag-over{background:rgba(91,110,245,.12);outline:1px dashed var(--accent)}
.wtchip{font-size:10px;padding:2px 5px;border-radius:3px;background:var(--green-bg);color:var(--green);border-left:2px solid var(--green);margin-bottom:2px;line-height:1.4;display:block;cursor:pointer;text-decoration:line-through;opacity:.7;transition:opacity .15s,transform .12s}
.wtchip:hover{opacity:1;transform:translateX(2px)}
.wtchip.active{background:var(--accent-bg);color:var(--accent2);border-left-color:var(--accent);text-decoration:none;opacity:1}
.wempty{font-size:10.5px;color:var(--text3);text-align:center;margin-top:10px}
.wfoot{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-top:1px solid var(--border);flex-shrink:0}

/* ══ INBOX ══ */
.inbox-wrap{display:flex;flex-direction:column;height:100%;min-height:0}
.inboxhdr{display:flex;align-items:center;gap:10px;padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:12px;flex-shrink:0}
.backbtn{background:none;border:1px solid var(--border2);border-radius:var(--rxs);padding:4px 10px;cursor:pointer;font-size:12px;font-family:inherit;color:var(--text2);transition:all .15s}
.backbtn:hover{background:var(--surface2);color:var(--text1);transform:translateX(-2px)}
.inbox-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:40px}
.inbox-empty h2{font-size:15px;font-weight:600}.inbox-empty p{font-size:12.5px;color:var(--text2)}
.inbox-add{background:var(--green-bg);color:var(--green);border:1px solid rgba(74,222,128,.3);border-radius:var(--rs);padding:10px 24px;font-size:13px;cursor:pointer;font-family:inherit;transition:all .2s}
.inbox-add:hover{background:rgba(74,222,128,.2);transform:translateY(-1px)}
.inbox-tip{background:rgba(45,212,191,.08);border-left:2px solid var(--teal);border-radius:0 4px 4px 0;padding:10px 14px;font-size:11.5px;color:var(--text2);text-align:left;max-width:360px;line-height:1.6}
.inbox-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.inbox-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--rs);cursor:grab;transition:background .12s,transform .1s;position:relative}
.inbox-item:hover{background:var(--surface2)}
.inbox-item.dragging{opacity:.4;cursor:grabbing}
.inbox-item-title{flex:1;font-size:13px;color:var(--text1)}
/* inbox drop zone bottom bar */
.inbox-drop-bar{position:fixed;bottom:0;left:0;right:0;z-index:400;display:none;animation:dropZoneIn .25s var(--ease)}
.inbox-drop-bar.visible{display:block}
.inbox-drop-inner{background:rgba(15,17,23,.92);border:1px solid var(--border2);border-radius:var(--r);backdrop-filter:blur(12px);margin:12px 16px;padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.inbox-drop-label{font-size:11.5px;color:var(--text2);text-align:center}
.inbox-drop-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.idrop-col{border-radius:var(--rs);padding:10px 14px;display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .2s}
.idrop-col.status-drop{background:rgba(91,110,245,.15);color:var(--accent2);border-color:rgba(91,110,245,.25)}
.idrop-col.date-drop{background:rgba(34,197,94,.12);color:var(--green);border-color:rgba(34,197,94,.25)}
.idrop-col:hover,.idrop-col.over{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.3);filter:brightness(1.15)}

/* ══ RECORD ══ */
.record-wrap{flex:1;display:flex;flex-direction:column;gap:10px;overflow:hidden;min-height:0}
.record-tabs{display:flex;align-items:center;gap:6px;flex-shrink:0;border-bottom:1px solid var(--border);padding-bottom:8px}
.rtab{padding:4px 12px;border-radius:var(--rs);font-size:12.5px;cursor:pointer;color:var(--text2);border:none;background:none;font-family:inherit;transition:all .15s;font-weight:500}
.rtab:hover{background:var(--surface2);color:var(--text1)}
.rtab.active{background:var(--accent-bg);color:var(--accent2)}
.record-toolbar{display:flex;align-items:center;gap:8px;flex-shrink:0}
.record-search{flex:1;padding:7px 12px;border:1px solid var(--border2);border-radius:var(--rs);font-size:12.5px;font-family:inherit;outline:none;background:var(--surface2);color:var(--text1);transition:border-color .15s,box-shadow .15s}
.record-search::placeholder{color:var(--text3)}
.record-search:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-bg)}
.rfbtn{padding:5px 11px;border-radius:var(--rxs);font-size:11.5px;cursor:pointer;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);font-family:inherit;transition:all .15s}
.rfbtn:hover,.rfbtn.active{background:var(--accent-bg);color:var(--accent2);border-color:var(--accent-border)}
.record-new-btn{height:30px;padding:0 14px;background:var(--teal-bg);color:var(--teal);border:1px solid rgba(45,212,191,.3);border-radius:var(--rs);font-size:12px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;transition:all .2s;font-weight:500;flex-shrink:0}
.record-new-btn:hover{background:rgba(45,212,191,.2);transform:translateY(-1px)}
.record-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;overflow-y:auto;flex:1;align-content:start}
.record-grid::-webkit-scrollbar{width:3px}
.record-grid::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px}
.rcard{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:14px;cursor:pointer;transition:border-color .15s,background .15s,transform .15s,box-shadow .15s;position:relative;display:flex;flex-direction:column;gap:8px;animation:slideUp .2s var(--ease)}
.rcard:hover{border-color:var(--border2);background:var(--surface2);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.2)}
.rcard:hover .rcard-del{opacity:1}
.rcard-type{font-size:10.5px;font-weight:500;padding:2px 7px;border-radius:3px;display:inline-flex;align-items:center;gap:3px;align-self:flex-start}
.rcard-content{font-size:12.5px;color:var(--text1);line-height:1.6;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
/* wikilink in record content */
.wikilink-ref{color:var(--teal);cursor:pointer;text-decoration:none;border-bottom:1px dashed rgba(45,212,191,.4);transition:color .15s}
.wikilink-ref:hover{color:var(--accent2)}
.rcard-meta{font-size:10.5px;color:var(--text3);margin-top:auto;display:flex;justify-content:space-between;align-items:center}
.rcard-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.rtag{font-size:10px;padding:1px 5px;border-radius:3px;background:var(--surface3);color:var(--text3)}
.rcard-del{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;opacity:0;transition:opacity .15s,color .15s;padding:3px 5px;border-radius:4px}
.rcard-del:hover{background:var(--red-bg);color:var(--red)}
.rcard-img{max-width:100%;border-radius:var(--rs);object-fit:cover;max-height:100px;transition:transform .15s}
.rcard-img:hover{transform:scale(1.02)}
.rcard-link{font-size:11.5px;color:var(--teal);text-decoration:none;display:flex;align-items:center;gap:3px;transition:color .15s}
.rcard-link:hover{text-decoration:underline;color:var(--accent2)}
.rcard-thought-count{font-size:11px;color:var(--red);display:flex;align-items:center;gap:3px}
.record-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text3);text-align:center}

/* ── journal tab ── */
.journal-list{overflow-y:auto;flex:1}
.journal-list::-webkit-scrollbar{width:3px}
.journal-list::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px}
.jitem{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:14px;margin-bottom:8px;animation:slideUp .2s var(--ease);transition:border-color .15s}
.jitem:hover{border-color:var(--border2)}
.jitem-quote{font-size:12px;color:var(--text2);font-style:italic;line-height:1.5;border-left:2px solid var(--accent);padding-left:10px;margin-bottom:10px;opacity:.8}
.jitem-thought{font-size:13px;color:var(--text1);line-height:1.6}
.jitem-meta{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.jitem-time{font-size:11px;color:var(--text3)}
.jitem-tag{font-size:10.5px;padding:1px 6px;border-radius:3px;background:var(--accent-bg);color:var(--accent2)}

/* ══ SETTINGS (top-tab layout) ══ */
.settings-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.stabs{display:flex;gap:4px;padding-bottom:10px;border-bottom:1px solid var(--border);flex-shrink:0}
.stab{padding:6px 14px;border-radius:var(--rs);font-size:12.5px;cursor:pointer;color:var(--text2);border:none;background:none;font-family:inherit;transition:all .15s;font-weight:500}
.stab:hover{background:var(--surface2);color:var(--text1)}
.stab.active{background:var(--accent-bg);color:var(--accent2);box-shadow:0 1px 4px rgba(91,110,245,.2)}
.spanel{flex:1;overflow-y:auto;padding-top:12px}
.spanel::-webkit-scrollbar{width:3px}
.spanel::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px}
.scard{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:16px 18px;margin-bottom:10px;animation:fadeIn .2s var(--ease)}
.scard h3{font-size:13px;font-weight:600;margin-bottom:12px;color:var(--text1);display:flex;align-items:center;gap:7px}
.srow{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);gap:12px}
.srow:last-child{border-bottom:none;padding-bottom:0}
.srow-left{flex:1}
.srow-label{font-size:12.5px;font-weight:500;color:var(--text1)}
.srow-sub{font-size:11.5px;color:var(--text3);margin-top:2px}
.toggle{width:38px;height:22px;border-radius:11px;background:var(--surface3);cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;border:none}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .2s var(--ease);box-shadow:0 1px 3px rgba(0,0,0,.3)}
.toggle.on::after{left:19px}
.srow select,.srow input[type=number]{padding:5px 8px;border:1px solid var(--border2);border-radius:var(--rxs);font-size:12px;font-family:inherit;outline:none;background:var(--surface2);color:var(--text1);transition:border-color .15s}
.srow select:focus,.srow input[type=number]:focus{border-color:var(--accent)}
.type-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.type-chip{display:flex;align-items:center;gap:5px;padding:4px 8px;border-radius:var(--rxs);border:1px solid var(--border2);background:var(--surface2);font-size:12px;color:var(--text2);transition:all .15s}
.type-chip:hover{border-color:var(--border2);background:var(--surface3)}
.type-chip-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;line-height:1;padding:0 2px;transition:color .15s}
.type-chip-del:hover{color:var(--red)}
.type-add-row{display:flex;gap:6px;margin-top:8px}
.type-add-input{flex:1;padding:6px 9px;border:1px solid var(--border2);border-radius:var(--rxs);font-size:12.5px;background:var(--surface2);color:var(--text1);font-family:inherit;outline:none;transition:border-color .15s}
.type-add-input:focus{border-color:var(--accent)}
.ftype-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.ftype-chip{padding:4px 10px;border-radius:10px;border:1px solid var(--border2);background:var(--surface2);font-size:12px;cursor:pointer;color:var(--text2);font-family:inherit;transition:all .15s}
.ftype-chip.active{background:var(--accent-bg);color:var(--accent2);border-color:var(--accent-border)}
#gh-log{min-height:16px;font-size:11.5px;color:var(--text3);margin-top:6px;transition:color .2s}

/* ══ MODALS ══ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:500;padding:20px;backdrop-filter:blur(8px);transition:opacity .2s}
.overlay.open{display:flex;animation:fadeIn .2s var(--ease)}
.modal{background:var(--surface);border-radius:16px;width:100%;max-width:580px;max-height:92vh;overflow-y:auto;padding:24px;box-shadow:0 24px 80px rgba(0,0,0,.5);position:relative;border:1px solid var(--border2);animation:slideUp .25s var(--ease)}
.modal::-webkit-scrollbar{width:3px}
.modal::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px}
.modal-sm{max-width:420px}
.modal-layout{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.mtitle{font-size:16px;font-weight:700;margin-bottom:20px;color:var(--text1)}
.mclose{position:absolute;top:16px;right:16px;width:28px;height:28px;background:var(--surface2);border:none;border-radius:50%;font-size:15px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:background .12s,transform .12s}
.mclose:hover{background:var(--surface3);color:var(--text1);transform:rotate(90deg)}
.field{margin-bottom:13px}
.field>label,.flabel{display:block;font-size:11px;color:var(--text3);margin-bottom:5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.field input,.field textarea,.field select{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--rs);font-size:12.5px;background:var(--surface2);color:var(--text1);font-family:inherit;outline:none;transition:border-color .15s,box-shadow .15s}
.field input::placeholder,.field textarea::placeholder{color:var(--text3)}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-bg)}
.field textarea{resize:none;line-height:1.55}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.locbtns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:13px}
.locbtn{padding:9px;border-radius:var(--rs);cursor:pointer;text-align:center;font-size:12px;font-family:inherit;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);transition:all .15s}
.locbtn.sdate{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent2);font-weight:500}
.locbtn.sinbox{background:var(--green-bg);border-color:rgba(74,222,128,.25);color:var(--green)}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.popt{padding:8px;border-radius:var(--rs);font-size:12px;cursor:pointer;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);transition:all .15s;text-align:center;font-family:inherit}
.popt.sel{border-color:var(--accent-border);background:var(--accent-bg);color:var(--accent2);font-weight:500}
.progval{font-size:13px;color:var(--accent2);font-weight:600}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.dtoggle{display:flex;align-items:center;justify-content:center;gap:5px;padding:5px;font-size:11.5px;color:var(--text3);cursor:pointer;margin-bottom:10px;transition:color .15s}
.dtoggle:hover{color:var(--text2)}
.macts{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:18px}
.macts-right{display:flex;gap:8px}
.btn{height:34px;padding:0 16px;border-radius:var(--rs);font-size:12.5px;font-family:inherit;font-weight:500;cursor:pointer;border:none;transition:all .2s;display:flex;align-items:center;gap:5px}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{background:var(--surface3);color:var(--text1)}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(91,110,245,.3)}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(91,110,245,.4)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,113,113,.25)}
.btn-danger:hover{background:rgba(248,113,113,.25)}
.status-sel-wrap{position:relative}
.status-bar{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.status-bar.todo{background:var(--c-todo)}.status-bar.inprogress{background:var(--c-doing)}.status-bar.done{background:var(--c-done)}.status-bar.cancelled{background:var(--c-cancel)}
.status-sel-wrap select{padding-left:12px}
.attach-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.attach-chip{display:flex;align-items:center;gap:4px;padding:3px 7px;border-radius:20px;border:1px solid var(--border2);font-size:11px;color:var(--text2);background:var(--surface2)}
.attach-add{display:flex;align-items:center;gap:5px;padding:7px 10px;border-radius:var(--rs);border:1px dashed var(--border2);font-size:12px;color:var(--text3);cursor:pointer;transition:all .15s}
.attach-add:hover{border-color:var(--accent);color:var(--accent2)}
.attach-add svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round}
.attach-img-preview{max-width:100%;max-height:80px;border-radius:var(--rs);border:1px solid var(--border2);object-fit:cover;cursor:pointer;transition:transform .15s}
.attach-img-preview:hover{transform:scale(1.02)}
.repeat-row{display:flex;align-items:center;justify-content:space-between;border:1px solid var(--border2);border-radius:var(--rs);padding:8px 10px;margin-bottom:13px;background:var(--surface2)}
.repeat-row-left{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--text2)}
.repeat-row select{border:none;background:none;font-size:12.5px;color:var(--text2);outline:none;cursor:pointer;font-family:inherit}
input[type=range]{width:100%;accent-color:var(--accent)}
.spill{font-size:10.5px;padding:2px 7px;border-radius:10px;font-weight:500}
.spill.done{background:var(--green-bg);color:var(--green)}
.spill.todo{background:var(--surface2);color:var(--text3)}
.empty-tip{text-align:center;color:var(--text3);padding:48px 0;font-size:13px}

/* ── thought modal / date picker ── */
#date-pick-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:600;padding:20px;backdrop-filter:blur(6px)}
#date-pick-overlay.open{display:flex}
.date-pick-modal{background:var(--surface);border-radius:var(--r);padding:20px;border:1px solid var(--border2);box-shadow:var(--shadow-lg);animation:slideUp .2s var(--ease)}

/* ══ FAB ══ */
.fab{position:fixed;bottom:22px;right:22px;width:46px;height:46px;background:var(--accent);color:#fff;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:50;box-shadow:0 4px 20px rgba(91,110,245,.5);transition:transform .2s var(--ease),background .15s,box-shadow .2s}
.fab:hover{background:var(--accent2);transform:scale(1.1) rotate(90deg);box-shadow:0 6px 28px rgba(91,110,245,.6)}
.fab svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round}

/* ── toast ── */
.toast{position:fixed;bottom:80px;right:22px;background:var(--surface2);border:1px solid var(--border2);color:var(--text1);padding:8px 16px;border-radius:var(--rs);font-size:12.5px;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:slideUp .2s var(--ease)}
</style>
</head>
<body>

<!-- FLASH BANNER -->
<div class="flash-banner hidden" id="flash-strip" onclick="flashClick(event)" ondblclick="flashDblClick(event)">
  <span class="flash-icon" id="flash-icon">✨</span>
  <span class="flash-text" id="flash-text">正在加载灵感…</span>
  <span class="flash-liked" id="flash-liked">♡</span>
  <button class="flash-close-btn" onclick="event.stopPropagation();dismissFlash()">×</button>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo"><span class="logo-text">工作台</span><span class="logo-ver">v1.3</span></div>
  <!-- Quick Capture -->
  <div class="quick-capture">
    <span class="quick-capture-icon"><svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg></span>
    <input id="quick-input" placeholder="快速捕捉想法… ↵入收集箱" onkeydown="quickCapture(event)">
    <span class="quick-capture-hint">↵</span>
  </div>
  <div class="nav-sep"></div>
  <button class="nav-tab active" id="tab-todo" onclick="switchPage('todo')">待办</button>
  <button class="nav-tab" id="tab-record" onclick="switchPage('record')">记录</button>
  <button class="nav-tab" id="tab-timeline" onclick="switchPage('timeline')">时间线</button>
  <button class="nav-tab" id="tab-diary" onclick="switchPage('diary')">时记</button>
  <button class="nav-tab" id="tab-analysis" onclick="switchPage('analysis')">数据分析</button>

  .then(function(r){return r.json().then(function(b){return{status:r.status,ok:r.ok,body:b}})})
  .then(function(res){
    if(res.ok){ghLog('✓ 连接成功，正在拉取…','var(--green)');render();ghPull();}
    else{setToken('');ghLog('✗ HTTP '+res.status+': '+(res.body.message||'未知错误'),'var(--red)');}
  }).catch(function(e){setToken('');ghLog('✗ 网络错误: '+e.message,'var(--red)')});
}
function ghFetch(path){
  var url='https://raw.githubusercontent.com/'+GH_USER+'/'+GH_REPO+'/main/'+encodeURIComponent(path)+'?t='+Date.now();
  return fetch(url).then(function(r){if(r.status===404)return null;if(!r.ok)throw new Error('HTTP '+r.status);return r.json()});
}
function ghWrite(path,data,msg){
  var token=getToken();if(!token)return Promise.reject('no token');
  var content=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
  var apiUrl='https://api.github.com/repos/'+GH_USER+'/'+GH_REPO+'/contents/'+encodeURIComponent(path);
  return fetch(apiUrl,{headers:{Authorization:'Bearer '+token,'Accept':'application/vnd.github.v3+json'}})
    .then(function(r){return r.ok?r.json():null})
    .then(function(info){
      var body={message:msg||'工作台更新',content:content};if(info&&info.sha)body.sha=info.sha;
      return fetch(apiUrl,{method:'PUT',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},body:JSON.stringify(body)});
    }).then(function(r){if(!r.ok)throw new Error('写入失败');return r.json()});
}
function ghUploadImage(file){
  return new Promise(function(resolve,reject){
    var token=getToken();if(!token){reject('no token');return}
    var reader=new FileReader();
    reader.onload=function(ev){
      var b64=ev.target.result.split(',')[1];
      var fname=Date.now()+'_'+file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
      var path=GH_DIR+'/images/'+fname;
      var apiUrl='https://api.github.com/repos/'+GH_USER+'/'+GH_REPO+'/contents/'+encodeURIComponent(path);
      fetch(apiUrl,{method:'PUT',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},body:JSON.stringify({message:'上传图片',content:b64})})
      .then(function(r){return r.json()}).then(function(){resolve('https://raw.githubusercontent.com/'+GH_USER+'/'+GH_REPO+'/main/'+path)}).catch(reject);
    };reader.readAsDataURL(file);
  });
}
function ghPull(){
  if(!getToken()){ghLog('请先填写 Token','var(--red)');return}
  ghLog('拉取中…');
  Promise.all([ghFetch(GH_DIR+'/tasks.json'),ghFetch(GH_DIR+'/records.json'),ghFetch(GH_DIR+'/config.json')])
  .then(function(res){
    if(res[0]){S.tasks=res[0];S.nid=res[0].reduce(function(m,t){return Math.max(m,t.id+1)},S.nid)}
    if(res[1]){S.records=res[1];S.recId=res[1].reduce(function(m,r){return Math.max(m,r.id+1)},S.recId)}
    if(res[2]){if(res[2].recTypes)S.recTypes=res[2].recTypes;if(res[2].cfg)Object.assign(S.cfg,res[2].cfg)}
    ghLog('✓ 已拉取 — 任务 '+S.tasks.length+' 个 · 记录 '+S.records.length+' 条','var(--green)');
    render();startFlash();
  }).catch(function(e){ghLog('✗ 拉取失败：'+e,'var(--red)')});
}
function ghPushAll(){
  if(!getToken())return;
  Promise.all([ghWrite(GH_DIR+'/tasks.json',S.tasks,'同步任务'),ghWrite(GH_DIR+'/records.json',S.records,'同步记录'),ghWrite(GH_DIR+'/config.json',{recTypes:S.recTypes,cfg:S.cfg},'同步配置')])
  .then(function(){ghLog('✓ 已推送 · '+new Date().toLocaleTimeString(),'var(--green)')})
  .catch(function(e){ghLog('✗ 推送失败：'+e,'var(--red)')});
}
function autoPush(){if(getToken())ghPushAll()}

/* ══ FLASH ══ */
var flashClickTimer=null;
function startFlash(){
  clearInterval(flashTimer);if(!S.cfg.flashOn)return;
  showFlash();flashTimer=setInterval(showFlash,(S.cfg.flashInterval||30)*60000);
}
function getFlashPool(){
  return S.records.filter(function(r){
    if(!r.flash)return false;
    if(S.cfg.flashTypes&&S.cfg.flashTypes.length>0)return S.cfg.flashTypes.indexOf(r.type)>=0;
    return true;
  });
}
function showFlash(){
  var pool=getFlashPool();
  if(!pool.length){byId('flash-strip').classList.add('hidden');return}
  var r=pool[Math.floor(Math.random()*pool.length)];
  S.flashRecId=r.id;S.flashLiked=false;
  byId('flash-text').textContent=r.content;
  var liked=byId('flash-liked');liked.textContent='♡';liked.style.color='var(--text3)';
  byId('flash-strip').classList.remove('hidden');
}
function dismissFlash(){byId('flash-strip').classList.add('hidden')}
/* single click = like, double click = edit */
function flashClick(e){
  if(e.target.classList.contains('flash-close-btn'))return;
  clearTimeout(flashClickTimer);
  flashClickTimer=setTimeout(function(){
    /* single click action: like */
    S.flashLiked=!S.flashLiked;
    var liked=byId('flash-liked');
    if(S.flashLiked){liked.textContent='❤';liked.style.color='var(--red)';liked.classList.add('pop');setTimeout(function(){liked.classList.remove('pop')},400);}
    else{liked.textContent='♡';liked.style.color='var(--text3)';}
  },220);
}
function flashDblClick(e){
  if(e.target.classList.contains('flash-close-btn'))return;

  var r=S.records.find(function(x){return x.id===S.flashRecId});

function closeThoughtModal(){byId('thought-overlay').classList.remove('open')}

  if(r){if(!r.thoughts)r.thoughts=[];r.thoughts.push({text:txt,ts:Date.now()});autoPush();}

/* drag state */
var DS={id:null,fromCol:null,fromIdx:null};
function cardDragStart(e,id,colKey,idx){
  DS={id:id,fromCol:colKey,fromIdx:idx};
  e.dataTransfer.effectAllowed='move';
  setTimeout(function(){var el=byId('tc-'+id);if(el)el.classList.add('dragging')},0);
}
function cardDragOver(e,idx){
  e.preventDefault();e.stopPropagation();
  var tgt=e.currentTarget;var rect=tgt.getBoundingClientRect();var isTop=e.clientY<rect.top+rect.height/2;
  document.querySelectorAll('.tcard').forEach(function(c){c.classList.remove('drag-over-top','drag-over-bot')});
  tgt.classList.add(isTop?'drag-over-top':'drag-over-bot');
}
function cardDragLeave(e){e.currentTarget.classList.remove('drag-over-top','drag-over-bot')}
function colDragOver(e,colKey){e.preventDefault();var col=byId('col-'+colKey);if(col)col.classList.add('dragover')}
function colDragLeave(e){if(!e.currentTarget.contains(e.relatedTarget))e.currentTarget.classList.remove('dragover')}
function cardDrop(e,toCol,toIdx){
  e.preventDefault();e.stopPropagation();
  cleanDragUI();
  var id=DS.id;if(!id)return;
  var t=S.tasks.find(function(x){return x.id===id});if(!t){resetDS();return}
  var rect=e.currentTarget.getBoundingClientRect();var insertAfter=e.clientY>=rect.top+rect.height/2;
  t.status=toCol;t.ds=ds(S.cur);
  var colArr=colTasks(toCol).filter(function(x){return x.id!==id});
  var insertIdx=Math.max(0,Math.min(insertAfter?toIdx+1:toIdx,colArr.length));
  colArr.splice(insertIdx,0,t);colArr.forEach(function(x,i){x.order=i});
  resetDS();render();autoPush();
}
function colDrop(e,toCol){
  e.preventDefault();cleanDragUI();
  var id=DS.id;if(!id)return;
  var t=S.tasks.find(function(x){return x.id===id});
  if(t){t.status=toCol;t.ds=ds(S.cur);t.order=colTasks(toCol).length;}
  resetDS();render();autoPush();
}
function cleanDragUI(){
  document.querySelectorAll('.tcard').forEach(function(c){c.classList.remove('drag-over-top','drag-over-bot','dragging')});
  document.querySelectorAll('.kcol').forEach(function(c){c.classList.remove('dragover')});
}
function resetDS(){DS={id:null,fromCol:null,fromIdx:null}}
document.addEventListener('dragend',function(){cleanDragUI();hideDropZones();resetDS()});

/* ══ WEEK with drop zone ══ */

  var base=new Date(S.cur);base.setDate(base.getDate()+S.weekOff*7);
  var dow=base.getDay();
  var mon=new Date(base);mon.setDate(base.getDate()-(dow===0?6:dow-1));
  var sun=new Date(mon);sun.setDate(mon.getDate()+6);
  var dn=['一','二','三','四','五','六','日'],td=todayDs();
  var sy=new Date(mon.getFullYear(),0,1),wn=Math.ceil(((mon-sy)/86400000+sy.getDay()+1)/7);
  var h='<div class="weekview"><div class="weekcard">';
  h+='<div class="wcardh"><span class="wcardh-title">本周日历</span>';
  h+='<button class="warr" onclick="S.weekOff--;render()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>';
  h+='<span style="font-size:11.5px;color:var(--text2)">'+mon.getFullYear()+' 第'+wn+'周（'+(mon.getMonth()+1)+'/'+mon.getDate()+'–'+(sun.getMonth()+1)+'/'+sun.getDate()+'）</span>';

  for(var i=0;i<7;i++){var dd=new Date(mon);dd.setDate(mon.getDate()+i);var isT=ds(dd)===td;var cnt=S.tasks.filter(function(t){return t.ds===ds(dd)}).length;
    h+='<div class="wdayh"><div class="wdayname">周'+dn[i]+'</div><div class="wdaynum'+(isT?' today':'')+'">'+dd.getDate()+'</div>'+(cnt?'<div style="font-size:10px;color:var(--text3)">'+cnt+'</div>':'')+'</div>';}
  h+='</div><div class="wbody">';
  for(var i=0;i<7;i++){var dd=new Date(mon);dd.setDate(mon.getDate()+i);var dstr=ds(dd);var isT=dstr===td;var dt=S.tasks.filter(function(t){return t.ds===dstr});
    h+='<div class="wcell'+(isT?' today':'')+'" ondragover="wCellDragOver(event,\''+dstr+'\')" ondragleave="wCellDragLeave(this)" ondrop="wCellDrop(event,\''+dstr+'\')">';

  h+='</div></div>';m.innerHTML=h;

/* ══ RECORD ══ */
function renderRecord(m){
  var h='<div class="record-wrap">';
  /* tabs */
  h+='<div class="record-tabs">';
  h+='<button class="rtab'+(S.recTab==='records'?' active':'')+'" onclick="S.recTab=\'records\';render()">📝 记录</button>';
  h+='<button class="rtab'+(S.recTab==='journal'?' active':'')+'" onclick="S.recTab=\'journal\';render()">💭 感想日志</button>';
  h+='</div>';
  if(S.recTab==='journal'){renderJournal(h,m);return}
  /* records tab */
  var filter=S.recFilter;
  var recs=S.records.filter(function(r){return filter==='all'||r.type===filter});
  h+='<div class="record-toolbar">';
  h+='<input class="record-search" placeholder="搜索记录…" oninput="searchRec(this.value)">';
  h+='<div style="display:flex;gap:5px">';
  h+='<button class="rfbtn'+(filter==='all'?' active':'')+'" onclick="S.recFilter=\'all\';render()">全部</button>';

  h+='</div>';
  h+='<button class="record-new-btn" onclick="openRecModal(null)">+ 新建</button>';
  h+='</div>';
  if(!recs.length){h+='<div class="record-empty"><div style="font-size:36px;opacity:.2">📝</div><div style="font-size:13px">暂无记录</div></div></div>';m.innerHTML=h;return}
  h+='<div class="record-grid">';
  recs.slice().reverse().forEach(function(r){
    var d=new Date(r.ts);var dstr=(d.getMonth()+1)+'/'+d.getDate()+' '+pad(d.getHours())+':'+pad(d.getMinutes());
    var tc=(r.thoughts&&r.thoughts.length)||0;
    h+='<div class="rcard" onclick="openRecModal('+r.id+')">';
    h+='<button class="rcard-del" onclick="delRecord('+r.id+',event)">×</button>';
    h+='<div class="rcard-type" style="'+typeColor(r.type)+'">'+esc(r.type)+(r.flash?' ✨':'')+'</div>';
    h+='<div class="rcard-content">'+renderWithWikilinks(r.content)+'</div>';
    if(r.imgSrc)h+='<img class="rcard-img" src="'+r.imgSrc+'">';
    if(r.link)h+='<a class="rcard-link" href="'+esc(r.link)+'" target="_blank" onclick="event.stopPropagation()">🔗 '+esc(r.link.replace(/^https?:\/\//,'').substring(0,36))+'</a>';
    if(r.tags&&r.tags.length)h+='<div class="rcard-tags">'+r.tags.map(function(t){return'<span class="rtag">#'+esc(t)+'</span>'}).join('')+'</div>';
    h+='<div class="rcard-meta"><span>'+dstr+'</span>'+(tc?'<span class="rcard-thought-count">❤ '+tc+'</span>':'')+'</div>';
    h+='</div>';
  });

}
function renderJournal(h,m){
  var all=[];
  S.records.forEach(function(r){
    if(!r.thoughts||!r.thoughts.length)return;
    r.thoughts.forEach(function(th){all.push({recId:r.id,recContent:r.content,recType:r.type,thought:th.text,ts:th.ts})});
  });
  all.sort(function(a,b){return b.ts-a.ts});
  h+='<div class="journal-list">';
  if(!all.length){h+='<div class="empty-tip">还没有感想记录，在灵感展示区双击开始记录</div>';}
  else{all.forEach(function(item){
    var d=new Date(item.ts);var dstr=d.getFullYear()+'/'+pad(d.getMonth()+1)+'/'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes());
    h+='<div class="jitem">';
    h+='<div class="jitem-quote">'+esc(item.recContent.substring(0,80))+(item.recContent.length>80?'…':'')+'</div>';
    h+='<div class="jitem-thought">'+esc(item.thought)+'</div>';
    h+='<div class="jitem-meta"><span class="jitem-time">'+dstr+'</span><span class="jitem-tag">'+esc(item.recType)+'</span></div>';
    h+='</div>';
  });}
  h+='</div></div>';m.innerHTML=h;
}

function ovClick(e){if(e.target===byId('overlay'))closeModal()}
function selLoc(l){S.loc=l;applyLoc(l)}
function applyLoc(l){byId('loc-date').className='locbtn '+(l==='date'?'sdate':'sinbox');byId('loc-inbox').className='locbtn '+(l==='inbox'?'sdate':'sinbox');byId('tfields').style.display=l==='date'?'grid':'none'}
function selP(p){S.pri=p;applyP(p)}
function applyP(p){document.querySelectorAll('.popt').forEach(function(b){b.classList.toggle('sel',b.dataset.p===p)})}
function togDet(){S.detOpen=!S.detOpen;byId('detsec').style.display=S.detOpen?'block':'none';byId('dettxt').textContent=S.detOpen?'▴ 收起详情':'▾ 展开详情'}
function saveTask(){
  var title=byId('m-title').value.trim();if(!title){alert('请输入任务标题');return}
  var status=byId('m-status').value,tag=byId('m-tag').value.trim(),repeat=byId('m-repeat').value;
  var hours=parseFloat(byId('m-hours').value)||0,dateStr=byId('m-date').value||todayDs();
  var prog=parseInt(byId('m-prog').value)||0,desc=byId('m-desc').value.trim();
  if(prog>=100)status='done';else if(prog>0)status='inprogress';
  var tagType=tag.indexOf('周')>=0?'purple':'green';
  if(S.editId!==null){var t=S.tasks.find(function(x){return x.id===S.editId});if(t)Object.assign(t,{title:title,desc:desc,status:status,tag:tag,tagType:tagType,pri:S.pri,prog:prog,repeat:repeat,hours:hours,ds:dateStr,links:S.links.slice(),imgs:S.imgs.slice(),loc:S.loc});}
  else{var mo=S.tasks.filter(function(x){return x.status===status}).length;S.tasks.push({id:S.nid++,title:title,desc:desc,status:status,tag:tag,tagType:tagType,pri:S.pri,prog:prog,repeat:repeat,hours:hours,ds:dateStr,links:S.links.slice(),imgs:S.imgs.slice(),loc:S.loc,order:mo});}
  closeModal();render();autoPush();
}

/* ══ THEME ══ */
function toggleTheme(){
  var isLight=document.documentElement.classList.toggle('light');
  byId('ti-moon').style.display=isLight?'none':'block';
  byId('ti-sun').style.display=isLight?'block':'none';
  try{localStorage.setItem('tf-theme',isLight?'light':'dark')}catch(e){}
}

/* ══ INIT ══ */
function init(){
  try{if(localStorage.getItem('tf-theme')==='light'){document.documentElement.classList.add('light');byId('ti-moon').style.display='none';byId('ti-sun').style.display='block'}}catch(e){}
  byId('dchip').textContent=fmtDate(S.cur);
  var n=new Date(),base=ds(n);
  byId('m-start').value=base+'T09:00';byId('m-end').value=base+'T18:00';byId('m-date').value=base;
  byId('date-pick-input').value=base;
  startFlash();
  if(getToken())ghPull(); else render();
}
init();
</script>
</body>
